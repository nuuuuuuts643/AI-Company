<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
body { background: #888; display: flex; gap: 32px; padding: 40px; align-items: flex-start; flex-wrap: wrap; }
.label { color: white; font-family: sans-serif; font-size: 12px; margin-top: 8px; text-align: center; }
</style>
</head>
<body>

<!-- Option A: グラデーション + ミニマルF + ウェーブ -->
<div>
<svg width="192" height="192" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgA" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d0d1f"/>
      <stop offset="100%" stop-color="#1e1040"/>
    </linearGradient>
    <linearGradient id="waveA" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#e63946"/>
      <stop offset="100%" stop-color="#ff9f69"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="100" fill="url(#bgA)"/>
  <!-- F: bold geometric -->
  <rect x="140" y="130" width="48" height="252" rx="10" fill="white"/>
  <rect x="140" y="130" width="216" height="48" rx="10" fill="white"/>
  <rect x="140" y="228" width="168" height="44" rx="10" fill="white"/>
  <!-- wave -->
  <path d="M96 408 C150 375 200 440 256 408 C312 375 360 440 416 408"
    stroke="url(#waveA)" stroke-width="22" fill="none" stroke-linecap="round"/>
</svg>
<div class="label">A: ダーク紫 + 太めF</div>
</div>

<!-- Option B: ブラック + 細いF + 細いウェーブ -->
<div>
<svg width="192" height="192" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgB" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#111118"/>
      <stop offset="100%" stop-color="#1a1a2e"/>
    </linearGradient>
    <linearGradient id="waveB" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ff4d6d"/>
      <stop offset="100%" stop-color="#ffa94d"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="100" fill="url(#bgB)"/>
  <!-- F: thin elegant -->
  <rect x="148" y="128" width="34" height="256" rx="6" fill="white" opacity="0.95"/>
  <rect x="148" y="128" width="210" height="34" rx="6" fill="white" opacity="0.95"/>
  <rect x="148" y="226" width="158" height="34" rx="6" fill="white" opacity="0.95"/>
  <!-- thin wave -->
  <path d="M96 408 C150 378 210 438 256 408 C302 378 360 438 416 408"
    stroke="url(#waveB)" stroke-width="14" fill="none" stroke-linecap="round"/>
</svg>
<div class="label">B: 漆黒 + 細いF</div>
</div>

<!-- Option C: ネイビー + Fのみ + カラードット -->
<div>
<svg width="192" height="192" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgC" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a192f"/>
      <stop offset="100%" stop-color="#112240"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="100" fill="url(#bgC)"/>
  <!-- F italic-ish -->
  <rect x="155" y="132" width="36" height="248" rx="8" fill="white"/>
  <rect x="155" y="132" width="200" height="40" rx="8" fill="white"/>
  <rect x="155" y="228" width="150" height="36" rx="8" fill="white"/>
  <!-- accent dots/line -->
  <circle cx="155" cy="420" r="10" fill="#e63946"/>
  <line x1="175" y1="420" x2="355" y2="420" stroke="#e63946" stroke-width="4" stroke-dasharray="8 6"/>
  <circle cx="365" cy="420" r="10" fill="#ff9f40"/>
</svg>
<div class="label">C: ネイビー + タイムラインライン</div>
</div>

<!-- Option D: レッドグラデ背景 + 白F -->
<div>
<svg width="192" height="192" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgD" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#c0392b"/>
      <stop offset="100%" stop-color="#8e0000"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="100" fill="url(#bgD)"/>
  <rect x="148" y="132" width="38" height="248" rx="8" fill="white"/>
  <rect x="148" y="132" width="208" height="40" rx="8" fill="white"/>
  <rect x="148" y="228" width="158" height="38" rx="8" fill="white"/>
  <path d="M96 408 C150 378 210 438 256 408 C302 378 360 438 416 408"
    stroke="white" stroke-width="16" fill="none" stroke-linecap="round" opacity="0.6"/>
</svg>
<div class="label">D: レッド背景 + 白</div>
</div>

</body>
</html>
