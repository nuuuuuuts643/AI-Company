name: Notion 収益ダッシュボード日次更新

on:
  schedule:
    # 毎日 09:00 JST = UTC 00:00
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: read
  id-token: write   # OIDC で必須

concurrency:
  group: notion-revenue
  cancel-in-progress: false

jobs:
  notion-sync:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4

      - name: boto3インストール
        run: pip install boto3 --break-system-packages

      - name: AWS 認証 (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          # T2026-0502-SEC10-CODE-RETRY: OIDC 専用化 (AWS_ACCESS_KEY_ID 廃止)
          role-to-assume: ${{ secrets.AWS_ROLE_ARN_STANDARD }}
          aws-region: ap-northeast-1

      - name: Notion 収益ダッシュボード同期
        env:
          NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}
          NOTION_DB_REVENUE: ${{ secrets.NOTION_DB_REVENUE }}
          AWS_DEFAULT_REGION: ${{ secrets.AWS_DEFAULT_REGION || 'ap-northeast-1' }}
        run: python3 scripts/notion_revenue_sync.py
