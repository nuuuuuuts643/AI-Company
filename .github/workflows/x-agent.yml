name: X Agent (Twitter自動投稿)

on:
  # schedule: 停止中（X API Basic $100/月が必要なため 2026-04-23）
  workflow_dispatch:
    inputs:
      mode:
        description: '投稿モード (daily / weekly / monthly)'
        required: true
        default: 'daily'
        type: choice
        options:
          - daily
          - weekly
          - monthly
      dry_run:
        description: 'ドライラン（実際には投稿しない）'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

permissions:
  contents: read
  id-token: write   # OIDC で必須

jobs:
  # ─────────────────────────────────────────────────────────────────────────
  # 日次投稿 (JST 8:00 = UTC 23:00)
  # 注意: 週次・月次スケジュールと時刻が一部重なる場合、GitHub Actionsは
  # それぞれのトリガーで独立して実行する。月曜UTC 0:00は weekly のみ実行。
  # ─────────────────────────────────────────────────────────────────────────
  daily-post:
    name: 日次投稿 — 今日の急上昇トップ3
    runs-on: ubuntu-latest
    # cron '0 23 * * *' のみで実行（月曜UTC 0:00の週次・月次と区別）
    if: |
      github.event_name == 'workflow_dispatch' && github.event.inputs.mode == 'daily' ||
      github.event_name == 'schedule' && github.event.schedule == '0 23 * * *'

    steps:
      - uses: actions/checkout@v4

      - name: Python セットアップ
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 依存パッケージインストール
        run: pip install tweepy boto3

      - name: AWS 認証 (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          # T2026-0502-SEC10-CODE-RETRY: OIDC 専用化 (AWS_ACCESS_KEY_ID 廃止)
          role-to-assume: ${{ secrets.AWS_ROLE_ARN_STANDARD }}
          aws-region: ap-northeast-1

      - name: 日次投稿実行
        env:
          X_API_KEY:             ${{ secrets.X_API_KEY }}
          X_API_SECRET:          ${{ secrets.X_API_SECRET }}
          X_ACCESS_TOKEN:        ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_TOKEN_SECRET: ${{ secrets.X_ACCESS_TOKEN_SECRET }}
          SLACK_WEBHOOK:         ${{ secrets.SLACK_WEBHOOK }}
          AWS_DEFAULT_REGION:    ap-northeast-1
          DRY_RUN:               ${{ github.event.inputs.dry_run || 'false' }}
        run: |
          cd scripts
          if [ "$DRY_RUN" = "true" ]; then
            python3 x_agent.py --mode daily --dry-run
          else
            python3 x_agent.py --mode daily
          fi

  # ─────────────────────────────────────────────────────────────────────────
  # 週次投稿 (月曜 JST 9:00 = UTC 0:00)
  # ─────────────────────────────────────────────────────────────────────────
  weekly-post:
    name: 週次投稿 — 今週の5大ストーリー
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'workflow_dispatch' && github.event.inputs.mode == 'weekly' ||
      github.event_name == 'schedule' && github.event.schedule == '0 0 * * 1'

    steps:
      - uses: actions/checkout@v4

      - name: Python セットアップ
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 依存パッケージインストール
        run: pip install tweepy boto3

      - name: AWS 認証 (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          # T2026-0502-SEC10-CODE-RETRY: OIDC 専用化 (AWS_ACCESS_KEY_ID 廃止)
          role-to-assume: ${{ secrets.AWS_ROLE_ARN_STANDARD }}
          aws-region: ap-northeast-1

      - name: 週次投稿実行
        env:
          X_API_KEY:             ${{ secrets.X_API_KEY }}
          X_API_SECRET:          ${{ secrets.X_API_SECRET }}
          X_ACCESS_TOKEN:        ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_TOKEN_SECRET: ${{ secrets.X_ACCESS_TOKEN_SECRET }}
          SLACK_WEBHOOK:         ${{ secrets.SLACK_WEBHOOK }}
          AWS_DEFAULT_REGION:    ap-northeast-1
          DRY_RUN:               ${{ github.event.inputs.dry_run || 'false' }}
        run: |
          cd scripts
          if [ "$DRY_RUN" = "true" ]; then
            python3 x_agent.py --mode weekly --dry-run
          else
            python3 x_agent.py --mode weekly
          fi

  # ─────────────────────────────────────────────────────────────────────────
  # 月次投稿 (毎月1日 JST 9:00 = UTC 0:00)
  # ─────────────────────────────────────────────────────────────────────────
  monthly-post:
    name: 月次投稿 — 今月の総括
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'workflow_dispatch' && github.event.inputs.mode == 'monthly' ||
      github.event_name == 'schedule' && github.event.schedule == '0 0 1 * *'

    steps:
      - uses: actions/checkout@v4

      - name: Python セットアップ
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 依存パッケージインストール
        run: pip install tweepy boto3

      - name: AWS 認証 (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          # T2026-0502-SEC10-CODE-RETRY: OIDC 専用化 (AWS_ACCESS_KEY_ID 廃止)
          role-to-assume: ${{ secrets.AWS_ROLE_ARN_STANDARD }}
          aws-region: ap-northeast-1

      - name: 月次投稿実行
        env:
          X_API_KEY:             ${{ secrets.X_API_KEY }}
          X_API_SECRET:          ${{ secrets.X_API_SECRET }}
          X_ACCESS_TOKEN:        ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_TOKEN_SECRET: ${{ secrets.X_ACCESS_TOKEN_SECRET }}
          SLACK_WEBHOOK:         ${{ secrets.SLACK_WEBHOOK }}
          AWS_DEFAULT_REGION:    ap-northeast-1
          DRY_RUN:               ${{ github.event.inputs.dry_run || 'false' }}
        run: |
          cd scripts
          if [ "$DRY_RUN" = "true" ]; then
            python3 x_agent.py --mode monthly --dry-run
          else
            python3 x_agent.py --mode monthly
          fi
