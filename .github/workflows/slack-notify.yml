name: Slack通知

on:
  push:
    branches: [main]

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: コミット情報を取得してSlackに送信
        continue-on-error: true
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK }}
        run: |
          if [ -z "$SLACK_WEBHOOK_URL" ]; then
            echo "SLACK_WEBHOOK_URL未設定のためスキップ"
            exit 0
          fi
          COMMIT_MSG=$(git log -1 --pretty=format:"%s")
          COMMIT_AUTHOR=$(git log -1 --pretty=format:"%an")
          CHANGED_FILES=$(git diff --name-only HEAD~1 HEAD | head -20 | tr '\n' ', ' | sed 's/,$//')

          if echo "$COMMIT_MSG" | grep -q "secretary-run"; then
            TEXT="【AI-Company 定期報告】\n$COMMIT_MSG\n\n変更ファイル: $CHANGED_FILES"
          else
            TEXT="【AI-Company】$COMMIT_AUTHOR がpushしました\n$COMMIT_MSG\n\n変更ファイル: $CHANGED_FILES"
          fi

          python3 scripts/ci_slack_send.py "$TEXT"
