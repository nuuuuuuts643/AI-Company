name: Daily PV Slack 通知 (T2026-0502-AW)

# T2026-0502-AW (2026-05-02)
# 目的: 毎朝 1 行で PV / 登録 / コメント / お気に入り / 未対応問合せを Slack 投稿。
#       admin.html を開かなくてもスマホ通知で「今日の状態」が即座に分かるようにする。
#
# 背景: 2026-05-02 PO 議論「他のなんかPVとかわかるように見たい話」。
#       admin はログイン認証 + 読み込み待ちで遅く、毎朝の確認には重い。
#       既存 cf-analytics Lambda が毎朝 7:00 JST に S3 (api/cf-analytics.json) を更新するので
#       その30分後 (7:30 JST) に内容を Slack に POST する。
#
# データソース: https://flotopic.com/api/cf-analytics.json (CloudFront 経由・公開)
# 急変 alert: 前日比 PV が -50% 未満で 🚨 強調表示・-20% 未満で ⚠️
# (T2026-0502-AQ noindex 流入消失事故の再発を朝の通知で即時検知できる)

on:
  schedule:
    - cron: '30 22 * * *'  # UTC 22:30 = JST 07:30 (cf-analytics Lambda 22:00 UTC から30分後)
  workflow_dispatch:        # 手動でも発火可

permissions:
  contents: read

jobs:
  pv-slack:
    name: daily PV slack
    runs-on: ubuntu-latest
    steps:
      - name: PV データ取得 + Slack 投稿
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL || secrets.SLACK_WEBHOOK }}
        shell: bash
        run: |
          set -euo pipefail
          if [ -z "${SLACK_WEBHOOK_URL:-}" ]; then
            echo "::warning::SLACK_WEBHOOK 未設定 — 通知スキップ"
            exit 0
          fi

          # cf-analytics.json を取得 (-f で 4xx/5xx を exit 22 で明示化)
          # set -euo pipefail 下では || { } でエラー捕捉する
          curl -sSf -m 15 'https://flotopic.com/api/cf-analytics.json' -o /tmp/cf.json || {
            echo "::error::cf-analytics.json fetch failed (HTTP error or timeout)"
            curl -fsS -X POST -H 'Content-Type: application/json' \
              -d '{"text": ":warning: [Daily PV] cf-analytics.json fetch failed (毎朝 7:30 JST)"}' \
              "$SLACK_WEBHOOK_URL" || true
            exit 1
          }

          # Python で 1 行サマリー生成
          PAYLOAD=$(python3 <<'PY'
          import json, datetime
          d = json.load(open('/tmp/cf.json'))
          cf        = d.get('cf') or {}
          users     = d.get('users') or {}
          comments  = d.get('comments') or {}
          favorites = d.get('favorites') or {}
          daily     = sorted(cf.get('daily') or [], key=lambda x: x.get('date', ''))
          total7    = cf.get('totalPv7d') or 0

          # 前日比
          if len(daily) >= 2:
              latest_pv = int(daily[-1].get('count') or 0)
              prev_pv   = int(daily[-2].get('count') or 0)
              latest_date = daily[-1].get('date', '')
              if prev_pv > 0:
                  pct = round((latest_pv - prev_pv) / prev_pv * 100)
              else:
                  pct = 0
              # 急変 alert (T2026-0502-AQ 由来)
              if prev_pv >= 50 and pct < -50:
                  alert = "🚨 流入急減 (noindex/SEO 設定確認推奨)"
                  emoji = "🚨"
              elif prev_pv >= 50 and pct < -20:
                  alert = "⚠️ 要観察"
                  emoji = "⚠️"
              elif pct >= 20:
                  alert = ""
                  emoji = "📈"
              else:
                  alert = ""
                  emoji = "📊"
              arrow = "↑" if pct >= 0 else "↓"
              sign  = "+" if pct >= 0 else ""
              pv_part = f"PV {latest_pv} (前日比 {sign}{pct}% {arrow} | 前日 {prev_pv})"
          else:
              latest_date = daily[-1].get('date', '集計待ち') if daily else '集計待ち'
              pv_part = "PV 集計待ち"
              alert = ""
              emoji = "📊"

          # データ最終更新
          ga = d.get('generatedAt', '')
          age_text = ""
          if ga:
              try:
                  gen = datetime.datetime.fromisoformat(ga.replace('Z', '+00:00'))
                  age_h = (datetime.datetime.now(datetime.timezone.utc) - gen).total_seconds() / 3600
                  if age_h >= 25:
                      age_text = f" ⚠️ データ {round(age_h/24)}日前 (cf-analytics 停止疑い)"
              except Exception:
                  pass

          # 1 行サマリー
          line1 = f"{emoji} *[Flotopic 朝報] {latest_date}*"
          line2 = f"{pv_part} | 7日合計 {total7}"
          line3 = f"登録 {users.get('total',0)} (7日新規 {users.get('new7d',0)}) | コメント {comments.get('total',0)} (+{comments.get('new7d',0)}) | お気に入り {favorites.get('total',0)} (+{favorites.get('new7d',0)})"
          parts = [line1, line2, line3]
          if alert:
              parts.append(f"_{alert}_")
          if age_text:
              parts.append(age_text)
          text = "\n".join(parts)
          print(json.dumps({"text": text}, ensure_ascii=False))
          PY
          )

          curl -fsS -X POST -H 'Content-Type: application/json' \
            -d "$PAYLOAD" "$SLACK_WEBHOOK_URL"
          echo "✅ Daily PV Slack 通知完了"
