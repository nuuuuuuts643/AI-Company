name: PR File Conflict Guard

# 同一ファイルを複数 PR が同時編集していないか物理検出する。
# T2026-0429-PR-CONFLICT — 「同名ファイル並行編集禁止」ルールの物理ガード。

on:
  pull_request:
    types: [opened, reopened, synchronize, ready_for_review]

permissions:
  contents: read
  pull-requests: write

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run conflict check
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set +e
          OUT=$(bash scripts/check_pr_file_conflicts.sh 2>&1)
          EXIT=$?
          echo "exit_code=$EXIT" >> $GITHUB_OUTPUT
          {
            echo 'report<<EOF_REPORT'
            echo "$OUT"
            echo 'EOF_REPORT'
          } >> $GITHUB_OUTPUT
          echo "$OUT"
          exit 0

      - name: Comment on PR
        if: github.event.pull_request.number != null
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPORT: ${{ steps.check.outputs.report }}
          EXIT_CODE: ${{ steps.check.outputs.exit_code }}
        run: |
          if [ "$EXIT_CODE" = "0" ]; then
            STATUS="✅ PASS"
          else
            STATUS="❌ FAIL — コード本体の多重編集あり"
          fi
          BODY=$(printf '%s\n\n```\n%s\n```\n\n— pr-conflict-guard.yml (T2026-0429-PR-CONFLICT)\n' "$STATUS" "$REPORT")
          gh pr comment "$PR_NUMBER" --body "$BODY" || true

      - name: Fail if conflict detected
        if: steps.check.outputs.exit_code != '0'
        run: |
          echo "::error::コード本体ファイルが複数 PR で同時編集されています。1 PR にまとめるか順次 merge してください。"
          exit 1
