name: AI-Company マーケティングAI日次実行

on:
  schedule:
    - cron: '0 1 * * *'  # 毎日 10:00 JST (UTC 01:00)
  workflow_dispatch:

jobs:
  marketing:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: マーケティングAI実行
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          X_API_KEY: ${{ secrets.X_API_KEY }}
          X_API_SECRET: ${{ secrets.X_API_SECRET }}
          X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_TOKEN_SECRET: ${{ secrets.X_ACCESS_TOKEN_SECRET }}
        run: python3 scripts/marketing_agent.py

      - name: 変更をコミット・プッシュ
        run: |
          git config user.email "marketing@ai-company.local"
          git config user.name "AI-Company Marketing AI"
          git add dashboard/marketing-log.md
          git diff --cached --quiet || git commit -m "[marketing-agent] $(date +%Y-%m-%d) マーケティング日次レポート"
          git push
