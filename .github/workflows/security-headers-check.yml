name: security-headers-check
# SLI 7: セキュリティヘッダ外部観測 (T2026-0428-L)
#
# 毎日 03:17 JST (= 18:17 UTC) に flotopic.com の HTTP response header を確認し、
# strict-transport-security / x-frame-options / x-content-type-options /
# referrer-policy / permissions-policy のいずれかが欠落していたら fail する。
#
# 設計根拠:
#   - CloudFront response headers policy が管理画面で消える/上書きされる事故を外部観測で検知。
#   - governance worker (CloudWatch 内部 metric ベース) と並列の独立観測ライン。
#   - docs/sli-slo.md SLI 7 の実装本体。
#
# 失敗時:
#   - GH Actions UI に赤エラー
#   - (Slack 通知は webhook secret 設定後に追加。当面は GH Actions UI で十分)

on:
  schedule:
    # 毎日 18:17 UTC (= 翌 03:17 JST)。03:00 JST cron 群と被らない時刻に。
    - cron: '17 18 * * *'
  workflow_dispatch: {}
  push:
    paths:
      - 'scripts/security_headers_check.sh'
      - '.github/workflows/security-headers-check.yml'

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - uses: actions/checkout@v4

      - name: chmod
        run: chmod +x scripts/security_headers_check.sh

      - name: Run security headers check
        run: bash scripts/security_headers_check.sh https://flotopic.com/
