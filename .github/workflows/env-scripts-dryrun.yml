name: env-scripts dry-run（session_bootstrap.sh / triage_tasks.py）

# T2026-0428-K: 起動スクリプトの REPO 検出 / JST 表示 / WORKING.md 未来日付 stale 検出ロジックを
# 物理 test。git push / commit / mutation を起こさない `--dry-run` を CI で日次実行する。

on:
  schedule:
    # 毎日 JST 06:00 (= UTC 21:00) に走らせる
    - cron: '0 21 * * *'
  workflow_dispatch:
  push:
    paths:
      - 'scripts/session_bootstrap.sh'
      - 'scripts/triage_tasks.py'
      - '.github/workflows/env-scripts-dryrun.yml'
  pull_request:
    paths:
      - 'scripts/session_bootstrap.sh'
      - 'scripts/triage_tasks.py'
      - '.github/workflows/env-scripts-dryrun.yml'

jobs:
  dryrun:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: session_bootstrap.sh --dry-run smoke test
        id: smoke
        env:
          REPO: ${{ github.workspace }}
          # CI では合成 WORKING.md で並走 ≥2 を意図的に作るため bypass
          ALLOW_CONCURRENT_CODE: '1'
        run: |
          set -e
          out=$(bash scripts/session_bootstrap.sh --dry-run 2>&1)
          echo "$out"

          # 終端マーカー [DRY-RUN OK] が出ていることを assert
          echo "$out" | grep -q '\[DRY-RUN OK\]' \
            || { echo "::error::expected '[DRY-RUN OK]' marker missing — dry-run validation failed"; exit 1; }

          # 個別検証行 (REPO/JST/WORKING.md/git status/stale) がすべて [OK] であること
          for label in 'REPO == git toplevel' 'JST timezone offset = +0900' 'WORKING.md exists' 'git status runs on working tree' 'stale entry detection'; do
            echo "$out" | grep -q "\[OK\] $label" \
              || { echo "::error::dry-run check missing or failed: $label"; exit 1; }
          done

          # REPO 検出 / JST 表示 / DRY-RUN タグの存在を assert
          echo "$out" | grep -q "起動チェック完了" \
            || { echo "::error::expected '起動チェック完了' line missing"; exit 1; }
          echo "$out" | grep -q "DRY-RUN" \
            || { echo "::error::expected '[DRY-RUN]' tag missing"; exit 1; }
          echo "$out" | grep -qE 'JST' \
            || { echo "::error::JST timestamp missing"; exit 1; }
          echo "$out" | grep -q "REPO=$REPO" \
            || { echo "::error::REPO output mismatch (env REPO=$REPO)"; exit 1; }

          echo "✅ session_bootstrap.sh --dry-run smoke test passed"

      - name: WORKING.md stale 検出 unit test（過去 / 未来 / 現在の 3 行）
        run: |
          set -e
          # 現在の WORKING.md を退避し、合成版で test
          cp WORKING.md WORKING.md.orig

          NOW=$(TZ=Asia/Tokyo date '+%Y-%m-%d %H:%M')
          PAST=$(TZ=Asia/Tokyo date -d '12 hours ago' '+%Y-%m-%d %H:%M')
          FUTURE=$(TZ=Asia/Tokyo date -d '+12 hours' '+%Y-%m-%d %H:%M')

          cat > WORKING.md <<EOF
          # 着手中タスク

          ## 現在着手中

          | タスク名 | 種別 | 変更予定ファイル | 開始 JST | needs-push |
          |---|---|---|---|---|
          | [Code] dryrun-ci now | bug | a.py | $NOW | yes |
          | [Code] dryrun-ci past-stale | bug | b.py | $PAST | yes |
          | [Code] dryrun-ci future-stale | bug | c.py | $FUTURE | yes |
          EOF

          # triage 実行（mutation あり）
          python3 scripts/triage_tasks.py --clean-working-md || true

          # assert
          fail=0
          grep -q "dryrun-ci now" WORKING.md \
            || { echo "::error::current row was incorrectly removed"; fail=1; }
          if grep -q "dryrun-ci past-stale" WORKING.md; then
            echo "::error::past stale row (12h ago) still present — clean_working_md broken"
            fail=1
          fi
          if grep -q "dryrun-ci future-stale" WORKING.md; then
            echo "::error::future-dated row (+12h) still present — future tolerance broken"
            fail=1
          fi

          # WORKING.md を復元（push されないが念のため）
          mv WORKING.md.orig WORKING.md

          [ "$fail" = "0" ] || exit 1
          echo "✅ WORKING.md stale 検出 unit test passed"

      - name: REPO=missing-path で fail することを確認（負のテスト）
        run: |
          set +e
          REPO=/nonexistent/path/that/should/not/exist bash scripts/session_bootstrap.sh --dry-run 2>&1 | tee /tmp/out.log
          rc=${PIPESTATUS[0]}
          set -e
          if [ "$rc" = "0" ]; then
            echo "::error::expected non-zero exit when REPO is missing, got 0"
            exit 1
          fi
          grep -q "repo not found" /tmp/out.log \
            || { echo "::error::expected 'repo not found' message"; exit 1; }
          echo "✅ negative test (missing REPO) passed: rc=$rc"

      - name: Slack 通知 (失敗時のみ・SLACK_WEBHOOK_URL 設定時のみ)
        if: failure() && github.event_name == 'schedule'
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL || secrets.SLACK_WEBHOOK }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        shell: bash
        run: |
          if [ -z "${SLACK_WEBHOOK_URL:-}" ]; then
            echo "SLACK_WEBHOOK 未設定 — スキップ (CI ログのみで通知)"
            exit 0
          fi
          PAYLOAD=$(RUN_URL="$RUN_URL" python3 scripts/ci_slack_env_dryrun.py)
          curl -fsS -X POST -H 'Content-Type: application/json' -d "$PAYLOAD" "$SLACK_WEBHOOK_URL" || true
