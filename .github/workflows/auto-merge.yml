# T2026-0501-N: PR auto-merge (squash) — CI 全 green になったら GitHub が自動 squash merge
#
# 背景:
#   Code セッションが PR を作っても auto-merge が有効化されていなかったため、毎回手動マージが必要だった。
#   この workflow が `pull_request` イベントで `gh pr merge --auto --squash --delete-branch` を発動し、
#   GitHub の native auto-merge を ON にする。required checks が全 green になった瞬間に GitHub が squash merge する。
#
# スコープ (安全条件):
#   - draft PR は除外
#   - PR 作成者がリポジトリ owner と一致する PR のみ (= 外部コラボ・dependabot は無視)
#   - リポジトリ設定 `allow_auto_merge: true` 必須 (2026-05-02 確認済 = true)
#
# 失敗時の挙動:
#   - required checks 未設定の場合 `gh pr merge --auto` は 422 で失敗する → workflow も赤くなる (気付き機能)
#   - その他のエラーは continue-on-error せず明示的に fail させる (黙殺禁止)
#
# 参照: TASKS.md T2026-0501-N / CLAUDE.md「Dispatch 絶対禁止パターン」`gh pr create` 後の自動マージ
name: Auto-merge PRs (squash when CI green)

on:
  pull_request:
    types: [opened, reopened, synchronize, ready_for_review]

permissions:
  contents: write
  pull-requests: write

jobs:
  enable-auto-merge:
    name: enable squash auto-merge
    runs-on: ubuntu-latest
    if: >-
      github.event.pull_request.draft == false &&
      github.event.pull_request.user.login == github.repository_owner
    steps:
      - name: Enable auto-merge (squash + delete branch)
        env:
          # T2026-0502-AT 恒久対処 (2026-05-02): PAT (AUTO_MERGE_PAT) を優先使用。
          # 背景: GITHUB_TOKEN による push/merge は他の workflow を trigger しない (GitHub の制約)。
          #       これにより auto-merge.yml が squash merge しても deploy-p003.yml / deploy-lambdas.yml の
          #       push event / pull_request closed event が一切発火せず、PR merge 後に本番反映ゼロが
          #       長期発生していた (T2026-0502-AQ noindex 削除で 30 分間本番未反映が露見)。
          # PAT 化により merge actor が "user" になり、後続 workflow が正常に発火する。
          # AUTO_MERGE_PAT 未設定時は GITHUB_TOKEN にフォールバック (動作はするが deploy auto-trigger は失敗)。
          # 詳細: TASKS.md T2026-0502-AT / docs/lessons-learned.md T2026-0502-AT-MERGE-TOKEN-CONSTRAINT
          GH_TOKEN: ${{ secrets.AUTO_MERGE_PAT || secrets.GITHUB_TOKEN }}
          PAT_PRESENT: ${{ secrets.AUTO_MERGE_PAT != '' }}
          PR_URL: ${{ github.event.pull_request.html_url }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_AUTHOR: ${{ github.event.pull_request.user.login }}
        run: |
          set -euo pipefail
          echo "PR #${PR_NUMBER} by ${PR_AUTHOR} → ${PR_URL}"
          if [ "${PAT_PRESENT}" != "true" ]; then
            echo "::warning::AUTO_MERGE_PAT secret が未設定 — GITHUB_TOKEN にフォールバック中。"
            echo "::warning::この状態では PR merge 後の deploy-p003 / deploy-lambdas が auto-trigger されません (T2026-0502-AT 既知問題)。"
            echo "::warning::PO 操作必須: GitHub Settings → Developer settings → Personal access tokens (classic) で"
            echo "::warning::    scope=repo,workflow の PAT を発行 → リポジトリ Settings → Secrets and variables → Actions → New repository secret"
            echo "::warning::    name=AUTO_MERGE_PAT で登録"
          else
            echo "✅ AUTO_MERGE_PAT 使用中 — merge 後 deploy 系 workflow が正常に auto-trigger される想定"
          fi
          gh pr merge "$PR_URL" --auto --squash --delete-branch
          echo "✅ auto-merge enabled (squash, delete-branch)"
