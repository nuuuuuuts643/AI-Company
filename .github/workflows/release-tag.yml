name: Release Tag

on:
  workflow_dispatch:
  workflow_run:
    workflows: ["Deploy P003"]
    types: [completed]
    branches: [main]

permissions:
  contents: write

jobs:
  tag:
    if: github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Tag Release
        run: bash scripts/tag_release.sh
