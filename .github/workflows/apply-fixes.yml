name: コードを最新版に更新

on:
  workflow_dispatch:

concurrency:
  group: git-push
  cancel-in-progress: false

jobs:
  apply:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 秘書スクリプトを修正版に書き換え（コードファイル変更禁止ルール追加）
        run: |
          cat > /tmp/write_script.py << 'PYEOF'
          import base64
          data = '' + ''
          with open('scripts/secretary_run.py', 'wb') as f:
              f.write(base64.b64decode(data))
          print('secretary_run.py OK')
          PYEOF
          python3 /tmp/write_script.py

      - name: P003 app.js を最新版に復元
        run: |
          cat > /tmp/write_app.py << 'PYEOF'
          import base64
          data = '' + ''
          import os; os.makedirs('projects/P003-news-timeline/frontend', exist_ok=True)
          with open('projects/P003-news-timeline/frontend/app.js', 'wb') as f:
              f.write(base64.b64decode(data))
          print('app.js OK')
          PYEOF
          python3 /tmp/write_app.py

      - name: P003 style.css を最新版に復元
        run: |
          cat > /tmp/write_css.py << 'PYEOF'
          import base64
          data = '' + ''
          import os; os.makedirs('projects/P003-news-timeline/frontend', exist_ok=True)
          with open('projects/P003-news-timeline/frontend/style.css', 'wb') as f:
              f.write(base64.b64decode(data))
          print('style.css OK')
          PYEOF
          python3 /tmp/write_css.py

      - name: コミット・プッシュ
        run: |
          git config user.email "secretary@ai-company.local"
          git config user.name "AI-Company Secretary"
          git add -A
          git diff --cached --quiet || git commit -m "[fix] 秘書コードファイル変更禁止ルール追加 + P003 UI復元"
          git pull --rebase origin main
          git push

      - name: AWS認証情報を設定
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-northeast-1

      - name: P003 フロントエンドをS3に同期
        run: |
          aws s3 sync projects/P003-news-timeline/frontend/ \
            s3://p003-news-946554699567/ \
            --region ap-northeast-1
          echo "✅ P003 フロントエンド同期完了"
          echo "確認URL: http://p003-news-946554699567.s3-website-ap-northeast-1.amazonaws.com"
