name: コードを最新版に更新

on:
  workflow_dispatch:

jobs:
  apply:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 秘書スクリプトを修正版に書き換え
        run: |
          cat > /tmp/write_script.py << 'PYEOF'
          import base64
          data = ''
          with open('scripts/secretary_run.py', 'wb') as f:
              f.write(base64.b64decode(data))
          print('secretary_run.py wrote OK')
          PYEOF
          python3 /tmp/write_script.py
          rm -f notion-sync.js package.json package-lock.json fetch_notion.py setup_api_key.sh
          rm -rf node_modules
          echo "完了"

      - name: コミット・プッシュ
        run: |
          git config user.email "secretary@ai-company.local"
          git config user.name "AI-Company Secretary"
          git add -A
          git diff --cached --quiet || git commit -m "[fix] 秘書XMLフォーマット修正・クリーンアップ"
          git push
