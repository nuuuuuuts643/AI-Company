name: コードを最新版に更新

on:
  workflow_dispatch:

jobs:
  apply:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 秘書スクリプトを修正版に書き換え
        run: |
          cat > /tmp/write_script.py << 'PYEOF'
          import base64
          data = '' + ''
          with open('scripts/secretary_run.py', 'wb') as f:
              f.write(base64.b64decode(data))
          print('OK')
          PYEOF
          python3 /tmp/write_script.py

      - name: コミット・プッシュ
        run: |
          git config user.email "secretary@ai-company.local"
          git config user.name "AI-Company Secretary"
          git add -A
          git diff --cached --quiet || git commit -m "[fix] 秘書コードファイル変更禁止ルール追加"
          git push
