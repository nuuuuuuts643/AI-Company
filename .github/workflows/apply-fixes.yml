name: コードを最新版に更新

on:
  workflow_dispatch:

jobs:
  apply:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 秘書スクリプトを修正版に更新
        run: |
          echo "" | base64 -d > scripts/secretary_run.py
          echo "secretary_run.py 更新完了"

      - name: cron変更・不要ファイル削除
        run: |
          sed -i "s|cron: '0 0,8,16 \* \* \*'.*|cron: '0 0 * * *'  # 毎日09:00 JST|" .github/workflows/secretary.yml
          rm -f notion-sync.js package.json package-lock.json fetch_notion.py setup_api_key.sh
          rm -f projects/P004-slack-bot/lambda/function.zip
          rm -f projects/P003-news-timeline/lambda/tracker/tracker.zip
          rm -rf node_modules
          echo "クリーンアップ完了"

      - name: コミット・プッシュ
        run: |
          git config user.email "secretary@ai-company.local"
          git config user.name "AI-Company Secretary"
          git add -A
          git diff --cached --quiet || git commit -m "[fix] 秘書修正・cron1日1回・クリーンアップ"
          git push
          echo "完了"
