name: AI-Company 収益管理エージェント

on:
  schedule:
    # 毎週月曜 09:30 JST = UTC 月曜 00:30（JST 09:30 >= 09:00 なのでUTCは同日）
    - cron: '30 0 * * 1'
  workflow_dispatch:

concurrency:
  group: git-push
  cancel-in-progress: false

jobs:
  revenue-agent:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: boto3インストール
        run: pip install boto3 --break-system-packages

      - name: 収益管理エージェント実行
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: ${{ secrets.AWS_DEFAULT_REGION || 'ap-northeast-1' }}
        run: python3 scripts/revenue_agent.py

      - name: 変更をコミット・プッシュ
        run: |
          git config user.email "revenue-agent@ai-company.local"
          git config user.name "AI-Company Revenue Agent"
          git add dashboard/revenue-log.md
          git diff --cached --quiet || git commit -m "[revenue-agent] $(date +%Y-%m-%d) 収益レポート更新"
          git pull --rebase origin main
          git push
