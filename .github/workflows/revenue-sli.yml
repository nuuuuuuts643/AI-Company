name: 収益・PV週次SLI (T2026-0430-REV)

# T2026-0430-REV: 品質改善 (keyPoint / perspectives) が PV → 忍者AdMax 収益に
# 繋がっているかを週次で観測する仕組み。
# 観測項目:
#   ① cf-analytics.json から週間PV
#   ② DynamoDB p003-topics の META 件数 / aiGenerated 件数 (直近7日)
#   ③ docs/revenue-log.md の最新エントリ日付
# 失敗条件: 最終転記が 8 日以上前 → Slack 警告 (転記滞留検知)
# コスト: ubuntu-latest + curl + boto3 のみ。Lambda/Anthropic invoke なし。

on:
  schedule:
    - cron: '0 22 * * 0'   # 日曜 22:00 UTC = 月曜 07:00 JST (ux-check.yml と同タイミング)
  workflow_dispatch:

permissions:
  contents: read

jobs:
  revenue-sli:
    name: scripts/revenue_check.sh
    runs-on: ubuntu-latest
    env:
      AWS_ACCESS_KEY_ID:     ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_DEFAULT_REGION:    ap-northeast-1
    steps:
      - uses: actions/checkout@v4

      - name: setup python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: install boto3
        shell: bash
        run: pip install --quiet boto3==1.34.0

      - name: revenue_check.sh 実行 (JSON)
        id: rev
        shell: bash
        run: |
          set +e
          OUT=$(bash scripts/revenue_check.sh --json 2>&1)
          rc=$?
          echo "$OUT" > /tmp/rev.json
          echo "rc=$rc" >> "$GITHUB_OUTPUT"

          # 数値抽出 (parse 失敗は -1 として扱う)
          PV=$(python3 scripts/ci_json_extract.py /tmp/rev.json pv.totalPv7d -1)
          PV_ST=$(python3 scripts/ci_json_extract.py /tmp/rev.json pv.status error)
          DDB_TOTAL=$(python3 scripts/ci_json_extract.py /tmp/rev.json ddb.topicTotal -1)
          DDB_AI7D=$(python3 scripts/ci_json_extract.py /tmp/rev.json ddb.aiGenerated7d -1)
          LOG_ST=$(python3 scripts/ci_json_extract.py /tmp/rev.json revenueLog.status missing)
          LOG_DATE=$(python3 scripts/ci_json_extract.py /tmp/rev.json revenueLog.latestDate "")
          LOG_AGE=$(python3 scripts/ci_json_extract.py /tmp/rev.json revenueLog.ageDays -1)

          {
            echo "pv=$PV"
            echo "pv_status=$PV_ST"
            echo "ddb_total=$DDB_TOTAL"
            echo "ddb_ai7d=$DDB_AI7D"
            echo "log_status=$LOG_ST"
            echo "log_date=$LOG_DATE"
            echo "log_age=$LOG_AGE"
          } >> "$GITHUB_OUTPUT"

          # Step Summary
          {
            echo "## 収益・PV週次SLI"
            echo ""
            echo "| 項目 | 値 | 状態 |"
            echo "|---|---|---|"
            echo "| 週間PV (Cloudflare) | ${PV} | ${PV_ST} |"
            echo "| DDB META 総数 | ${DDB_TOTAL} | - |"
            echo "| 直近7日 aiGenerated | ${DDB_AI7D} | - |"
            echo "| revenue-log.md 最終転記 | ${LOG_DATE:-未記録} (${LOG_AGE}日前) | ${LOG_ST} |"
            echo ""
            echo "### 判定"
            echo "- log_status=fresh (≤7d): OK"
            echo "- log_status=stale (8〜14d): WARN (転記促し)"
            echo "- log_status=overdue (>14d) / missing / empty: ERROR (Slack 警告)"
            echo ""
            echo "_T2026-0430-REV: 品質SLI × 収益の相関を週次計測する基盤_"
          } >> "$GITHUB_STEP_SUMMARY"
          exit 0

      - name: Slack 警告 (転記滞留 8 日以上)
        if: steps.rev.outputs.log_status == 'overdue' || steps.rev.outputs.log_status == 'missing' || steps.rev.outputs.log_status == 'empty' || steps.rev.outputs.log_status == 'stale'
        continue-on-error: true
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL || secrets.SLACK_WEBHOOK }}
          PV: ${{ steps.rev.outputs.pv }}
          PV_ST: ${{ steps.rev.outputs.pv_status }}
          LOG_ST: ${{ steps.rev.outputs.log_status }}
          LOG_DATE: ${{ steps.rev.outputs.log_date }}
          LOG_AGE: ${{ steps.rev.outputs.log_age }}
        shell: bash
        run: |
          if [ -z "${SLACK_WEBHOOK_URL:-}" ]; then
            echo "::warning::revenue-sli: log_status=$LOG_ST date=$LOG_DATE age=${LOG_AGE}日 PV=$PV"
            exit 0
          fi
          ICON=$([ "$LOG_ST" = "overdue" ] || [ "$LOG_ST" = "missing" ] && echo ':rotating_light:' || echo ':warning:')
          PAYLOAD=$(LOG_ST="$LOG_ST" LOG_DATE="$LOG_DATE" LOG_AGE="$LOG_AGE" PV="$PV" PV_ST="$PV_ST" ICON="$ICON" python3 scripts/ci_slack_revenue_sli.py)
          curl -fsS -X POST -H 'Content-Type: application/json' -d "$PAYLOAD" "$SLACK_WEBHOOK_URL" || true
