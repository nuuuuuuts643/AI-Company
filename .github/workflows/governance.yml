name: ガバナンス（セキュリティ・リーガル・全エージェント監査）

# =============================================================================
# 一連の流れとして通る統合ガバナンスパイプライン
#
# push/PR時:
#   security-layer1 → security-layer2 → legal-layer2 → audit-all
#   全部パスして初めてデプロイを許可する
#
# 定期実行（全てUTCで記載・JST = UTC+9）:
#   毎週月曜 08:00 JST (UTC日曜23:00): セキュリティ週次監査 (Layer3)
#   毎月   1日 09:00 JST (UTC 1日 00:00): リーガル月次監査 (Layer3)
#   ※月初JST00:00をUTCで正確に表現するにはL構文が必要だがGH Actionsは非対応
#     → 1日09:00 JSTに変更（実害なし）
# =============================================================================

on:
  # push/PR時: L1→L2→Legal→Audit の直列パイプライン（SecurityAI/AuditAI 有効）
  push:
    branches: [main]
  pull_request:
    branches: [main]
  # 定期実行（UTCで記載）
  schedule:
    # 毎週月曜 08:00 JST = UTC 日曜 23:00: セキュリティ週次監査 (Layer3)
    - cron: '0 23 * * 0'
    # 毎月 1日 09:00 JST = UTC 1日 00:00: リーガル月次監査 (Layer3)
    - cron: '0 0 1 * *'
  workflow_dispatch:
    inputs:
      layer:
        description: '実行レイヤー (1/2/3/all)'
        required: false
        default: 'all'
      target_agent:
        description: '監査対象エージェント (all/ceo/secretary/...)'
        required: false
        default: 'all'

permissions:
  contents: read
  id-token: write   # OIDC で必須

# =============================================================================
# Job 1: セキュリティ Layer 1 — シークレットスキャン（即時）
# =============================================================================
jobs:
  security-layer1:
    name: 🔐 セキュリティL1 — シークレットスキャン
    runs-on: ubuntu-latest
    # push/PR時は常に実行。schedule時はcronの条件によって制御
    if: |
      github.event_name == 'push' ||
      github.event_name == 'pull_request' ||
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'schedule')

    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4

      - name: Python セットアップ
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 依存パッケージインストール
        run: |
          pip install boto3 --quiet

      - name: AWS 認証 (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          # T2026-0502-SEC10-CODE-RETRY: OIDC 専用化 (AWS_ACCESS_KEY_ID 廃止)
          role-to-assume: ${{ secrets.AWS_ROLE_ARN_STANDARD }}
          aws-region: ap-northeast-1

      - name: セキュリティ Layer 1 実行（シークレットスキャン）
        env:
          LAYER: '1'
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK_URL }}
          AWS_DEFAULT_REGION: ap-northeast-1
          # Layer1はAWS不要だが一貫性のために設定
        run: |
          echo "=== SecurityAI Layer 1: シークレットスキャン ==="
          python3 scripts/security_agent.py
          echo "✅ Layer 1 完了"

  # =============================================================================
  # Job 2: セキュリティ Layer 2 — 脆弱性・S3・IAM（CIチェック）
  # =============================================================================
  security-layer2:
    name: 🛡️ セキュリティL2 — 脆弱性・S3・IAMチェック
    runs-on: ubuntu-latest
    needs: security-layer1

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 依存パッケージインストール
        run: pip install boto3 --quiet

      - name: AWS 認証 (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          # T2026-0502-SEC10-CODE-RETRY: OIDC 専用化 (AWS_ACCESS_KEY_ID 廃止)
          role-to-assume: ${{ secrets.AWS_ROLE_ARN_STANDARD }}
          aws-region: ap-northeast-1


      - name: セキュリティ Layer 2 実行
        env:
          LAYER: '2'
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK_URL }}
          AWS_DEFAULT_REGION: ap-northeast-1
        run: |
          echo "=== SecurityAI Layer 2: 脆弱性・S3・IAMチェック ==="
          python3 scripts/security_agent.py
          echo "✅ Layer 2 完了"

  # =============================================================================
  # Job 3: リーガル Layer 2 — デプロイ前リーガルチェック
  # =============================================================================
  legal-layer2:
    name: ⚖️ リーガルL2 — デプロイ前チェック
    runs-on: ubuntu-latest
    needs: security-layer2
    # push/PR時はスキップ（API費用削減）。月次スケジュール or 手動のみ実行。
    if: |
      (github.event_name == 'schedule' && github.event.schedule == '0 0 1 * *') ||
      github.event_name == 'workflow_dispatch'

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 依存パッケージインストール
        run: pip install boto3 --quiet

      - name: AWS 認証 (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          # T2026-0502-SEC10-CODE-RETRY: OIDC 専用化 (AWS_ACCESS_KEY_ID 廃止)
          role-to-assume: ${{ secrets.AWS_ROLE_ARN_STANDARD }}
          aws-region: ap-northeast-1


      - name: リーガル Layer 2 実行（デプロイ前チェック）
        env:
          LAYER: '2'
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK_URL }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          AWS_DEFAULT_REGION: ap-northeast-1
        run: |
          echo "=== LegalAI Layer 2: デプロイ前リーガルチェック ==="
          python3 scripts/legal_agent.py
          echo "✅ Legal Layer 2 完了"

  # =============================================================================
  # Job 4: 全エージェント監査（security + legal 完了後）
  # =============================================================================
  audit-all:
    name: 📋 外部監査AI — 全エージェント監査
    runs-on: ubuntu-latest
    needs: [security-layer2, legal-layer2]

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 依存パッケージインストール
        run: pip install boto3 --quiet

      - name: AWS 認証 (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          # T2026-0502-SEC10-CODE-RETRY: OIDC 専用化 (AWS_ACCESS_KEY_ID 廃止)
          role-to-assume: ${{ secrets.AWS_ROLE_ARN_STANDARD }}
          aws-region: ap-northeast-1


      - name: 全エージェント監査実行（CEOを経由せずPOさんに直接報告）
        # 重要: AuditAIはClaude APIを一切使わない（独立性の担保）
        # 判断はPython統計・ルールエンジンのみ（ANTHROPIC_API_KEY不要）
        env:
          AUDIT_TARGET: ${{ github.event.inputs.target_agent || 'all' }}
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK_URL }}
          # ANTHROPIC_API_KEY は意図的に渡さない — AuditAIはClaudeを呼ばない
          AWS_DEFAULT_REGION: ap-northeast-1
        run: |
          echo "=== AuditAI: 全エージェント監査（CEO含む9エージェント）==="
          echo "=== 判断方法: Python統計・ルールエンジン（Claude不使用）==="
          python3 scripts/audit_agent.py
          echo "✅ 全エージェント監査完了"

  # =============================================================================
  # Job 5: セキュリティ Layer 3 週次監査（スケジュール実行のみ）
  # =============================================================================
  security-weekly:
    name: 📊 セキュリティL3 — 週次総合監査
    runs-on: ubuntu-latest
    # 毎週月曜のスケジュール実行 or 手動実行のみ
    if: |
      (github.event_name == 'schedule' && github.event.schedule == '0 23 * * 0') ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.layer == '3')

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 依存パッケージインストール
        run: pip install boto3 --quiet

      - name: AWS 認証 (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          # T2026-0502-SEC10-CODE-RETRY: OIDC 専用化 (AWS_ACCESS_KEY_ID 廃止)
          role-to-assume: ${{ secrets.AWS_ROLE_ARN_STANDARD }}
          aws-region: ap-northeast-1


      - name: セキュリティ週次監査（Layer 3）
        env:
          LAYER: '3'
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK_URL }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          AWS_DEFAULT_REGION: ap-northeast-1
        run: |
          echo "=== SecurityAI Layer 3: 週次総合監査 ==="
          python3 scripts/security_agent.py
          echo "✅ 週次セキュリティ監査完了"

  # =============================================================================
  # Job 6: リーガル Layer 3 月次監査（スケジュール実行のみ）
  # =============================================================================
  legal-monthly:
    name: 📜 リーガルL3 — 月次規約変更チェック
    runs-on: ubuntu-latest
    # 毎月1日のスケジュール実行 or 手動実行のみ
    if: |
      (github.event_name == 'schedule' && github.event.schedule == '0 15 L * *') ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.layer == '3')

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 依存パッケージインストール
        run: pip install boto3 --quiet

      - name: AWS 認証 (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          # T2026-0502-SEC10-CODE-RETRY: OIDC 専用化 (AWS_ACCESS_KEY_ID 廃止)
          role-to-assume: ${{ secrets.AWS_ROLE_ARN_STANDARD }}
          aws-region: ap-northeast-1


      - name: リーガル月次監査（Layer 3）
        env:
          LAYER: '3'
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK_URL }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          AWS_DEFAULT_REGION: ap-northeast-1
        run: |
          echo "=== LegalAI Layer 3: 月次規約変更チェック ==="
          python3 scripts/legal_agent.py
          echo "✅ 月次リーガル監査完了"

  # =============================================================================
  # Job 7: ガバナンステーブル初期化（初回セットアップ用・手動実行のみ）
  # =============================================================================
  governance-init:
    name: ⚙️ ガバナンステーブル初期化（初回のみ）
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'workflow_dispatch' &&
      github.event.inputs.layer == 'init'

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 依存パッケージインストール
        run: pip install boto3 --quiet

      - name: AWS 認証 (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          # T2026-0502-SEC10-CODE-RETRY: OIDC 専用化 (AWS_ACCESS_KEY_ID 廃止)
          role-to-assume: ${{ secrets.AWS_ROLE_ARN_STANDARD }}
          aws-region: ap-northeast-1


      - name: DynamoDB テーブル初期化
        env:
          AWS_DEFAULT_REGION: ap-northeast-1
        run: |
          echo "=== ガバナンステーブル初期化 ==="
          python3 scripts/_governance_check.py
          echo "✅ テーブル初期化完了"
