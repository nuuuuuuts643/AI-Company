name: 鮮度モニタ (topics.json freshness SLI)

# T263 / lessons-learned「production 鮮度 SLI が無くて 14h 壊れに気付かなかった」対策。
#
# 目的: governance/processor とは別系統の「外部観測」レイヤー。
# Lambda 内部 metric では取れない「success だが publish しなかった」パターンを拾う。
#
# 仕組み:
#   1h ごとに `curl https://flotopic.com/api/topics.json` を取得
#   → updatedAt と現在時刻の差を計算
#   → 90 分超なら Slack 警告 (governance worker と別系統)
#   警告 payload には「最終成功時刻・差分(分)・スケジュール JST 情報」を含める。

on:
  schedule:
    - cron: '7 * * * *'   # 毎時 07 分 UTC。governance worker と被らない時刻に分散
  workflow_dispatch:

permissions:
  contents: read

jobs:
  check:
    name: topics.json updatedAt diff
    runs-on: ubuntu-latest
    env:
      FRESHNESS_URL: https://flotopic.com/api/topics.json
      FRESHNESS_THRESHOLD_MIN: '90'
    steps:
      - name: fetch topics.json と updatedAt 解析
        id: probe
        shell: bash
        run: |
          set -u
          PAYLOAD=$(mktemp)
          if ! curl -fsS --max-time 30 "$FRESHNESS_URL" -o "$PAYLOAD"; then
            echo "status=fetch_failed" >> "$GITHUB_OUTPUT"
            echo "diff_min=-1" >> "$GITHUB_OUTPUT"
            echo "updated_at=fetch_failed" >> "$GITHUB_OUTPUT"
            echo "::warning::topics.json 取得失敗 ($FRESHNESS_URL)"
            exit 0
          fi
          UPDATED_AT=$(python3 scripts/ci_json_field.py "$PAYLOAD" updatedAt "")
          if [ -z "$UPDATED_AT" ]; then
            echo "status=no_updated_at_field" >> "$GITHUB_OUTPUT"
            echo "diff_min=-1" >> "$GITHUB_OUTPUT"
            echo "updated_at=missing" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          DIFF_MIN=$(UPDATED_AT="$UPDATED_AT" python3 scripts/ci_freshness_diff_min.py)
          if [ "$DIFF_MIN" -lt 0 ]; then
            STATUS=parse_failed
          elif [ "$DIFF_MIN" -gt "$FRESHNESS_THRESHOLD_MIN" ]; then
            STATUS=stale
          else
            STATUS=fresh
          fi
          {
            echo "status=$STATUS"
            echo "diff_min=$DIFF_MIN"
            echo "updated_at=$UPDATED_AT"
          } >> "$GITHUB_OUTPUT"
          echo "🕐 updatedAt=$UPDATED_AT  diff=${DIFF_MIN} min  status=$STATUS  threshold=${FRESHNESS_THRESHOLD_MIN} min" >> "$GITHUB_STEP_SUMMARY"

      - name: Slack に警告 (90 分超 / fetch failure / parse failure)
        if: steps.probe.outputs.status != 'fresh'
        continue-on-error: true
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL || secrets.SLACK_WEBHOOK }}
          STATUS: ${{ steps.probe.outputs.status }}
          DIFF_MIN: ${{ steps.probe.outputs.diff_min }}
          UPDATED_AT: ${{ steps.probe.outputs.updated_at }}
        shell: bash
        run: |
          if [ -z "${SLACK_WEBHOOK_URL:-}" ]; then
            echo "SLACK_WEBHOOK 未設定。CI ログのみで通知"
            exit 0
          fi
          NEXT_JST=$(python3 scripts/ci_next_jst_schedule.py)
          INVOKE_LOG_URL='https://ap-northeast-1.console.aws.amazon.com/cloudwatch/home?region=ap-northeast-1#logsV2:log-groups/log-group/$252Faws$252Flambda$252Fp003-news-processor'
          PAYLOAD=$(STATUS="$STATUS" DIFF_MIN="$DIFF_MIN" UPDATED_AT="$UPDATED_AT" NEXT_JST="$NEXT_JST" INVOKE_LOG_URL="$INVOKE_LOG_URL" python3 scripts/ci_slack_freshness_stale.py)
          curl -fsS -X POST -H 'Content-Type: application/json' -d "$PAYLOAD" "$SLACK_WEBHOOK_URL" || true

      - name: stale 判定で job を赤くする (Slack 未設定でも GH Actions UI で気付ける)
        if: steps.probe.outputs.status == 'stale'
        shell: bash
        run: |
          echo "::error::topics.json が ${{ steps.probe.outputs.diff_min }} 分間更新されていません (閾値 ${{ env.FRESHNESS_THRESHOLD_MIN }} 分)。最終 updatedAt: ${{ steps.probe.outputs.updated_at }}"
          exit 1

      # =====================================================================
      # 半壊検出 (success-but-empty) — 2026-04-28 schedule-task で追加
      # 背景: T255 修正後も keyPoint 充填率 8.5% (10/117) と異常低値だが、
      #       既存 SLI は aiGenerated フラグまでしか見ないため素通りした。
      # 参考: docs/lessons-learned.md「success-but-empty 横展開」なぜなぜ
      # =====================================================================
      - name: 必須 AI フィールド充填率の観測 (SLI 8/9/10)
        id: ai_fields
        continue-on-error: true
        shell: bash
        env:
          FRESHNESS_URL: https://flotopic.com/api/topics.json
        run: |
          set -u
          PAYLOAD=$(mktemp)
          if ! curl -fsS --max-time 30 "$FRESHNESS_URL" -o "$PAYLOAD"; then
            echo "::warning::ai_fields probe: topics.json 取得失敗"
            echo "skipped=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          python3 - "$PAYLOAD" <<'PY' >> "$GITHUB_STEP_SUMMARY"
          import json, sys, os
          d = json.load(open(sys.argv[1]))
          topics = [t for t in d.get('topics', []) if t.get('lifecycleStatus') != 'archived']
          # フル要約対象 (cnt>=3) — _is_minimal=False と同条件
          full = [t for t in topics if t.get('articleCount', 0) >= 3]
          ai = [t for t in topics if t.get('aiGenerated')]
          ai_full = [t for t in full if t.get('aiGenerated')]
          if full:
              kp = sum(1 for t in full if t.get('keyPoint'))
              persp = sum(1 for t in full if t.get('perspectives'))
              kp_ratio = kp * 100 / len(full)
              persp_ratio = persp * 100 / len(full)
          else:
              kp_ratio = persp_ratio = 0
          # storyPhase 偏り
          phases = {}
          for t in topics:
              p = t.get('storyPhase') or 'unset'
              phases[p] = phases.get(p, 0) + 1
          start_ratio = phases.get('発端', 0) * 100 / max(len(topics), 1)
          # 出力 (background/backgroundContext は 2026-04-28 の 4軸再編で削除済 → SLI からも除外)
          print(f"### AI フィールド充填率 (articleCount>=3 のみ対象, n={len(full)})")
          print(f"- keyPoint:     {kp_ratio:.1f}% (閾値 70%)")
          print(f"- perspectives: {persp_ratio:.1f}% (閾値 60%)")
          print(f"- storyPhase '発端' 比率: {start_ratio:.1f}% (閾値 50%)")
          warnings = []
          if kp_ratio < 70:
              warnings.append(f'keyPoint:{kp_ratio:.1f}%')
          if persp_ratio < 60:
              warnings.append(f'perspectives:{persp_ratio:.1f}%')
          if start_ratio > 50:
              warnings.append(f"phase発端:{start_ratio:.1f}%")
          gh_out = os.environ.get('GITHUB_OUTPUT')
          if gh_out:
              with open(gh_out, 'a') as f:
                  f.write(f"warnings={','.join(warnings) if warnings else 'ok'}\n")
                  f.write(f"kp_ratio={kp_ratio:.1f}\n")
                  f.write(f"persp_ratio={persp_ratio:.1f}\n")
                  f.write(f"start_ratio={start_ratio:.1f}\n")
          PY

      # =====================================================================
      # <24h トピック比率 (SLI 12 / T2026-0430-F)
      # 背景 (2026-04-30): PR #46 で fetcher の DDB 書き込み Decimal ラップ漏れを修正
      #   するまで、3 日以上記事が DDB に保存されず topics-card.json の lastArticleAt が
      #   全件 24h+ 古いという「success-but-stale」が観測できていなかった。
      #   既存 SLI 1 (topics.json updatedAt) は publish の鮮度しか見ない → fetcher の
      #   DDB 書き込みが silently 失敗してもメタの updatedAt は新しいまま素通り。
      # 仕組み: topics-card.json の各 topic の lastArticleAt を見て、now - lastArticleAt
      #   < 24h の topic の割合を計算する。10% 未満なら「新規記事が流入していない」状態 →
      #   fetcher / processor のいずれかで silently fail している疑い。
      # 閾値: <24h 比率 < 10% で Slack 警告。
      #   通常運用 (健全な fetcher) では 24h 以内に 30〜50% のトピックが更新される想定。
      #   10% は明らかな異常検出ライン (発生したら fetcher 停滞・RSS 全滅などを疑う)。
      # =====================================================================
      - name: <24h トピック比率 (SLI 12 / T2026-0430-F)
        id: recent_ratio
        continue-on-error: true
        shell: bash
        env:
          CARD_URL: https://flotopic.com/api/topics-card.json
          RECENT_RATIO_THRESHOLD: '10'
        run: |
          set -u
          PAYLOAD=$(mktemp)
          if ! curl -fsS --max-time 30 "$CARD_URL" -o "$PAYLOAD"; then
            echo "::warning::recent_ratio: topics-card.json 取得失敗"
            echo "skipped=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          python3 - "$PAYLOAD" <<'PY' >> "$GITHUB_STEP_SUMMARY"
          import json, os, sys, time
          d = json.load(open(sys.argv[1]))
          topics = d.get('topics', d) if isinstance(d, dict) else d
          topics = [t for t in topics if t.get('lifecycleStatus') != 'archived']
          now = int(time.time())
          recent = 0
          missing = 0
          for t in topics:
              lat = t.get('lastArticleAt')
              try:
                  lat = int(lat or 0)
              except (TypeError, ValueError):
                  lat = 0
              if lat <= 0:
                  missing += 1
                  continue
              if now - lat < 86400:
                  recent += 1
          total = len(topics)
          ratio = (recent * 100 / total) if total else 0.0
          missing_ratio = (missing * 100 / total) if total else 0.0
          print(f"### <24h トピック比率 (SLI 12)")
          print(f"- 母数: {total} (archived 除外)")
          print(f"- <24h トピック数: {recent}")
          print(f"- <24h 比率: {ratio:.1f}% (閾値 {os.environ['RECENT_RATIO_THRESHOLD']}%)")
          print(f"- lastArticleAt 欠損: {missing} ({missing_ratio:.1f}%)")
          gh_out = os.environ.get('GITHUB_OUTPUT')
          if gh_out:
              with open(gh_out, 'a') as f:
                  f.write(f"ratio={ratio:.1f}\n")
                  f.write(f"recent={recent}\n")
                  f.write(f"total={total}\n")
                  f.write(f"missing={missing}\n")
                  threshold = float(os.environ['RECENT_RATIO_THRESHOLD'])
                  f.write(f"breached={'true' if (total > 0 and ratio < threshold) else 'false'}\n")
          PY

      - name: <24h トピック比率 閾値割れで警告 (Slack)
        if: steps.recent_ratio.outputs.breached == 'true'
        continue-on-error: true
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL || secrets.SLACK_WEBHOOK }}
          RATIO: ${{ steps.recent_ratio.outputs.ratio }}
          RECENT: ${{ steps.recent_ratio.outputs.recent }}
          TOTAL: ${{ steps.recent_ratio.outputs.total }}
          MISSING: ${{ steps.recent_ratio.outputs.missing }}
        shell: bash
        run: |
          if [ -z "${SLACK_WEBHOOK_URL:-}" ]; then
            echo "::warning::recent_ratio: <24h 比率 ${RATIO}% (閾値 10%) — fetcher 停滞疑い"
            exit 0
          fi
          PAYLOAD=$(RATIO="$RATIO" RECENT="$RECENT" TOTAL="$TOTAL" MISSING="$MISSING" python3 scripts/ci_slack_freshness_ratio.py)
          curl -fsS -X POST -H 'Content-Type: application/json' -d "$PAYLOAD" "$SLACK_WEBHOOK_URL" || true

      # =====================================================================
      # age decay 健全性 (T2026-0429-J)
      # 背景: PR#34 で hasAI sort 消失 + lastUpdated パース失敗 → return 1.0 で
      #   古い topic がフルウェイトのまま上位に出る事故が発生。再発防止に
      #   - lastUpdated 欠落率
      #   - 上位30件の 24h+ 比率
      #   を観測する。閾値超で job ログに warning だけ出す（Slack はノイズ過多回避）。
      # =====================================================================
      - name: age decay 健全性 (T2026-0429-J)
        id: age_decay
        continue-on-error: true
        shell: bash
        run: |
          set +e
          bash scripts/check_age_decay.sh https://flotopic.com/api/topics.json >> "$GITHUB_STEP_SUMMARY" 2>&1
          rc=$?
          echo "rc=$rc" >> "$GITHUB_OUTPUT"
          if [ $rc -eq 2 ]; then
            echo "::warning::age_decay: lastUpdated 欠落率が閾値超 (5%) — フォールバック多発"
          elif [ $rc -eq 1 ]; then
            echo "::notice::age_decay: 上位30件の 24h 超比率が 50% を超過"
          fi
          exit 0

      # =====================================================================
      # topics.json サイズ監視 (T2026-0428-F Step1)
      # 背景: 207KB / 115件 → 件数線形で増加。モバイル初回表示帯域コストの天井対策。
      # 250KB 超で警告 (将来 topics-card.json 切替の昇格 trigger)。
      # =====================================================================
      - name: topics.json サイズ観測 (T2026-0428-F)
        id: topics_size
        continue-on-error: true
        shell: bash
        env:
          FRESHNESS_URL: https://flotopic.com/api/topics.json
          SIZE_THRESHOLD_KB: '250'
        run: |
          set -u
          PAYLOAD=$(mktemp)
          if ! curl -fsS --max-time 30 "$FRESHNESS_URL" -o "$PAYLOAD"; then
            echo "size_kb=-1" >> "$GITHUB_OUTPUT"
            echo "exceeded=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          BYTES=$(wc -c < "$PAYLOAD")
          KB=$(( (BYTES + 1023) / 1024 ))
          if [ "$KB" -gt "$SIZE_THRESHOLD_KB" ]; then
            EXC=true
          else
            EXC=false
          fi
          echo "size_kb=$KB" >> "$GITHUB_OUTPUT"
          echo "size_bytes=$BYTES" >> "$GITHUB_OUTPUT"
          echo "exceeded=$EXC" >> "$GITHUB_OUTPUT"
          echo "### topics.json サイズ" >> "$GITHUB_STEP_SUMMARY"
          echo "- bytes: $BYTES" >> "$GITHUB_STEP_SUMMARY"
          echo "- KB: $KB (閾値 $SIZE_THRESHOLD_KB KB)" >> "$GITHUB_STEP_SUMMARY"
          echo "- exceeded: $EXC" >> "$GITHUB_STEP_SUMMARY"

      - name: topics.json サイズ超過で警告 (Slack)
        if: steps.topics_size.outputs.exceeded == 'true'
        continue-on-error: true
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL || secrets.SLACK_WEBHOOK }}
          KB: ${{ steps.topics_size.outputs.size_kb }}
        shell: bash
        run: |
          if [ -z "${SLACK_WEBHOOK_URL:-}" ]; then
            echo "::warning::topics.json サイズ超過: ${KB}KB (閾値 250KB)。topics-card.json 切替を検討"
            exit 0
          fi
          PAYLOAD=$(KB="$KB" python3 scripts/ci_slack_freshness_size.py)
          curl -fsS -X POST -H 'Content-Type: application/json' -d "$PAYLOAD" "$SLACK_WEBHOOK_URL" || true

      - name: AI フィールド半壊で警告 (Slack)
        if: steps.ai_fields.outputs.warnings != 'ok' && steps.ai_fields.outputs.warnings != ''
        continue-on-error: true
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL || secrets.SLACK_WEBHOOK }}
          WARNINGS: ${{ steps.ai_fields.outputs.warnings }}
          KP: ${{ steps.ai_fields.outputs.kp_ratio }}
          PERSP: ${{ steps.ai_fields.outputs.persp_ratio }}
          START: ${{ steps.ai_fields.outputs.start_ratio }}
        shell: bash
        run: |
          if [ -z "${SLACK_WEBHOOK_URL:-}" ]; then
            echo "::warning::AI フィールド半壊検出: $WARNINGS (kp=$KP%, persp=$PERSP%, 発端=$START%)"
            exit 0
          fi
          PAYLOAD=$(WARNINGS="$WARNINGS" KP="$KP" PERSP="$PERSP" START="$START" python3 scripts/ci_slack_freshness_ai_fields.py)
          curl -fsS -X POST -H 'Content-Type: application/json' -d "$PAYLOAD" "$SLACK_WEBHOOK_URL" || true

      # =====================================================================
      # sitemap URL 到達性チェック (SLI 11)
      # 背景 (2026-04-28 schedule-task で発見): news-sitemap.xml に登録した
      #     https://flotopic.com/topics/{tid}.html が 50/50 件 404 を返していた。
      #     SPA + 静的HTML 二系統運用で、SLI 1〜10 が topics.json 系のみだったため
      #     「sitemap に書いたが本物が無い」事故を物理ゲートで防げなかった。
      # 仕組み: news-sitemap.xml から URL を抽出 → ランダム 5 件 HEAD 200 確認。
      #         1 件でも非 200 で fail + Slack 通知。
      # 失敗時の分岐:
      #   - 全件 404 → 静的HTML 生成系の本番パイプライン断絶 (lifecycle 誤削除等)
      #   - 一部 404 → CloudFront キャッシュ TTL 内に S3 削除 → 鮮度問題
      # 関連: lessons-learned.md「監視に乗らない機能 (新機能の SLI 漏れ) なぜなぜ」
      # =====================================================================
      - name: sitemap URL 到達性チェック (SLI 11)
        id: sitemap_reach
        continue-on-error: true
        shell: bash
        env:
          SITEMAP_URL: https://flotopic.com/news-sitemap.xml
          SAMPLE_N: '5'
        run: |
          set -u
          SITEMAP=$(mktemp)
          if ! curl -fsS --max-time 30 "$SITEMAP_URL" -o "$SITEMAP"; then
            echo "::warning::sitemap_reach: news-sitemap.xml 取得失敗"
            echo "skipped=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          # <loc>...</loc> から URL を抽出 (最初に出てくるものから順に)
          URLS=$(grep -oE 'https://flotopic.com/[^<]+' "$SITEMAP" | grep -E '/topics/[a-z0-9]+\.html' | sort -u | shuf | head -n "$SAMPLE_N")
          if [ -z "$URLS" ]; then
            echo "::warning::sitemap_reach: news-sitemap.xml に topics/ URL が無い"
            echo "skipped=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          OK=0
          NG=0
          NG_LIST=""
          while IFS= read -r U; do
            CODE=$(curl -s -o /dev/null -w '%{http_code}' --max-time 15 "$U" || echo '000')
            if [ "$CODE" = "200" ]; then
              OK=$((OK+1))
            else
              NG=$((NG+1))
              NG_LIST="$NG_LIST\n$U => $CODE"
            fi
          done <<< "$URLS"
          TOTAL=$((OK+NG))
          echo "### sitemap URL 到達性 (SLI 11)" >> "$GITHUB_STEP_SUMMARY"
          echo "- sample: $TOTAL / OK: $OK / NG: $NG" >> "$GITHUB_STEP_SUMMARY"
          if [ "$NG" -gt 0 ]; then
            echo "- 詳細:" >> "$GITHUB_STEP_SUMMARY"
            echo -e "$NG_LIST" >> "$GITHUB_STEP_SUMMARY"
          fi
          {
            echo "ok_count=$OK"
            echo "ng_count=$NG"
            echo "total=$TOTAL"
            echo "ng_status=$([ "$NG" -gt 0 ] && echo broken || echo ok)"
          } >> "$GITHUB_OUTPUT"

      - name: sitemap URL 到達性 NG で警告 (Slack)
        if: steps.sitemap_reach.outputs.ng_status == 'broken'
        continue-on-error: true
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL || secrets.SLACK_WEBHOOK }}
          OK: ${{ steps.sitemap_reach.outputs.ok_count }}
          NG: ${{ steps.sitemap_reach.outputs.ng_count }}
          TOTAL: ${{ steps.sitemap_reach.outputs.total }}
        shell: bash
        run: |
          if [ -z "${SLACK_WEBHOOK_URL:-}" ]; then
            echo "::warning::sitemap_reach NG: $NG/$TOTAL"
            exit 0
          fi
          PAYLOAD=$(OK="$OK" NG="$NG" TOTAL="$TOTAL" python3 scripts/ci_slack_freshness_sitemap.py)
          curl -fsS -X POST -H 'Content-Type: application/json' -d "$PAYLOAD" "$SLACK_WEBHOOK_URL" || true

      # SLI-keypoint-fill-rate は別ワークフロー (sli-keypoint-fill-rate.yml) へ分離 (T2026-0428-BI)。
      # hourly DynamoDB scan は過剰だったため 6h scan へ削減 (-83%)。
