name: 鮮度モニタ (topics.json freshness SLI)

# T263 / lessons-learned「production 鮮度 SLI が無くて 14h 壊れに気付かなかった」対策。
#
# 目的: governance/processor とは別系統の「外部観測」レイヤー。
# Lambda 内部 metric では取れない「success だが publish しなかった」パターンを拾う。
#
# 仕組み:
#   1h ごとに `curl https://flotopic.com/api/topics.json` を取得
#   → updatedAt と現在時刻の差を計算
#   → 90 分超なら Slack 警告 (governance worker と別系統)
#   警告 payload には「最終成功時刻・差分(分)・スケジュール JST 情報」を含める。

on:
  schedule:
    - cron: '7 * * * *'   # 毎時 07 分 UTC。governance worker と被らない時刻に分散
  workflow_dispatch:

permissions:
  contents: read
  # T2026-0502-SEC10: OIDC role assumption 用 (AWS_ROLE_ARN_STANDARD 設定後に有効化)
  id-token: write

jobs:
  check:
    name: topics.json updatedAt diff
    runs-on: ubuntu-latest
    env:
      FRESHNESS_URL: https://flotopic.com/api/topics.json
      FRESHNESS_THRESHOLD_MIN: '90'
    steps:
      - uses: actions/checkout@v4

      - name: fetch topics.json と updatedAt 解析
        id: probe
        shell: bash
        run: |
          set -u
          PAYLOAD=$(mktemp)
          if ! curl -fsS --max-time 30 "$FRESHNESS_URL" -o "$PAYLOAD"; then
            echo "status=fetch_failed" >> "$GITHUB_OUTPUT"
            echo "diff_min=-1" >> "$GITHUB_OUTPUT"
            echo "updated_at=fetch_failed" >> "$GITHUB_OUTPUT"
            echo "::warning::topics.json 取得失敗 ($FRESHNESS_URL)"
            exit 0
          fi
          UPDATED_AT=$(python3 scripts/ci_json_field.py "$PAYLOAD" updatedAt "")
          if [ -z "$UPDATED_AT" ]; then
            echo "status=no_updated_at_field" >> "$GITHUB_OUTPUT"
            echo "diff_min=-1" >> "$GITHUB_OUTPUT"
            echo "updated_at=missing" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          DIFF_MIN=$(UPDATED_AT="$UPDATED_AT" python3 scripts/ci_freshness_diff_min.py)
          if [ "$DIFF_MIN" -lt 0 ]; then
            STATUS=parse_failed
          elif [ "$DIFF_MIN" -gt "$FRESHNESS_THRESHOLD_MIN" ]; then
            STATUS=stale
          else
            STATUS=fresh
          fi
          {
            echo "status=$STATUS"
            echo "diff_min=$DIFF_MIN"
            echo "updated_at=$UPDATED_AT"
          } >> "$GITHUB_OUTPUT"
          echo "🕐 updatedAt=$UPDATED_AT  diff=${DIFF_MIN} min  status=$STATUS  threshold=${FRESHNESS_THRESHOLD_MIN} min" >> "$GITHUB_STEP_SUMMARY"

      - name: Slack に警告 (90 分超 / fetch failure / parse failure)
        if: steps.probe.outputs.status != 'fresh'
        continue-on-error: true
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL || secrets.SLACK_WEBHOOK }}
          STATUS: ${{ steps.probe.outputs.status }}
          DIFF_MIN: ${{ steps.probe.outputs.diff_min }}
          UPDATED_AT: ${{ steps.probe.outputs.updated_at }}
        shell: bash
        run: |
          if [ -z "${SLACK_WEBHOOK_URL:-}" ]; then
            echo "SLACK_WEBHOOK 未設定。CI ログのみで通知"
            exit 0
          fi
          NEXT_JST=$(python3 scripts/ci_next_jst_schedule.py)
          INVOKE_LOG_URL='https://ap-northeast-1.console.aws.amazon.com/cloudwatch/home?region=ap-northeast-1#logsV2:log-groups/log-group/$252Faws$252Flambda$252Fp003-news-processor'
          PAYLOAD=$(STATUS="$STATUS" DIFF_MIN="$DIFF_MIN" UPDATED_AT="$UPDATED_AT" NEXT_JST="$NEXT_JST" INVOKE_LOG_URL="$INVOKE_LOG_URL" python3 scripts/ci_slack_freshness_stale.py)
          curl -fsS -X POST -H 'Content-Type: application/json' -d "$PAYLOAD" "$SLACK_WEBHOOK_URL" || true

      - name: stale 判定で job を赤くする (Slack 未設定でも GH Actions UI で気付ける)
        if: steps.probe.outputs.status == 'stale'
        shell: bash
        run: |
          echo "::error::topics.json が ${{ steps.probe.outputs.diff_min }} 分間更新されていません (閾値 ${{ env.FRESHNESS_THRESHOLD_MIN }} 分)。最終 updatedAt: ${{ steps.probe.outputs.updated_at }}"
          exit 1

      # =====================================================================
      # 半壊検出 (success-but-empty) — 2026-04-28 schedule-task で追加
      # 背景: T255 修正後も keyPoint 充填率 8.5% (10/117) と異常低値だが、
      #       既存 SLI は aiGenerated フラグまでしか見ないため素通りした。
      # 参考: docs/lessons-learned.md「success-but-empty 横展開」なぜなぜ
      # =====================================================================
      - name: 必須 AI フィールド充填率の観測 (SLI 8/9/10)
        id: ai_fields
        continue-on-error: true
        shell: bash
        env:
          FRESHNESS_URL: https://flotopic.com/api/topics.json
        run: |
          set -u
          PAYLOAD=$(mktemp)
          if ! curl -fsS --max-time 30 "$FRESHNESS_URL" -o "$PAYLOAD"; then
            echo "::warning::ai_fields probe: topics.json 取得失敗"
            echo "skipped=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          python3 - "$PAYLOAD" <<'PY' >> "$GITHUB_STEP_SUMMARY"
          import json, sys, os
          d = json.load(open(sys.argv[1]))
          topics = [t for t in d.get('topics', []) if t.get('lifecycleStatus') != 'archived']
          # フル要約対象 (cnt>=3) — _is_minimal=False と同条件
          full = [t for t in topics if t.get('articleCount', 0) >= 3]
          ai = [t for t in topics if t.get('aiGenerated')]
          ai_full = [t for t in full if t.get('aiGenerated')]
          if full:
              kp = sum(1 for t in full if t.get('keyPoint'))
              persp = sum(1 for t in full if t.get('perspectives'))
              kp_ratio = kp * 100 / len(full)
              persp_ratio = persp * 100 / len(full)
          else:
              kp_ratio = persp_ratio = 0
          # storyPhase 偏り
          phases = {}
          for t in topics:
              p = t.get('storyPhase') or 'unset'
              phases[p] = phases.get(p, 0) + 1
          start_ratio = phases.get('発端', 0) * 100 / max(len(topics), 1)
          # 出力 (background/backgroundContext は 2026-04-28 の 4軸再編で削除済 → SLI からも除外)
          print(f"### AI フィールド充填率 (articleCount>=3 のみ対象, n={len(full)})")
          print(f"- keyPoint:     {kp_ratio:.1f}% (閾値 70%)")
          print(f"- perspectives: {persp_ratio:.1f}% (閾値 60%)")
          print(f"- storyPhase '発端' 比率: {start_ratio:.1f}% (閾値 50%)")
          warnings = []
          if kp_ratio < 70:
              warnings.append(f'keyPoint:{kp_ratio:.1f}%')
          if persp_ratio < 60:
              warnings.append(f'perspectives:{persp_ratio:.1f}%')
          if start_ratio > 50:
              warnings.append(f"phase発端:{start_ratio:.1f}%")
          gh_out = os.environ.get('GITHUB_OUTPUT')
          if gh_out:
              with open(gh_out, 'a') as f:
                  f.write(f"warnings={','.join(warnings) if warnings else 'ok'}\n")
                  f.write(f"kp_ratio={kp_ratio:.1f}\n")
                  f.write(f"persp_ratio={persp_ratio:.1f}\n")
                  f.write(f"start_ratio={start_ratio:.1f}\n")
          PY

      # =====================================================================
      # <24h トピック比率 (SLI 12 / T2026-0430-F)
      # 背景 (2026-04-30): PR #46 で fetcher の DDB 書き込み Decimal ラップ漏れを修正
      #   するまで、3 日以上記事が DDB に保存されず topics-card.json の lastArticleAt が
      #   全件 24h+ 古いという「success-but-stale」が観測できていなかった。
      #   既存 SLI 1 (topics.json updatedAt) は publish の鮮度しか見ない → fetcher の
      #   DDB 書き込みが silently 失敗してもメタの updatedAt は新しいまま素通り。
      # 仕組み: topics-card.json の各 topic の lastArticleAt を見て、now - lastArticleAt
      #   < 24h の topic の割合を計算する。10% 未満なら「新規記事が流入していない」状態 →
      #   fetcher / processor のいずれかで silently fail している疑い。
      # 閾値: <24h 比率 < 10% で Slack 警告。
      #   通常運用 (健全な fetcher) では 24h 以内に 30〜50% のトピックが更新される想定。
      #   10% は明らかな異常検出ライン (発生したら fetcher 停滞・RSS 全滅などを疑う)。
      # =====================================================================
      - name: <24h トピック比率 (SLI 12 / T2026-0430-F)
        id: recent_ratio
        continue-on-error: true
        shell: bash
        env:
          CARD_URL: https://flotopic.com/api/topics-card.json
          RECENT_RATIO_THRESHOLD: '10'
        run: |
          set -u
          PAYLOAD=$(mktemp)
          if ! curl -fsS --max-time 30 "$CARD_URL" -o "$PAYLOAD"; then
            echo "::warning::recent_ratio: topics-card.json 取得失敗"
            echo "skipped=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          python3 - "$PAYLOAD" <<'PY' >> "$GITHUB_STEP_SUMMARY"
          import json, os, sys, time
          d = json.load(open(sys.argv[1]))
          topics = d.get('topics', d) if isinstance(d, dict) else d
          topics = [t for t in topics if t.get('lifecycleStatus') != 'archived']
          now = int(time.time())
          recent = 0
          missing = 0
          for t in topics:
              lat = t.get('lastArticleAt')
              try:
                  lat = int(lat or 0)
              except (TypeError, ValueError):
                  lat = 0
              if lat <= 0:
                  missing += 1
                  continue
              if now - lat < 86400:
                  recent += 1
          total = len(topics)
          ratio = (recent * 100 / total) if total else 0.0
          missing_ratio = (missing * 100 / total) if total else 0.0
          print(f"### <24h トピック比率 (SLI 12)")
          print(f"- 母数: {total} (archived 除外)")
          print(f"- <24h トピック数: {recent}")
          print(f"- <24h 比率: {ratio:.1f}% (閾値 {os.environ['RECENT_RATIO_THRESHOLD']}%)")
          print(f"- lastArticleAt 欠損: {missing} ({missing_ratio:.1f}%)")
          gh_out = os.environ.get('GITHUB_OUTPUT')
          if gh_out:
              with open(gh_out, 'a') as f:
                  f.write(f"ratio={ratio:.1f}\n")
                  f.write(f"recent={recent}\n")
                  f.write(f"total={total}\n")
                  f.write(f"missing={missing}\n")
                  threshold = float(os.environ['RECENT_RATIO_THRESHOLD'])
                  f.write(f"breached={'true' if (total > 0 and ratio < threshold) else 'false'}\n")
          PY

      - name: <24h トピック比率 閾値割れで警告 (Slack)
        if: steps.recent_ratio.outputs.breached == 'true'
        continue-on-error: true
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL || secrets.SLACK_WEBHOOK }}
          RATIO: ${{ steps.recent_ratio.outputs.ratio }}
          RECENT: ${{ steps.recent_ratio.outputs.recent }}
          TOTAL: ${{ steps.recent_ratio.outputs.total }}
          MISSING: ${{ steps.recent_ratio.outputs.missing }}
        shell: bash
        run: |
          if [ -z "${SLACK_WEBHOOK_URL:-}" ]; then
            echo "::warning::recent_ratio: <24h 比率 ${RATIO}% (閾値 10%) — fetcher 停滞疑い"
            exit 0
          fi
          PAYLOAD=$(RATIO="$RATIO" RECENT="$RECENT" TOTAL="$TOTAL" MISSING="$MISSING" python3 scripts/ci_slack_freshness_ratio.py)
          curl -fsS -X POST -H 'Content-Type: application/json' -d "$PAYLOAD" "$SLACK_WEBHOOK_URL" || true

      # =====================================================================
      # age decay 健全性 (T2026-0429-J)
      # 背景: PR#34 で hasAI sort 消失 + lastUpdated パース失敗 → return 1.0 で
      #   古い topic がフルウェイトのまま上位に出る事故が発生。再発防止に
      #   - lastUpdated 欠落率
      #   - 上位30件の 24h+ 比率
      #   を観測する。閾値超で job ログに warning だけ出す（Slack はノイズ過多回避）。
      # =====================================================================
      - name: age decay 健全性 (T2026-0429-J)
        id: age_decay
        continue-on-error: true
        shell: bash
        run: |
          set +e
          bash scripts/check_age_decay.sh https://flotopic.com/api/topics.json >> "$GITHUB_STEP_SUMMARY" 2>&1
          rc=$?
          echo "rc=$rc" >> "$GITHUB_OUTPUT"
          if [ $rc -eq 2 ]; then
            echo "::warning::age_decay: lastUpdated 欠落率が閾値超 (5%) — フォールバック多発"
          elif [ $rc -eq 1 ]; then
            echo "::notice::age_decay: 上位30件の 24h 超比率が 50% を超過"
          fi
          exit 0

      # =====================================================================
      # topics.json サイズ監視 (T2026-0428-F Step1)
      # 背景: 207KB / 115件 → 件数線形で増加。モバイル初回表示帯域コストの天井対策。
      # 250KB 超で警告 (将来 topics-card.json 切替の昇格 trigger)。
      # =====================================================================
      - name: topics.json サイズ観測 (T2026-0428-F)
        id: topics_size
        continue-on-error: true
        shell: bash
        env:
          FRESHNESS_URL: https://flotopic.com/api/topics.json
          SIZE_THRESHOLD_KB: '250'
        run: |
          set -u
          PAYLOAD=$(mktemp)
          if ! curl -fsS --max-time 30 "$FRESHNESS_URL" -o "$PAYLOAD"; then
            echo "size_kb=-1" >> "$GITHUB_OUTPUT"
            echo "exceeded=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          BYTES=$(wc -c < "$PAYLOAD")
          KB=$(( (BYTES + 1023) / 1024 ))
          if [ "$KB" -gt "$SIZE_THRESHOLD_KB" ]; then
            EXC=true
          else
            EXC=false
          fi
          echo "size_kb=$KB" >> "$GITHUB_OUTPUT"
          echo "size_bytes=$BYTES" >> "$GITHUB_OUTPUT"
          echo "exceeded=$EXC" >> "$GITHUB_OUTPUT"
          echo "### topics.json サイズ" >> "$GITHUB_STEP_SUMMARY"
          echo "- bytes: $BYTES" >> "$GITHUB_STEP_SUMMARY"
          echo "- KB: $KB (閾値 $SIZE_THRESHOLD_KB KB)" >> "$GITHUB_STEP_SUMMARY"
          echo "- exceeded: $EXC" >> "$GITHUB_STEP_SUMMARY"

      - name: topics.json サイズ超過で警告 (Slack)
        if: steps.topics_size.outputs.exceeded == 'true'
        continue-on-error: true
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL || secrets.SLACK_WEBHOOK }}
          KB: ${{ steps.topics_size.outputs.size_kb }}
        shell: bash
        run: |
          if [ -z "${SLACK_WEBHOOK_URL:-}" ]; then
            echo "::warning::topics.json サイズ超過: ${KB}KB (閾値 250KB)。topics-card.json 切替を検討"
            exit 0
          fi
          PAYLOAD=$(KB="$KB" python3 scripts/ci_slack_freshness_size.py)
          curl -fsS -X POST -H 'Content-Type: application/json' -d "$PAYLOAD" "$SLACK_WEBHOOK_URL" || true

      - name: AI フィールド半壊で警告 (Slack)
        if: steps.ai_fields.outputs.warnings != 'ok' && steps.ai_fields.outputs.warnings != ''
        continue-on-error: true
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL || secrets.SLACK_WEBHOOK }}
          WARNINGS: ${{ steps.ai_fields.outputs.warnings }}
          KP: ${{ steps.ai_fields.outputs.kp_ratio }}
          PERSP: ${{ steps.ai_fields.outputs.persp_ratio }}
          START: ${{ steps.ai_fields.outputs.start_ratio }}
        shell: bash
        run: |
          if [ -z "${SLACK_WEBHOOK_URL:-}" ]; then
            echo "::warning::AI フィールド半壊検出: $WARNINGS (kp=$KP%, persp=$PERSP%, 発端=$START%)"
            exit 0
          fi
          PAYLOAD=$(WARNINGS="$WARNINGS" KP="$KP" PERSP="$PERSP" START="$START" python3 scripts/ci_slack_freshness_ai_fields.py)
          curl -fsS -X POST -H 'Content-Type: application/json' -d "$PAYLOAD" "$SLACK_WEBHOOK_URL" || true

      # =====================================================================
      # sitemap URL 到達性チェック (SLI 11)
      # 背景 (2026-04-28 schedule-task で発見): news-sitemap.xml に登録した
      #     https://flotopic.com/topics/{tid}.html が 50/50 件 404 を返していた。
      #     SPA + 静的HTML 二系統運用で、SLI 1〜10 が topics.json 系のみだったため
      #     「sitemap に書いたが本物が無い」事故を物理ゲートで防げなかった。
      # 仕組み: news-sitemap.xml から URL を抽出 → ランダム 5 件 HEAD 200 確認。
      #         1 件でも非 200 で fail + Slack 通知。
      # 失敗時の分岐:
      #   - 全件 404 → 静的HTML 生成系の本番パイプライン断絶 (lifecycle 誤削除等)
      #   - 一部 404 → CloudFront キャッシュ TTL 内に S3 削除 → 鮮度問題
      # 関連: lessons-learned.md「監視に乗らない機能 (新機能の SLI 漏れ) なぜなぜ」
      # =====================================================================
      - name: sitemap URL 到達性チェック (SLI 11)
        id: sitemap_reach
        continue-on-error: true
        shell: bash
        env:
          SITEMAP_URL: https://flotopic.com/news-sitemap.xml
          SAMPLE_N: '5'
        run: |
          set -u
          SITEMAP=$(mktemp)
          if ! curl -fsS --max-time 30 "$SITEMAP_URL" -o "$SITEMAP"; then
            echo "::warning::sitemap_reach: news-sitemap.xml 取得失敗"
            echo "skipped=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          # <loc>...</loc> から URL を抽出 (最初に出てくるものから順に)
          URLS=$(grep -oE 'https://flotopic.com/[^<]+' "$SITEMAP" | grep -E '/topics/[a-z0-9]+\.html' | sort -u | shuf | head -n "$SAMPLE_N")
          if [ -z "$URLS" ]; then
            echo "::warning::sitemap_reach: news-sitemap.xml に topics/ URL が無い"
            echo "skipped=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          OK=0
          NG=0
          NG_LIST=""
          while IFS= read -r U; do
            CODE=$(curl -s -o /dev/null -w '%{http_code}' --max-time 15 "$U" || echo '000')
            if [ "$CODE" = "200" ]; then
              OK=$((OK+1))
            else
              NG=$((NG+1))
              NG_LIST="$NG_LIST\n$U => $CODE"
            fi
          done <<< "$URLS"
          TOTAL=$((OK+NG))
          echo "### sitemap URL 到達性 (SLI 11)" >> "$GITHUB_STEP_SUMMARY"
          echo "- sample: $TOTAL / OK: $OK / NG: $NG" >> "$GITHUB_STEP_SUMMARY"
          if [ "$NG" -gt 0 ]; then
            echo "- 詳細:" >> "$GITHUB_STEP_SUMMARY"
            echo -e "$NG_LIST" >> "$GITHUB_STEP_SUMMARY"
          fi
          {
            echo "ok_count=$OK"
            echo "ng_count=$NG"
            echo "total=$TOTAL"
            echo "ng_status=$([ "$NG" -gt 0 ] && echo broken || echo ok)"
          } >> "$GITHUB_OUTPUT"

      - name: sitemap URL 到達性 NG で警告 (Slack)
        if: steps.sitemap_reach.outputs.ng_status == 'broken'
        continue-on-error: true
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL || secrets.SLACK_WEBHOOK }}
          OK: ${{ steps.sitemap_reach.outputs.ok_count }}
          NG: ${{ steps.sitemap_reach.outputs.ng_count }}
          TOTAL: ${{ steps.sitemap_reach.outputs.total }}
        shell: bash
        run: |
          if [ -z "${SLACK_WEBHOOK_URL:-}" ]; then
            echo "::warning::sitemap_reach NG: $NG/$TOTAL"
            exit 0
          fi
          PAYLOAD=$(OK="$OK" NG="$NG" TOTAL="$TOTAL" python3 scripts/ci_slack_freshness_sitemap.py)
          curl -fsS -X POST -H 'Content-Type: application/json' -d "$PAYLOAD" "$SLACK_WEBHOOK_URL" || true

      # =====================================================================
      # ローカル diverge 観測 (SLI 13 / T2026-0502-DIVERGE-SLI)
      # 背景: T2026-0502-M で origin/main との diverge が 11h 放置された。
      #   pre-push hook / bootstrap exit 1 で発生は塞いだが bypass 時の検出網が欠如。
      #   本 SLI が「外部観測」レイヤーとして 2 commits 以上を検知する。
      #   30 分連続で 2 以上 → Slack 通知 / 5 以上 → CloudWatch ERROR アラート。
      # 注意: GitHub Actions は main ブランチを checkout するため、通常運用では 0 になる。
      #   PR が open のまま放置されたり merge が詰まった場合に count が増加する。
      # =====================================================================
      - name: ローカル diverge 観測 (SLI 13)
        id: diverge_sli
        continue-on-error: true
        shell: bash
        run: |
          set +e
          bash scripts/check_diverge_sli.sh >> "$GITHUB_STEP_SUMMARY" 2>&1
          rc=$?
          # check_diverge_sli.sh が stdout に diverge_count=N を出力するので再取得
          COUNT=$(bash scripts/check_diverge_sli.sh 2>/dev/null | grep "diverge_count=" | cut -d= -f2)
          COUNT="${COUNT:-0}"
          {
            echo "diverge_count=${COUNT}"
            echo "rc=${rc}"
            echo "warn_or_error=$([ "$rc" -ge 1 ] && echo true || echo false)"
          } >> "$GITHUB_OUTPUT"
          echo "### ローカル diverge 観測 (SLI 13)" >> "$GITHUB_STEP_SUMMARY"
          echo "- diverge_count: ${COUNT}" >> "$GITHUB_STEP_SUMMARY"
          echo "- status: $([ "$rc" -eq 0 ] && echo ok || ([ "$rc" -ge 2 ] && echo ERROR || echo WARN))" >> "$GITHUB_STEP_SUMMARY"
          # CloudWatch カスタムメトリクス put (失敗しても continue)
          python3 - "${COUNT}" <<'PY' || true
          import sys, os, json, urllib.request, time
          count = int(sys.argv[1]) if sys.argv[1].isdigit() else 0
          # AWS SDK が無い場合は put をスキップ（GitHub Actions 上は aws cli 経由）
          import subprocess
          r = subprocess.run([
              "aws", "cloudwatch", "put-metric-data",
              "--namespace", "Flotopic/Git",
              "--metric-name", "LocalDivergeCount",
              "--value", str(count),
              "--unit", "Count",
              "--region", "ap-northeast-1",
          ], capture_output=True, timeout=15)
          if r.returncode != 0:
              print(f"::warning::CloudWatch put-metric-data failed: {r.stderr.decode()[:200]}")
          PY
          exit 0

      - name: diverge WARN/ERROR で Slack 通知
        if: steps.diverge_sli.outputs.warn_or_error == 'true'
        continue-on-error: true
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL || secrets.SLACK_WEBHOOK }}
          COUNT: ${{ steps.diverge_sli.outputs.diverge_count }}
          RC: ${{ steps.diverge_sli.outputs.rc }}
        shell: bash
        run: |
          if [ -z "${SLACK_WEBHOOK_URL:-}" ]; then
            echo "::warning::diverge_sli: count=${COUNT} rc=${RC} — origin/main から diverge しています"
            exit 0
          fi
          LEVEL=$([ "${RC}" -ge 2 ] && echo "ERROR" || echo "WARN")
          PAYLOAD=$(python3 - <<PY
          import json
          level = "${LEVEL}"
          count = "${COUNT}"
          emoji = ":rotating_light:" if level == "ERROR" else ":warning:"
          text = f"{emoji} *[SLI 13] ローカル diverge 検出*\n- diverge_count: {count} commits\n- 閾値: WARN=2, ERROR=5\n- 確認: \`git rev-list --count origin/main..HEAD\`"
          print(json.dumps({"text": text}))
          PY
          )
          curl -fsS -X POST -H 'Content-Type: application/json' -d "$PAYLOAD" "$SLACK_WEBHOOK_URL" || true

      # =====================================================================
      # SES error rate 観測 (SLI 14 / T2026-0502-SES-METRIC-FILTER)
      # 背景: T2026-0502-S (lessons-learned) で `p003-contact` の SES SendEmail が
      #   silent fail し 1 ヶ月気付かれず放置された。handler.py 側は [ERROR] プレフィックスに
      #   昇格済 (PR #180) だが、ログを grep するレイヤーが必要。
      # 仕組み: CloudWatch Logs に `[ERROR] SES send` が直近 1h で N 件出現したかを観測。
      #   0 件 ok / 1〜4 WARN / 5+ ERROR。Slack 既存 webhook に乗せる。
      # 注意: aws logs filter-log-events のスキャン量は数 KB / 1h なので追加コストは実質ゼロ。
      # AWS 認証: secrets が無い環境では fail-open で skip (check_ses_error_sli.sh が exit 3)。
      # =====================================================================
      - name: AWS 認証 (SLI 14 用)
        id: aws_auth_sli14
        continue-on-error: true
        uses: aws-actions/configure-aws-credentials@v4
        with:
          # T2026-0502-SEC10: OIDC role assumption 専用に切替 (両建て廃止・2026-05-02 PM)。
          # 旧両建ては aws-access-key-id 同梱で v4 が AssumeRole (NOT WebIdentity) を選んでしまい
          # OIDC 経路が動かなかった。aws-access-key-id を削除して OIDC を強制する。
          # AWS_ROLE_ARN_STANDARD 未設定環境では continue-on-error: true で skip。
          # 詳細: docs/runbooks/github-actions-oidc-migration.md
          role-to-assume: ${{ secrets.AWS_ROLE_ARN_STANDARD }}
          aws-region: ap-northeast-1

      - name: SES error rate 観測 (SLI 14)
        id: ses_error_sli
        continue-on-error: true
        shell: bash
        run: |
          set +e
          bash scripts/check_ses_error_sli.sh >> "$GITHUB_STEP_SUMMARY" 2>&1
          rc=$?
          COUNT=$(bash scripts/check_ses_error_sli.sh 2>/dev/null | grep "ses_error_count=" | cut -d= -f2)
          COUNT="${COUNT:-unknown}"
          if [ "$rc" -eq 1 ] || [ "$rc" -eq 2 ]; then
            WARN_OR_ERROR=true
          else
            WARN_OR_ERROR=false
          fi
          {
            echo "ses_error_count=${COUNT}"
            echo "rc=${rc}"
            echo "warn_or_error=${WARN_OR_ERROR}"
          } >> "$GITHUB_OUTPUT"
          {
            echo "### SES error rate (SLI 14)"
            echo "- ses_error_count: ${COUNT}"
            if [ "$rc" -eq 0 ]; then
              echo "- status: ok"
            elif [ "$rc" -eq 1 ]; then
              echo "- status: WARN"
            elif [ "$rc" -eq 2 ]; then
              echo "- status: ERROR"
            else
              echo "- status: skipped (aws cli 不在 or 権限不足)"
            fi
          } >> "$GITHUB_STEP_SUMMARY"
          exit 0

      - name: SES error WARN/ERROR で Slack 通知
        if: steps.ses_error_sli.outputs.warn_or_error == 'true'
        continue-on-error: true
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL || secrets.SLACK_WEBHOOK }}
          COUNT: ${{ steps.ses_error_sli.outputs.ses_error_count }}
          RC: ${{ steps.ses_error_sli.outputs.rc }}
        shell: bash
        run: |
          if [ -z "${SLACK_WEBHOOK_URL:-}" ]; then
            echo "::warning::ses_error_sli: count=${COUNT} rc=${RC} — SES send error が発生中"
            exit 0
          fi
          LEVEL=$([ "${RC}" -eq 2 ] && echo "ERROR" || echo "WARN")
          PAYLOAD=$(python3 - <<PY
          import json
          level = "${LEVEL}"
          count = "${COUNT}"
          emoji = ":rotating_light:" if level == "ERROR" else ":warning:"
          text = (
              f"{emoji} *[SLI 14] SES send error 検出*\n"
              f"- ses_error_count: {count} 件 / 直近1h\n"
              f"- 閾値: WARN=1, ERROR=5\n"
              f"- 由来: T2026-0502-S lessons-learned (silent fail 再発防止)"
          )
          print(json.dumps({"text": text}))
          PY
          )
          curl -fsS -X POST -H 'Content-Type: application/json' -d "$PAYLOAD" "$SLACK_WEBHOOK_URL" || true

      - name: Cloudflare Web Analytics PV 急変観測 (SLI 15 / T2026-0502-AQ)
        id: cf_pv_drop
        continue-on-error: true
        shell: bash
        run: |
          # T2026-0502-AQ: ADSENSE-FIX で frontend/topic.html に noindex を入れて
          # Cloudflare PV が 4/27 260→4/28 20 (1/10) に急減した事故を 5 日間気づかなかった反省。
          # cf-analytics Lambda が 7:00 JST (22:00 UTC) に S3 に生成する api/cf-analytics.json の
          # daily PV を見て、前日比 50% 未満で ERROR、70% 未満で WARN を Slack に投げる。
          # 重複 Slack 防止のため UTC 22 時台 (= JST 7:00〜7:59・cf-analytics 更新直後) のみ判定。
          set +e
          curl -sS -m 10 'https://flotopic.com/api/cf-analytics.json' -o /tmp/cf.json
          if [ ! -s /tmp/cf.json ]; then
            echo "::warning::cf_pv_drop: cf-analytics.json fetch failed"
            echo "warn_or_error=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          python3 <<'PY' > /tmp/cf_drop.txt
          import json, sys, datetime
          # UTC 22 時台 (= JST 7:00〜7:59) のみ alert 判定 (cf-analytics 更新直後)
          if datetime.datetime.utcnow().hour != 22:
              print("skip_off_hour 0 0 0")
              sys.exit(0)
          try:
              d = json.load(open('/tmp/cf.json'))
              daily = (d.get('cf') or {}).get('daily') or []
              if len(daily) < 2:
                  print("skip_insufficient_data 0 0 0")
                  sys.exit(0)
              daily_sorted = sorted(daily, key=lambda x: x.get('date', ''))
              latest = daily_sorted[-1]
              prev = daily_sorted[-2]
              latest_pv = int(latest.get('count') or 0)
              prev_pv = int(prev.get('count') or 0)
              # 前日が 50 PV 未満ならノイズ過大で判定スキップ
              if prev_pv < 50:
                  print(f"skip_low_baseline {latest_pv} {prev_pv} 0")
                  sys.exit(0)
              ratio = latest_pv / prev_pv if prev_pv > 0 else 1.0
              if ratio < 0.5:
                  print(f"error {latest_pv} {prev_pv} {ratio:.3f}")
              elif ratio < 0.7:
                  print(f"warn {latest_pv} {prev_pv} {ratio:.3f}")
              else:
                  print(f"ok {latest_pv} {prev_pv} {ratio:.3f}")
          except Exception as e:
              print(f"parse_error 0 0 0")
          PY
          read -r STATUS LATEST PREV RATIO <<< "$(cat /tmp/cf_drop.txt)"
          echo "status=$STATUS latest=$LATEST prev=$PREV ratio=$RATIO"
          echo "status=$STATUS" >> "$GITHUB_OUTPUT"
          echo "latest=$LATEST" >> "$GITHUB_OUTPUT"
          echo "prev=$PREV" >> "$GITHUB_OUTPUT"
          echo "ratio=$RATIO" >> "$GITHUB_OUTPUT"
          if [ "$STATUS" = "warn" ] || [ "$STATUS" = "error" ]; then
            echo "warn_or_error=true" >> "$GITHUB_OUTPUT"
          else
            echo "warn_or_error=false" >> "$GITHUB_OUTPUT"
          fi

      - name: PV 前日比急減で Slack 通知 (T2026-0502-AQ 再発防止)
        if: steps.cf_pv_drop.outputs.warn_or_error == 'true'
        continue-on-error: true
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL || secrets.SLACK_WEBHOOK }}
          STATUS: ${{ steps.cf_pv_drop.outputs.status }}
          LATEST: ${{ steps.cf_pv_drop.outputs.latest }}
          PREV: ${{ steps.cf_pv_drop.outputs.prev }}
          RATIO: ${{ steps.cf_pv_drop.outputs.ratio }}
        shell: bash
        run: |
          if [ -z "${SLACK_WEBHOOK_URL:-}" ]; then
            echo "::warning::cf_pv_drop: status=${STATUS} ${PREV}→${LATEST} (ratio=${RATIO}) — Cloudflare PV 前日比急減"
            exit 0
          fi
          LEVEL=$([ "${STATUS}" = "error" ] && echo "ERROR" || echo "WARN")
          PAYLOAD=$(python3 - <<PY
          import json
          level = "${LEVEL}"
          latest = "${LATEST}"
          prev = "${PREV}"
          ratio = "${RATIO}"
          emoji = ":rotating_light:" if level == "ERROR" else ":warning:"
          text = (
              f"{emoji} *[SLI 15] Cloudflare Web Analytics PV 前日比急減*\n"
              f"- 前日 PV: {prev} → 当日 PV: {latest}\n"
              f"- 比率: {ratio} (閾値: WARN<0.7, ERROR<0.5)\n"
              f"- 由来: T2026-0502-AQ lessons-learned (noindex 流入消失 5 日無自覚を再発防止)"
          )
          print(json.dumps({"text": text}))
          PY
          )
          curl -fsS -X POST -H 'Content-Type: application/json' -d "$PAYLOAD" "$SLACK_WEBHOOK_URL" || true

      # SLI-keypoint-fill-rate は別ワークフロー (sli-keypoint-fill-rate.yml) へ分離 (T2026-0428-BI)。
      # hourly DynamoDB scan は過剰だったため 6h scan へ削減 (-83%)。

      # =====================================================================
      # ユーザーアクティビティメトリクス (SLI 16-19 / T2026-0502-Z)
      # 背景: DAU/WAU/再訪率 の計測インフラが未整備で「何人がサービスを使っているか」
      #   が不明なまま品質改善を続けていた。tracker Lambda が IP+UA ベースの
      #   匿名フィンガープリントを ANALYTICS#USER_DAY パーティションに書き込むことで
      #   ユーザー単位の行動が計測可能になった。
      # SLI-16: DAU (直近24h ユニークユーザー)   閾値 WARN < 1
      # SLI-17: WAU (直近7日 ユニークユーザー)   閾値 WARN < 3
      # SLI-18: 再訪率 (DAU ∩ 前日 / DAU)       観測のみ (閾値なし)
      # SLI-19: 平均滞在時間                     セッション終了イベント未実装のため N/A
      # データソース: DynamoDB p003-topics PK=ANALYTICS#USER_DAY SK=YYYYMMDD#fp16
      # =====================================================================
      - name: ユーザーアクティビティメトリクス (SLI 16-19)
        id: user_metrics
        continue-on-error: true
        env:
          TABLE_NAME: p003-topics
          REGION: ap-northeast-1
        shell: bash
        run: |
          set +e
          # AWS 認証は aws_auth_sli14 ステップの OIDC credentials を引き継ぐ。
          # sli_user_metrics.py の emit() が $GITHUB_OUTPUT と stdout 両方に key=value を書く。
          # 認証不可・DynamoDB 疎通不可時は status=skipped で exit 0 (ジョブを赤くしない)。
          METRICS=$(python3 scripts/sli_user_metrics.py 2>/dev/null) || METRICS=""
          if [ -z "$METRICS" ]; then
            echo "::warning::user_metrics: script failed — --dry-run fallback"
            METRICS=$(python3 scripts/sli_user_metrics.py --dry-run 2>/dev/null) || METRICS=""
          fi
          DAU=$(echo "$METRICS" | grep "^dau=" | cut -d= -f2)
          WAU=$(echo "$METRICS" | grep "^wau=" | cut -d= -f2)
          RR=$(echo "$METRICS" | grep "^return_rate=" | cut -d= -f2)
          DS=$(echo "$METRICS" | grep "^dau_status=" | cut -d= -f2)
          WS=$(echo "$METRICS" | grep "^wau_status=" | cut -d= -f2)
          ST=$(echo "$METRICS" | grep "^status=" | cut -d= -f2)
          {
            echo "### ユーザーアクティビティメトリクス (SLI 16-19)"
            echo "- DAU (SLI-16): ${DAU:-n/a}  status=${DS:-skipped}  (閾値 WARN < 1)"
            echo "- WAU (SLI-17): ${WAU:-n/a}  status=${WS:-skipped}  (閾値 WARN < 3)"
            echo "- 再訪率 (SLI-18): ${RR:-n/a}"
            echo "- 平均滞在時間 (SLI-19): n/a (セッション終了イベント未実装)"
            echo "- overall: ${ST:-skipped}"
          } >> "$GITHUB_STEP_SUMMARY"
          exit 0

      - name: ユーザーアクティビティ WARN で Slack 通知
        if: steps.user_metrics.outputs.status == 'warn'
        continue-on-error: true
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL || secrets.SLACK_WEBHOOK }}
          DAU: ${{ steps.user_metrics.outputs.dau }}
          WAU: ${{ steps.user_metrics.outputs.wau }}
          RETURN_RATE: ${{ steps.user_metrics.outputs.return_rate }}
          DAU_STATUS: ${{ steps.user_metrics.outputs.dau_status }}
          WAU_STATUS: ${{ steps.user_metrics.outputs.wau_status }}
        shell: bash
        run: |
          if [ -z "${SLACK_WEBHOOK_URL:-}" ]; then
            echo "::warning::user_metrics: DAU=${DAU}(${DAU_STATUS}) WAU=${WAU}(${WAU_STATUS}) 閾値割れ"
            exit 0
          fi
          PAYLOAD=$(python3 - <<'PY'
          import json, os
          dau = os.environ.get('DAU', 'n/a')
          wau = os.environ.get('WAU', 'n/a')
          rr  = os.environ.get('RETURN_RATE', 'n/a')
          ds  = os.environ.get('DAU_STATUS', '')
          ws  = os.environ.get('WAU_STATUS', '')
          text = (
              ":warning: *[SLI 16-19] ユーザーアクティビティ WARN*\n"
              f"- DAU (SLI-16): {dau} ({'⚠️ WARN' if ds=='warn' else 'ok'}, 閾値≥1)\n"
              f"- WAU (SLI-17): {wau} ({'⚠️ WARN' if ws=='warn' else 'ok'}, 閾値≥3)\n"
              f"- 再訪率 (SLI-18): {rr}\n"
              "- 由来: T2026-0502-Z DAU/WAU メトリクス計測インフラ"
          )
          print(json.dumps({"text": text}))
          PY
          )
          curl -fsS -X POST -H 'Content-Type: application/json' -d "$PAYLOAD" "$SLACK_WEBHOOK_URL" || true
