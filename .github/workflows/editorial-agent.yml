name: AI-Company 編集AIエージェント

on:
  schedule:
    # 毎週水曜 09:00 JST = UTC 水曜 00:00（JST 09:00 >= 09:00 なのでUTCは同日）
    - cron: '0 0 * * 3'
  workflow_dispatch:

jobs:
  editorial-agent:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: boto3インストール
        run: pip install boto3 --break-system-packages

      - name: 編集AIエージェント実行
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: ${{ secrets.AWS_DEFAULT_REGION || 'ap-northeast-1' }}
        run: python3 scripts/editorial_agent.py

      - name: 変更をコミット・プッシュ
        run: |
          git config user.email "editorial-agent@ai-company.local"
          git config user.name "AI-Company Editorial Agent"
          git add dashboard/editorial-log.md
          git diff --cached --quiet || git commit -m "[editorial-agent] $(date +%Y-%m-%d) 週次編集レポート更新"
          git push
