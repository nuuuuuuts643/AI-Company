name: AI-Company 編集AIエージェント

on:
  #   schedule:
  #    # 毎週水曜 09:00 JST = UTC 水曜 00:00（JST 09:00 >= 09:00 なのでUTCは同日）
  #     - cron: '0 0 * * 3'
  workflow_dispatch:

concurrency:
  group: git-push
  cancel-in-progress: false

jobs:
  editorial-agent:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write   # OIDC で必須
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: boto3インストール
        run: pip install boto3 --break-system-packages

      - name: AWS 認証 (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          # T2026-0502-SEC10-CODE: OIDC 専用化 (両建て廃止)
          role-to-assume: ${{ secrets.AWS_ROLE_ARN_STANDARD }}
          aws-region: ap-northeast-1

      - name: 編集AIエージェント実行
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          AWS_DEFAULT_REGION: ap-northeast-1
        run: python3 scripts/editorial_agent.py

      - name: 変更をコミット・プッシュ
        run: |
          git config user.email "editorial-agent@ai-company.local"
          git config user.name "AI-Company Editorial Agent"
          git add dashboard/editorial-log.md
          git diff --cached --quiet || git commit -m "[editorial-agent] $(date +%Y-%m-%d) 週次編集レポート更新"
          git pull --rebase origin main
          git push
