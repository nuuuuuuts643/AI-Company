# T2026-0502-SEC-AUDIT (2026-05-02): 物理ガード — Secret Scanner
# 起源: T2026-0502-SEC-AUDIT で current HEAD + git history に live PAT/Token/Webhook が
# 4 件発見された。既存の ci.yml は `sk-ant-` / `AKIA` のみ grep していたが、
# `ghp_*` / `gho_*` / `xoxb-*` / `ntn_*` / Slack Webhook などをカバーしていなかった。
#
# 本 workflow は (1) PR の diff (2) push 後の HEAD (3) git history 全体 を
# 包括的なパターンで grep し、漏洩を block する。
#
# 物理ルール: Secret 検出 → workflow fail → branch protection で merge 不可。
# ローカルでも `scripts/install_hooks.sh` で同じ pattern の pre-commit hook が動く。

name: Secret Scan

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # 週1 月曜 02:00 UTC = 月曜 11:00 JST に full-history scan を再実行
    # (主に過去にうっかり commit した secret の発見遅れを防ぐ)
    - cron: '0 2 * * 1'

permissions:
  contents: read

jobs:
  scan:
    name: secret pattern scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history (PR + push + schedule すべてで使う)

      # T2026-0502-AM: PR/push 時は head モード (現在の HEAD のみ高速 scan)、
      # 週次 schedule 時のみ full モード (git history 全件・重いが過去発見が目的)。
      # full は git history grep が CI 時間内に完了せず timeout 失敗を頻発していたため分離。
      # head での見逃しは schedule の週次 full で必ず追いつく二段防御。
      - name: Run secret scan (PR/push = head, schedule = full)
        run: |
          if [ "${{ github.event_name }}" = "schedule" ]; then
            echo "=== schedule trigger: full git-history scan ==="
            bash scripts/secret_scan.sh full
          else
            echo "=== PR/push trigger: HEAD-only scan (full は週次 schedule で実行) ==="
            bash scripts/secret_scan.sh head
          fi
