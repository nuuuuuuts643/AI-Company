name: Threads Agent (Threads自動投稿)

on:
  # 停止中（2026-04-24 Threads API設定が複雑なため保留）
  workflow_dispatch:
    inputs:
      mode:
        description: '投稿モード (daily / weekly / monthly)'
        required: true
        default: 'daily'
        type: choice
        options: [daily, weekly, monthly]
      dry_run:
        description: 'ドライラン（実際には投稿しない）'
        required: false
        default: 'false'
        type: choice
        options: ['false', 'true']

concurrency:
  group: threads-agent-${{ github.event.inputs.mode || 'schedule' }}
  cancel-in-progress: false

jobs:
  daily-post:
    name: 日次投稿 — 今日の急上昇トップ3
    runs-on: ubuntu-latest
    if: |
      (github.event_name == 'workflow_dispatch' && github.event.inputs.mode == 'daily') ||
      (github.event_name == 'schedule' && github.event.schedule == '0 23 * * *')
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install boto3
      - name: 日次投稿実行
        env:
          THREADS_USER_ID:      ${{ secrets.THREADS_USER_ID }}
          THREADS_ACCESS_TOKEN: ${{ secrets.THREADS_ACCESS_TOKEN }}
          SLACK_WEBHOOK:        ${{ secrets.SLACK_WEBHOOK_URL }}
          AWS_ACCESS_KEY_ID:    ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION:   ap-northeast-1
          DRY_RUN:              ${{ github.event.inputs.dry_run || 'false' }}
        run: |
          if [ "$DRY_RUN" = "true" ]; then
            python3 scripts/threads_agent.py --mode daily --dry-run
          else
            python3 scripts/threads_agent.py --mode daily
          fi

  weekly-post:
    name: 週次投稿 — 今週の5大ストーリー
    runs-on: ubuntu-latest
    if: |
      (github.event_name == 'workflow_dispatch' && github.event.inputs.mode == 'weekly') ||
      (github.event_name == 'schedule' && github.event.schedule == '0 0 * * 1')
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install boto3
      - name: 週次投稿実行
        env:
          THREADS_USER_ID:      ${{ secrets.THREADS_USER_ID }}
          THREADS_ACCESS_TOKEN: ${{ secrets.THREADS_ACCESS_TOKEN }}
          SLACK_WEBHOOK:        ${{ secrets.SLACK_WEBHOOK_URL }}
          AWS_ACCESS_KEY_ID:    ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION:   ap-northeast-1
          DRY_RUN:              ${{ github.event.inputs.dry_run || 'false' }}
        run: |
          if [ "$DRY_RUN" = "true" ]; then
            python3 scripts/threads_agent.py --mode weekly --dry-run
          else
            python3 scripts/threads_agent.py --mode weekly
          fi

  monthly-post:
    name: 月次投稿 — 今月の総括
    runs-on: ubuntu-latest
    if: |
      (github.event_name == 'workflow_dispatch' && github.event.inputs.mode == 'monthly') ||
      (github.event_name == 'schedule' && github.event.schedule == '0 0 1 * *')
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install boto3
      - name: 月次投稿実行
        env:
          THREADS_USER_ID:      ${{ secrets.THREADS_USER_ID }}
          THREADS_ACCESS_TOKEN: ${{ secrets.THREADS_ACCESS_TOKEN }}
          SLACK_WEBHOOK:        ${{ secrets.SLACK_WEBHOOK_URL }}
          AWS_ACCESS_KEY_ID:    ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION:   ap-northeast-1
          DRY_RUN:              ${{ github.event.inputs.dry_run || 'false' }}
        run: |
          if [ "$DRY_RUN" = "true" ]; then
            python3 scripts/threads_agent.py --mode monthly --dry-run
          else
            python3 scripts/threads_agent.py --mode monthly
          fi
