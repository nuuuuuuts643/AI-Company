name: 品質ヒール (daily quality_heal)

# T2026-0428-AO 自己修復基盤:
# DynamoDB の全トピックをスキャンして AI フィールド欠落・schema_version 古いトピックを
# pendingAI=True にセットする。次の processor サイクルで incremental モードで補完される。
#
# - daily 06:00 JST (= 21:00 UTC) に自動実行
# - workflow_dispatch で任意タイミング実行可
# - DRY_RUN=true で書き込みなし (Slack/Step Summary に分析のみ)

on:
  schedule:
    - cron: '0 21 * * *'  # 06:00 JST daily
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'dry-run mode (true/false)'
        required: false
        default: 'false'

permissions:
  contents: read

jobs:
  heal:
    name: quality_heal
    runs-on: ubuntu-latest
    env:
      AWS_ACCESS_KEY_ID:     ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_DEFAULT_REGION:    ap-northeast-1
      S3_BUCKET:             p003-news-946554699567
    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: setup python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: install boto3
        shell: bash
        run: pip install boto3==1.34.0

      - name: run quality_heal
        id: heal
        shell: bash
        run: |
          set -u
          MODE_FLAG=""
          if [ "${{ github.event.inputs.dry_run }}" != "true" ]; then
            MODE_FLAG="--apply"
          fi
          OUT=$(mktemp)
          python3 scripts/quality_heal.py $MODE_FLAG 2>&1 | tee "$OUT"
          # GitHub Step Summary
          {
            echo "### quality_heal 実行結果"
            echo '```'
            cat "$OUT"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: notify slack on failure
        if: failure()
        continue-on-error: true
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL || secrets.SLACK_WEBHOOK }}
        shell: bash
        run: |
          if [ -z "${SLACK_WEBHOOK_URL:-}" ]; then
            echo "::warning::SLACK_WEBHOOK 未設定"
            exit 0
          fi
          PAYLOAD=$(python3 scripts/ci_slack_quality_heal.py)
          curl -fsS -X POST -H 'Content-Type: application/json' -d "$PAYLOAD" "$SLACK_WEBHOOK_URL" || true
