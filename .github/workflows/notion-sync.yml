name: Notion同期（AI-Company状態更新）

on:
  schedule:
    # 毎朝 09:00 JST = UTC 00:00
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Python依存パッケージ
        run: pip install requests

      - name: Notion同期実行
        env:
          NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}
          NOTION_DATABASE_ID: 3488fff7e9cf80d0a5e7cb42e8a80cf3
        run: python3 scripts/notion_sync.py
