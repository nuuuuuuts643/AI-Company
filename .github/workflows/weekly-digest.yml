name: Weekly Digest Agent (週次ダイジェストAI)

on:
  #   schedule:
  #    # 毎週日曜日 21:00 UTC = 月曜日 06:00 JST
  #     - cron: '0 21 * * 0'
  workflow_dispatch:

concurrency:
  group: git-push
  cancel-in-progress: false

jobs:
  weekly-digest:
    name: Run Weekly Digest
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write   # OIDC で必須

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Python セットアップ
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: boto3 インストール
        run: pip install boto3 --break-system-packages

      - name: AWS 認証 (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          # T2026-0502-SEC10-CODE: OIDC 専用化 (両建て廃止)
          role-to-assume: ${{ secrets.AWS_ROLE_ARN_STANDARD }}
          aws-region: ap-northeast-1

      - name: 週次ダイジェストAI実行
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
          S3_BUCKET: ${{ secrets.S3_BUCKET }}
          AWS_DEFAULT_REGION: ap-northeast-1
        run: python3 scripts/weekly_digest.py

      - name: ダイジェストログをコミット・プッシュ
        run: |
          git config user.email "weekly-digest@ai-company.local"
          git config user.name "AI-Company Weekly Digest Agent"
          git add dashboard/weekly-digest-log.md
          git diff --cached --quiet || git commit -m "[weekly-digest] $(date +%Y-%m-%d) 週次ダイジェスト更新"
          git pull --rebase origin main
          git push
