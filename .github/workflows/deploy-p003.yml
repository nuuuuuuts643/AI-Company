name: P003 フロントエンドデプロイ（S3同期 + CloudFront）

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'projects/P003-news-timeline/frontend/**'
      - 'projects/P003-news-timeline/infra/cf-redirect-function.js'
      - '.github/workflows/deploy-p003.yml'
  # T2026-0502-PATH-FILTER-AUDIT: push event は github-actions[bot] merge で発火しない。
  # pull_request closed でカバー。
  pull_request:
    types: [closed]
    branches: [main]
    paths:
      - 'projects/P003-news-timeline/frontend/**'
      - 'projects/P003-news-timeline/infra/cf-redirect-function.js'

concurrency:
  group: deploy-p003-frontend
  cancel-in-progress: false

jobs:
  deploy:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event_name == 'push' ||
      (github.event_name == 'pull_request' && github.event.pull_request.merged == true)
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: AWS認証情報を設定
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-northeast-1

      - name: sw.js バージョンをgit SHAで上書き
        run: |
          SHORT_SHA="${GITHUB_SHA::7}"
          sed -i "s|const CACHE_NAME = '[^']*'|const CACHE_NAME = 'flotopic-${SHORT_SHA}'|" \
            projects/P003-news-timeline/frontend/sw.js
          echo "✅ sw.js CACHE_NAME = flotopic-${SHORT_SHA}"

      - name: HTML 内のローカル JS/CSS 参照に ?v=SHA を付与（T254 cache-busting）
        run: |
          SHORT_SHA="${GITHUB_SHA::7}"
          FRONTEND="projects/P003-news-timeline/frontend"
          python3 - <<PYEOF
          import os
          import re
          from glob import glob
          short_sha = "${SHORT_SHA}"
          # ローカル参照のみ書き換え。外部URL (http://, https://, //) は除外。
          # 既存の ?v=... が付いていたら置換、無ければ追加。
          # マッチ対象: src="path.js" / src="path.js?v=xxx" / href="path.css" / href="path.css?v=xxx"
          # 除外: src="https://...", src="//cdn...", href="/manifest.json"
          pat = re.compile(r'(src|href)="(?!https?://|//)([^":?]+\.(?:js|css))(?:\?v=[^"]*)?"')
          rewritten = 0
          for f in sorted(glob(os.path.join("${FRONTEND}", "*.html"))):
              with open(f, "r", encoding="utf-8") as h:
                  src = h.read()
              new_src, n = pat.subn(lambda m: f'{m.group(1)}="{m.group(2)}?v={short_sha}"', src)
              if n > 0:
                  with open(f, "w", encoding="utf-8") as h:
                      h.write(new_src)
                  print(f"  {os.path.basename(f)}: {n} replacements")
                  rewritten += n
          print(f"✅ HTML rewrite 完了: 総 {rewritten} 箇所 (SHA={short_sha})")
          PYEOF
          # サニティチェック
          grep -E "(app\\.js|style\\.css|config\\.js)\\?v=${SHORT_SHA}" "${FRONTEND}/index.html" | head -3 \
            || { echo "⚠️ index.html に書き換え跡が見つからない"; exit 1; }

      - name: フロントエンドをS3に同期（cache-control付き）
        run: |
          BUCKET="p003-news-946554699567"
          REGION="ap-northeast-1"
          FRONTEND="projects/P003-news-timeline/frontend"

          # HTML: no-cache（常に最新を取得 — ?v=SHA で参照する JS/CSS を切り替えるため）
          aws s3 sync "${FRONTEND}/" "s3://${BUCKET}/" \
            --region "${REGION}" \
            --exclude "*" \
            --include "*.html" \
            --content-type "text/html; charset=utf-8" \
            --cache-control "no-cache, must-revalidate"

          # JS: 長期キャッシュ (T254 — ?v=SHA で URL が変わるため immutable で安全)
          aws s3 sync "${FRONTEND}/" "s3://${BUCKET}/" \
            --region "${REGION}" \
            --exclude "*" \
            --include "*.js" \
            --exclude "sw.js" \
            --content-type "application/javascript" \
            --cache-control "public, max-age=31536000, immutable"

          # CSS: 長期キャッシュ (T254)
          aws s3 sync "${FRONTEND}/" "s3://${BUCKET}/" \
            --region "${REGION}" \
            --exclude "*" \
            --include "*.css" \
            --content-type "text/css" \
            --cache-control "public, max-age=31536000, immutable"

          # sw.js: no-store（ブラウザのHTTPキャッシュにも保存させない）
          aws s3 cp "${FRONTEND}/sw.js" "s3://${BUCKET}/sw.js" \
            --region "${REGION}" \
            --content-type "application/javascript" \
            --cache-control "no-store, no-cache, must-revalidate"

          # 画像・その他: 長期キャッシュ（.md等の開発ファイルは除外）
          aws s3 sync "${FRONTEND}/" "s3://${BUCKET}/" \
            --region "${REGION}" \
            --exclude "*.html" \
            --exclude "*.js" \
            --exclude "*.css" \
            --exclude "*.md" \
            --cache-control "public, max-age=604800"

          echo "✅ S3同期完了"

      - name: CloudFront Function を作成/更新して publish + association
        run: |
          set -euo pipefail
          FN_NAME="flotopic-canonical-redirect"
          FN_FILE="projects/P003-news-timeline/infra/cf-redirect-function.js"
          REGION="us-east-1"

          # 1. Function 取得（無ければ作成、あれば更新）
          if aws cloudfront describe-function \
                --name "${FN_NAME}" \
                --region "${REGION}" >/dev/null 2>&1; then
            ETAG=$(aws cloudfront describe-function \
                --name "${FN_NAME}" \
                --region "${REGION}" \
                --query 'ETag' --output text)
            echo "→ update-function (ETag=${ETAG})"
            UPDATE_OUT=$(aws cloudfront update-function \
                --name "${FN_NAME}" \
                --function-config Comment="flotopic.com www and /index.html canonical redirects",Runtime=cloudfront-js-2.0 \
                --function-code "fileb://${FN_FILE}" \
                --if-match "${ETAG}" \
                --region "${REGION}")
            DEV_ETAG=$(echo "${UPDATE_OUT}" | jq -r '.ETag')
          else
            echo "→ create-function"
            CREATE_OUT=$(aws cloudfront create-function \
                --name "${FN_NAME}" \
                --function-config Comment="flotopic.com www and /index.html canonical redirects",Runtime=cloudfront-js-2.0 \
                --function-code "fileb://${FN_FILE}" \
                --region "${REGION}")
            DEV_ETAG=$(echo "${CREATE_OUT}" | jq -r '.ETag')
          fi

          # 2. publish（DEVELOPMENT → LIVE）
          echo "→ publish-function (ETag=${DEV_ETAG})"
          aws cloudfront publish-function \
              --name "${FN_NAME}" \
              --if-match "${DEV_ETAG}" \
              --region "${REGION}" >/dev/null

          # 3. LIVE stage の ARN を取得
          FN_ARN=$(aws cloudfront describe-function \
              --name "${FN_NAME}" \
              --stage LIVE \
              --region "${REGION}" \
              --query 'FunctionSummary.FunctionMetadata.FunctionARN' \
              --output text)
          echo "FN_ARN=${FN_ARN}"

          # 4. Distribution の default cache behavior に viewer-request として association
          DIST_ID=$(aws cloudfront list-distributions \
              --query "DistributionList.Items[?contains(Aliases.Items, 'flotopic.com')].Id" \
              --output text --region "${REGION}")
          echo "DIST_ID=${DIST_ID}"

          aws cloudfront get-distribution-config \
              --id "${DIST_ID}" \
              --region "${REGION}" \
              > /tmp/dist.json
          DIST_ETAG=$(jq -r '.ETag' /tmp/dist.json)

          jq --arg arn "${FN_ARN}" '
            .DistributionConfig.DefaultCacheBehavior.FunctionAssociations = {
              "Quantity": 1,
              "Items": [
                { "FunctionARN": $arn, "EventType": "viewer-request" }
              ]
            } | .DistributionConfig
          ' /tmp/dist.json > /tmp/dist-config.json

          # 既に同じ ARN が associate されているなら no-op で済ます
          CURRENT_ARN=$(aws cloudfront get-distribution-config \
              --id "${DIST_ID}" --region "${REGION}" \
              --query 'DistributionConfig.DefaultCacheBehavior.FunctionAssociations.Items[0].FunctionARN' \
              --output text 2>/dev/null || echo "None")
          if [ "${CURRENT_ARN}" = "${FN_ARN}" ]; then
            echo "→ already associated, skipping update-distribution"
          else
            echo "→ update-distribution (CURRENT_ARN=${CURRENT_ARN} -> ${FN_ARN})"
            aws cloudfront update-distribution \
                --id "${DIST_ID}" \
                --distribution-config file:///tmp/dist-config.json \
                --if-match "${DIST_ETAG}" \
                --region "${REGION}" >/dev/null
          fi

          echo "✅ CloudFront Function deploy 完了"

      - name: CloudFront invalidation（全キャッシュクリア）
        run: |
          DIST_ID=$(aws cloudfront list-distributions \
            --query "DistributionList.Items[?contains(Aliases.Items, 'flotopic.com')].Id" \
            --output text --region us-east-1)
          aws cloudfront create-invalidation \
            --distribution-id "${DIST_ID}" \
            --paths "/*" \
            --region us-east-1
          echo "✅ CloudFront invalidation完了"
