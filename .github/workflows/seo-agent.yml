name: AI-Company SEOモニタリングエージェント

on:
  schedule:
    # 毎週月曜 10:00 JST = UTC 月曜 01:00（JST 10:00 >= 09:00 なのでUTCは同日）
    - cron: '0 1 * * 1'
  workflow_dispatch:

concurrency:
  group: git-push
  cancel-in-progress: false

jobs:
  seo-agent:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: SEOエージェント実行
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
          S3_BUCKET: ${{ secrets.S3_BUCKET }}
        run: python3 scripts/seo_agent.py

      - name: 変更をコミット・プッシュ
        run: |
          git config user.email "seo-agent@ai-company.local"
          git config user.name "AI-Company SEO Agent"
          git add dashboard/seo-log.md
          git diff --cached --quiet || git commit -m "[seo-agent] $(date +%Y-%m-%d) SEOレポート更新"
          git pull --rebase origin main
          git push
