name: BlueSky Agent (BlueSky自動投稿)

on:
  schedule:
    # 日次: JST 8:00 = UTC 23:00（前日）
    - cron: '0 23 * * *'
    # 週次: 月曜 JST 9:00 = UTC 0:00
    - cron: '0 0 * * 1'
    # 月次: 毎月1日 JST 9:00 = UTC 0:00
    - cron: '0 0 1 * *'

  workflow_dispatch:
    inputs:
      mode:
        description: '投稿モード (daily / weekly / monthly)'
        required: true
        default: 'daily'
        type: choice
        options:
          - daily
          - weekly
          - monthly
      dry_run:
        description: 'ドライラン（実際には投稿しない）'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

# 複数ジョブの同時 push 競合を防止
concurrency:
  group: bluesky-agent-${{ github.event.inputs.mode || 'schedule' }}
  cancel-in-progress: false

jobs:
  # ─────────────────────────────────────────────────────────────────────────
  # 日次投稿 (JST 8:00 = UTC 23:00)
  # ─────────────────────────────────────────────────────────────────────────
  daily-post:
    name: 日次投稿 — 今日の急上昇トップ3
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'workflow_dispatch' && github.event.inputs.mode == 'daily' ||
      github.event_name == 'schedule' && github.event.schedule == '0 23 * * *'

    steps:
      - uses: actions/checkout@v4

      - name: Python セットアップ
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 依存パッケージインストール
        run: pip install atproto boto3

      - name: 日次投稿実行
        env:
          BLUESKY_HANDLE:        ${{ secrets.BLUESKY_HANDLE }}
          BLUESKY_APP_PASSWORD:  ${{ secrets.BLUESKY_APP_PASSWORD }}
          SLACK_WEBHOOK:         ${{ secrets.SLACK_WEBHOOK }}
          AWS_ACCESS_KEY_ID:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION:    ap-northeast-1
          DRY_RUN:               ${{ github.event.inputs.dry_run || 'false' }}
        run: |
          cd scripts
          if [ "$DRY_RUN" = "true" ]; then
            python3 bluesky_agent.py --mode daily --dry-run
          else
            python3 bluesky_agent.py --mode daily
          fi

  # ─────────────────────────────────────────────────────────────────────────
  # 週次投稿 (月曜 JST 9:00 = UTC 0:00)
  # ─────────────────────────────────────────────────────────────────────────
  weekly-post:
    name: 週次投稿 — 今週の5大ストーリー
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'workflow_dispatch' && github.event.inputs.mode == 'weekly' ||
      github.event_name == 'schedule' && github.event.schedule == '0 0 * * 1'

    steps:
      - uses: actions/checkout@v4

      - name: Python セットアップ
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 依存パッケージインストール
        run: pip install atproto boto3

      - name: 週次投稿実行
        env:
          BLUESKY_HANDLE:        ${{ secrets.BLUESKY_HANDLE }}
          BLUESKY_APP_PASSWORD:  ${{ secrets.BLUESKY_APP_PASSWORD }}
          SLACK_WEBHOOK:         ${{ secrets.SLACK_WEBHOOK }}
          AWS_ACCESS_KEY_ID:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION:    ap-northeast-1
          DRY_RUN:               ${{ github.event.inputs.dry_run || 'false' }}
        run: |
          cd scripts
          if [ "$DRY_RUN" = "true" ]; then
            python3 bluesky_agent.py --mode weekly --dry-run
          else
            python3 bluesky_agent.py --mode weekly
          fi

  # ─────────────────────────────────────────────────────────────────────────
  # 月次投稿 (毎月1日 JST 9:00 = UTC 0:00)
  # ─────────────────────────────────────────────────────────────────────────
  monthly-post:
    name: 月次投稿 — 今月の総括
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'workflow_dispatch' && github.event.inputs.mode == 'monthly' ||
      github.event_name == 'schedule' && github.event.schedule == '0 0 1 * *'

    steps:
      - uses: actions/checkout@v4

      - name: Python セットアップ
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 依存パッケージインストール
        run: pip install atproto boto3

      - name: 月次投稿実行
        env:
          BLUESKY_HANDLE:        ${{ secrets.BLUESKY_HANDLE }}
          BLUESKY_APP_PASSWORD:  ${{ secrets.BLUESKY_APP_PASSWORD }}
          SLACK_WEBHOOK:         ${{ secrets.SLACK_WEBHOOK }}
          AWS_ACCESS_KEY_ID:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION:    ap-northeast-1
          DRY_RUN:               ${{ github.event.inputs.dry_run || 'false' }}
        run: |
          cd scripts
          if [ "$DRY_RUN" = "true" ]; then
            python3 bluesky_agent.py --mode monthly --dry-run
          else
            python3 bluesky_agent.py --mode monthly
          fi
