name: BlueSky Agent (BlueSky自動投稿) [DEPRECATED — 手動フォールバック専用]

# 2026-04-28 (T2026-0428-AV): cron トリガー廃止。
# GitHub Actions 無料枠の cron は 1 系統で 1 日 3〜5 回、4 系統併走でも安定しなかった
# (T2026-0428-AU 調査結果)。EventBridge → flotopic-bluesky Lambda に
# 直接呼び出しを移管し、rate(30 minutes) で物理的に発火確率を担保する。
# このワークフローは workflow_dispatch (手動) のみ残す（緊急の手動投稿フォールバック）。

on:
  workflow_dispatch:
    inputs:
      mode:
        description: '投稿モード (daily / weekly / monthly / morning)'
        required: false
        default: 'daily'
        type: choice
        options:
          - daily
          - weekly
          - monthly
          - morning
      dry_run:
        description: 'ドライラン（実際には投稿しない）'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

concurrency:
  group: bluesky-agent
  cancel-in-progress: false

jobs:
  post:
    name: BlueSky 投稿
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write   # OIDC で必須

    steps:
      - uses: actions/checkout@v4

      - name: Python セットアップ
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 依存パッケージインストール
        run: pip install atproto boto3

      - name: AWS 認証 (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          # T2026-0502-SEC10-CODE: OIDC 専用化 (両建て廃止)
          role-to-assume: ${{ secrets.AWS_ROLE_ARN_STANDARD }}
          aws-region: ap-northeast-1

      - name: モード自動判定
        id: mode
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "mode=${{ github.event.inputs.mode || 'daily' }}" >> $GITHUB_OUTPUT
            echo "dry_run=${{ github.event.inputs.dry_run || 'false' }}" >> $GITHUB_OUTPUT
          elif [ "${{ github.event.schedule }}" = "0 0 1 * *" ]; then
            echo "mode=monthly" >> $GITHUB_OUTPUT
            echo "dry_run=false" >> $GITHUB_OUTPUT
          elif [ "${{ github.event.schedule }}" = "0 0 * * 1" ]; then
            echo "mode=weekly" >> $GITHUB_OUTPUT
            echo "dry_run=false" >> $GITHUB_OUTPUT
          else
            echo "mode=daily" >> $GITHUB_OUTPUT
            echo "dry_run=false" >> $GITHUB_OUTPUT
          fi

      - name: 投稿実行
        env:
          BLUESKY_HANDLE:        ${{ secrets.BLUESKY_HANDLE }}
          BLUESKY_APP_PASSWORD:  ${{ secrets.BLUESKY_APP_PASSWORD }}
          SLACK_WEBHOOK:         ${{ secrets.SLACK_WEBHOOK }}
          AWS_DEFAULT_REGION:    ap-northeast-1
          S3_BUCKET:             p003-news-946554699567
        run: |
          cd scripts
          if [ "${{ steps.mode.outputs.dry_run }}" = "true" ]; then
            python3 bluesky_agent.py --mode ${{ steps.mode.outputs.mode }} --dry-run
          else
            python3 bluesky_agent.py --mode ${{ steps.mode.outputs.mode }}
          fi
