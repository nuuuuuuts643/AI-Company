name: BlueSky Agent (BlueSky自動投稿)

on:
  schedule:
    # 日次: 30分ごとに発火（cron遅延対策・スクリプト側で 2.5時間クールタイム制御）
    # GitHub Actionsのcronは無料枠で1〜9時間遅延・スキップが頻発するため、
    # 高頻度発火＋スクリプト側クールタイムで「実投稿は 2.5時間ごと（1日9〜10回ペース上限）」を担保。
    # 実際の投稿頻度は post_daily の DAILY_COOLDOWN_HOURS で制御。
    - cron: '*/30 * * * *'
    # 週次: 月曜 JST 9:00 = UTC 0:00
    - cron: '0 0 * * 1'
    # 月次: 毎月1日 JST 9:00 = UTC 0:00
    - cron: '0 0 1 * *'

  workflow_dispatch:
    inputs:
      mode:
        description: '投稿モード (daily / weekly / monthly)'
        required: false
        default: 'daily'
        type: choice
        options:
          - daily
          - weekly
          - monthly
      dry_run:
        description: 'ドライラン（実際には投稿しない）'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

concurrency:
  group: bluesky-agent
  cancel-in-progress: false

jobs:
  post:
    name: BlueSky 投稿
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Python セットアップ
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 依存パッケージインストール
        run: pip install atproto boto3

      - name: モード自動判定
        id: mode
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "mode=${{ github.event.inputs.mode || 'daily' }}" >> $GITHUB_OUTPUT
            echo "dry_run=${{ github.event.inputs.dry_run || 'false' }}" >> $GITHUB_OUTPUT
          elif [ "${{ github.event.schedule }}" = "0 0 1 * *" ]; then
            echo "mode=monthly" >> $GITHUB_OUTPUT
            echo "dry_run=false" >> $GITHUB_OUTPUT
          elif [ "${{ github.event.schedule }}" = "0 0 * * 1" ]; then
            echo "mode=weekly" >> $GITHUB_OUTPUT
            echo "dry_run=false" >> $GITHUB_OUTPUT
          else
            echo "mode=daily" >> $GITHUB_OUTPUT
            echo "dry_run=false" >> $GITHUB_OUTPUT
          fi

      - name: 投稿実行
        env:
          BLUESKY_HANDLE:        ${{ secrets.BLUESKY_HANDLE }}
          BLUESKY_APP_PASSWORD:  ${{ secrets.BLUESKY_APP_PASSWORD }}
          SLACK_WEBHOOK:         ${{ secrets.SLACK_WEBHOOK }}
          AWS_ACCESS_KEY_ID:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION:    ap-northeast-1
          S3_BUCKET:             p003-news-946554699567
        run: |
          cd scripts
          if [ "${{ steps.mode.outputs.dry_run }}" = "true" ]; then
            python3 bluesky_agent.py --mode ${{ steps.mode.outputs.mode }} --dry-run
          else
            python3 bluesky_agent.py --mode ${{ steps.mode.outputs.mode }}
          fi
