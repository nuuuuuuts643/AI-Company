name: AI-Company 秘書定期実行

on:
  schedule:
    - cron: '0 0,8,16 * * *'  # 09:00, 17:00, 01:00 JST (UTC+9)
  workflow_dispatch:

jobs:
  secretary:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 秘書スクリプト実行
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: python3 scripts/secretary_run.py

      - name: 変更をコミット・プッシュ
        run: |
          git config user.email "secretary@ai-company.local"
          git config user.name "AI-Company Secretary"
          git add -A
          git diff --cached --quiet || git commit -m "[secretary-run] $(date +%Y-%m-%d) 定期実行"
          git push
