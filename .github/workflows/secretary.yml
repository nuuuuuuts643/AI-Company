name: AI-Company 秘書定期実行

on:
  schedule:
    # 毎日 09:00 JST = UTC 00:00（JST 09:00 >= 09:00 なのでUTCは同日）
    - cron: '0 0 * * *'
  workflow_dispatch:

concurrency:
  group: git-push
  cancel-in-progress: false

jobs:
  secretary:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: boto3インストール
        run: pip install boto3 --break-system-packages

      - name: 秘書スクリプト実行
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: ap-northeast-1
        run: python3 scripts/secretary_run.py

      - name: 変更をコミット・プッシュ
        run: |
          git config user.email "secretary@ai-company.local"
          git config user.name "AI-Company Secretary"
          git add -A
          git diff --cached --quiet || git commit -m "[secretary-run] $(date +%Y-%m-%d) 定期実行"
          git pull --rebase origin main
          git push
