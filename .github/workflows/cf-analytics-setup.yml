name: CF Analytics セットアップ・手動更新

on:
  workflow_dispatch:
    inputs:
      action:
        description: '実行内容'
        required: true
        default: 'update_env'
        type: choice
        options:
          - update_env    # Lambda に CF_API_TOKEN/CF_ACCOUNT_ID を設定
          - run_now       # 今すぐ集計して S3 を更新
          - both          # 両方

permissions:
  contents: read
  id-token: write   # OIDC で必須

jobs:
  setup:
    runs-on: ubuntu-latest
    steps:
      - name: AWS 認証 (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          # T2026-0502-SEC10-CODE-RETRY: OIDC 専用化 (AWS_ACCESS_KEY_ID 廃止)
          role-to-assume: ${{ secrets.AWS_ROLE_ARN_STANDARD }}
          aws-region: ap-northeast-1

      - name: Lambda 環境変数を更新（CF トークン設定）
        if: ${{ inputs.action == 'update_env' || inputs.action == 'both' }}
        env:
          CF_API_TOKEN:  ${{ secrets.CF_API_TOKEN }}
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
        run: |
          aws lambda update-function-configuration \
            --function-name flotopic-cf-analytics \
            --region ap-northeast-1 \
            --environment "Variables={
              REGION=ap-northeast-1,
              S3_BUCKET=p003-news-946554699567,
              USERS_TABLE=flotopic-users,
              COMMENTS_TABLE=ai-company-comments,
              FAVORITES_TABLE=flotopic-favorites,
              CF_SITE_TAG=577678a8a0064a499f6f0ba0a117fd4d,
              CF_API_TOKEN=${CF_API_TOKEN},
              CF_ACCOUNT_ID=${CF_ACCOUNT_ID}
            }" > /dev/null
          echo "✅ Lambda 環境変数を更新しました"

      - name: Lambda を今すぐ実行（集計 → S3 更新）
        if: ${{ inputs.action == 'run_now' || inputs.action == 'both' }}
        run: |
          aws lambda wait function-updated \
            --function-name flotopic-cf-analytics \
            --region ap-northeast-1 2>/dev/null || true
          aws lambda invoke \
            --function-name flotopic-cf-analytics \
            --region ap-northeast-1 \
            /tmp/result.json
          cat /tmp/result.json
          echo "✅ 集計完了 → https://flotopic.com/api/cf-analytics.json に反映"
