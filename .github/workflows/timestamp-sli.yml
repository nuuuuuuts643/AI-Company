name: SLI-timestamp (weekly Unix秒 infiltration check)

# T2026-0501-TS: SNAP[*].timestamp / publishedAt / predictionMadeAt の
#   フォーマット混在で `new Date(v)` が 1970 年代に解釈される事故
#   (cc7f78cd55b81da6) を観測する週次 SLI。
#
# 仕組み:
#   - public な topics.json / topics-card.json (S3 + CloudFront 配信) を fetch
#   - ISO 想定のフィールド (predictionMadeAt / createdAt / storyTimeline[*].at) に
#     Unix 秒整数 (1e9 < n < 1e12) が混入していないか jq で検出
# 閾値:
#   bad_count = 0 : ok / >=1 : warn / >=5 : error (Slack 通知)
# コスト:
#   curl + jq のみ。AWS API / Lambda / Anthropic invoke なし。READ-ONLY。
# 関連: scripts/sli_timestamp_check.sh / frontend/js/timestamp.js

on:
  schedule:
    - cron: '30 23 * * 0'  # 毎週月曜 08:30 JST (= 日曜 23:30 UTC)
  workflow_dispatch:

permissions:
  contents: read

jobs:
  sli:
    name: SLI timestamp 正規化チェック
    runs-on: ubuntu-latest
    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: SLI timestamp 観測
        id: ts_check
        continue-on-error: true
        shell: bash
        run: |
          set -u
          OUT=$(mktemp)
          bash scripts/sli_timestamp_check.sh | tee "$OUT" || true
          STATUS=$(grep '^status=' "$OUT" | cut -d= -f2- || echo unknown)
          BAD=$(grep '^bad_count=' "$OUT" | cut -d= -f2- || echo -1)
          TOTAL=$(grep '^total_count=' "$OUT" | cut -d= -f2- || echo 0)
          SRC=$(grep '^src=' "$OUT" | cut -d= -f2- || echo "")
          DETAILS=$(grep '^bad_details=' "$OUT" | cut -d= -f2- || echo "")
          {
            echo "status=${STATUS}"
            echo "bad_count=${BAD}"
            echo "total_count=${TOTAL}"
            echo "src=${SRC}"
            echo "bad_details=${DETAILS}"
          } >> "$GITHUB_OUTPUT"
          {
            echo "### SLI-timestamp (Unix秒 infiltration check)"
            echo "- status: ${STATUS}"
            echo "- bad_count: ${BAD}"
            echo "- total_topics: ${TOTAL}"
            echo "- source: ${SRC}"
            if [ -n "${DETAILS}" ]; then echo "- detail: ${DETAILS}"; fi
            echo "- 閾値: bad=0 ok / bad>=1 warn / bad>=5 error"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: SLI timestamp NG で警告 (Slack)
        if: steps.ts_check.outputs.status == 'warn' || steps.ts_check.outputs.status == 'error'
        continue-on-error: true
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL || secrets.SLACK_WEBHOOK }}
          STATUS:   ${{ steps.ts_check.outputs.status }}
          BAD:      ${{ steps.ts_check.outputs.bad_count }}
          TOTAL:    ${{ steps.ts_check.outputs.total_count }}
          DETAILS:  ${{ steps.ts_check.outputs.bad_details }}
        shell: bash
        run: |
          if [ -z "${SLACK_WEBHOOK_URL:-}" ]; then
            echo "::warning::SLI-timestamp $STATUS: bad=$BAD/$TOTAL ($DETAILS)"
            exit 0
          fi
          ICON=$([ "$STATUS" = "error" ] && echo ':rotating_light:' || echo ':warning:')
          PAYLOAD=$(STATUS="$STATUS" BAD="$BAD" TOTAL="$TOTAL" DETAILS="$DETAILS" ICON="$ICON" python3 -c "
          import json, os
          text = (
              '⚠️ *Flotopic SLI-timestamp (Unix秒 infiltration)*\n'
              f'• status: \`{os.environ[\"STATUS\"]}\`\n'
              f'• bad: {os.environ[\"BAD\"]} / total: {os.environ[\"TOTAL\"]} (warn>=1 / error>=5)\n'
              f'• detail: {os.environ[\"DETAILS\"] or \"-\"}\n'
              '• 対象フィールド: predictionMadeAt / createdAt / storyTimeline[*].at\n'
              '• 対処: proc_ai.py / handler.py の書き込み箇所を確認、ISO で書くべきフィールドに Unix 秒が混入している箇所を特定\n'
              '\n_T2026-0501-TS: SNAP timestamp 混在による 1970 年表示事故の再発防止 SLI_'
          )
          print(json.dumps({'text': text, 'username': 'Flotopic Timestamp Monitor', 'icon_emoji': os.environ['ICON']}))
          ")
          curl -fsS -X POST -H 'Content-Type: application/json' -d "$PAYLOAD" "$SLACK_WEBHOOK_URL" || true
