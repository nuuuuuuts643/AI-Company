name: AI-Company CEO定期実行

on:
  # [PAUSED]
  #   schedule:
  #     - cron: '30 23 * * *'  # 毎日 08:30 JST (UTC 23:30 = JST翌08:30)
  workflow_dispatch:

concurrency:
  group: git-push
  cancel-in-progress: false

jobs:
  ceo:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: boto3インストール
        run: pip install boto3 --break-system-packages

      - name: CEOスクリプト実行
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: ap-northeast-1
        run: python3 scripts/ceo_run.py

      - name: 実装タスク生成
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python3 scripts/task_writer.py

      - name: 変更をコミット・プッシュ
        run: |
          git config user.email "ceo@ai-company.local"
          git config user.name "AI-Company CEO"
          git add -A
          git diff --cached --quiet || git commit -m "[ceo-run] $(date +%Y-%m-%d) CEO日次実行"
          git pull --rebase origin main
          git push
