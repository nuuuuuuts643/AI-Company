name: AI-Company CEO定期実行

on:
  schedule:
    - cron: '30 23 * * *'  # 毎日 08:30 JST (UTC 23:30 = JST翌08:30)
  workflow_dispatch:

jobs:
  ceo:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: CEOスクリプト実行
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: python3 scripts/ceo_run.py

      - name: 変更をコミット・プッシュ
        run: |
          git config user.email "ceo@ai-company.local"
          git config user.name "AI-Company CEO"
          git add -A
          git diff --cached --quiet || git commit -m "[ceo-run] $(date +%Y-%m-%d) CEO日次実行"
          git push
