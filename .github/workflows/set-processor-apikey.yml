name: p003-processor に ANTHROPIC_API_KEY を設定

on:
  workflow_dispatch:

jobs:
  set-apikey:
    runs-on: ubuntu-latest
    steps:
      - name: AWS認証
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-northeast-1

      - name: p003-processor に環境変数を設定
        run: |
          aws lambda update-function-configuration \
            --function-name p003-processor \
            --region ap-northeast-1 \
            --environment "Variables={
              S3_BUCKET=p003-news-946554699567,
              TABLE_NAME=p003-topics,
              REGION=ap-northeast-1,
              SITE_URL=https://flotopic.com,
              ANTHROPIC_API_KEY=${{ secrets.ANTHROPIC_API_KEY }}
            }"
          echo "✅ 設定完了"

      - name: 確認（キーの存在だけ確認・値は表示しない）
        run: |
          aws lambda get-function-configuration \
            --function-name p003-processor \
            --region ap-northeast-1 \
            --query 'Environment.Variables.keys(@)' \
            --output text
