name: AI Developer Agent（自動実装）

on:
  schedule:
    - cron: '0 2 * * *'  # 11:00 JST (UTC 02:00)
  workflow_dispatch:
    inputs:
      task:
        description: '実装タスク（空欄ならqueue.mdから自動取得）'
        required: false
        type: string

concurrency:
  group: git-push
  cancel-in-progress: false

jobs:
  develop:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: boto3インストール
        run: pip install boto3 --break-system-packages

      - name: Claude Code インストール
        run: npm install -g @anthropic-ai/claude-code

      - name: タスク準備
        id: prep
        env:
          MANUAL_TASK: ${{ github.event.inputs.task }}
        run: |
          python3 scripts/developer_agent.py prepare "${MANUAL_TASK:-}"
          if [ -f /tmp/developer_prompt.txt ]; then
            echo "has_task=true" >> $GITHUB_OUTPUT
          else
            echo "has_task=false" >> $GITHUB_OUTPUT
          fi

      - name: Claude Code 実行
        if: steps.prep.outputs.has_task == 'true'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          claude --dangerously-skip-permissions \
            --max-turns 15 \
            -p "$(cat /tmp/developer_prompt.txt)"

      - name: 完了マーク・コミット・プッシュ
        if: steps.prep.outputs.has_task == 'true'
        run: |
          python3 scripts/developer_agent.py mark-done
          git config user.email "developer@ai-company.local"
          git config user.name "AI-Company Developer"
          git add -A
          git diff --cached --quiet || git commit -m "[developer-agent] $(date +%Y-%m-%d) 自動実装"
          git pull --rebase origin main
          git push
