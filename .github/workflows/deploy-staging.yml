name: ステージング自動デプロイ

# staging ブランチへの push または PR マージで自動実行
on:
  push:
    branches: [staging]
    paths:
      - 'projects/P003-news-timeline/frontend/**'
      - 'projects/P003-news-timeline/lambda/**'

permissions:
  contents: read
  id-token: write   # OIDC で必須

jobs:
  deploy-staging-frontend:
    name: フロントエンド → S3 ステージング
    runs-on: ubuntu-latest
    environment: staging

    steps:
      - uses: actions/checkout@v4

      - name: AWS 認証 (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          # T2026-0502-SEC10-CODE-RETRY: OIDC 専用化 (AWS_ACCESS_KEY_ID 廃止)
          role-to-assume: ${{ secrets.AWS_ROLE_ARN_DEPLOY }}
          aws-region: ap-northeast-1

      - name: ステージング S3 バケット作成（初回のみ）
        run: |
          BUCKET="p003-news-staging-946554699567"
          aws s3api create-bucket \
            --bucket $BUCKET \
            --region ap-northeast-1 \
            --create-bucket-configuration LocationConstraint=ap-northeast-1 \
            2>/dev/null || echo "バケット既存"

          # 静的ウェブホスティング有効化
          aws s3 website s3://$BUCKET \
            --index-document index.html \
            --error-document index.html

          # パブリック読み取り許可
          aws s3api put-bucket-policy --bucket $BUCKET --policy '{
            "Version":"2012-10-17",
            "Statement":[{
              "Effect":"Allow",
              "Principal":"*",
              "Action":"s3:GetObject",
              "Resource":"arn:aws:s3:::'"$BUCKET"'/*"
            }]
          }' 2>/dev/null || true

          aws s3api delete-public-access-block --bucket $BUCKET 2>/dev/null || true

      - name: config.js 生成（ステージング用 API_BASE）
        run: |
          cat > projects/P003-news-timeline/frontend/config.js << 'EOF'
          // === ステージング設定 ===
          const API_BASE         = 'https://kkbf48vhck.execute-api.ap-northeast-1.amazonaws.com/prod/';
          const COMMENTS_URL     = 'https://kkbf48vhck.execute-api.ap-northeast-1.amazonaws.com/prod';
          const ANALYTICS_URL    = 'https://kkbf48vhck.execute-api.ap-northeast-1.amazonaws.com/prod';
          const GOOGLE_CLIENT_ID = '';
          EOF

      - name: S3 同期（ステージング）
        run: |
          aws s3 sync projects/P003-news-timeline/frontend/ \
            s3://p003-news-staging-946554699567/ \
            --region ap-northeast-1 \
            --delete \
            --cache-control "no-cache"
          echo "✅ ステージングデプロイ完了"
          echo "🔗 URL: http://p003-news-staging-946554699567.s3-website-ap-northeast-1.amazonaws.com"

  deploy-staging-lambda:
    name: Lambda → ステージングエイリアス
    runs-on: ubuntu-latest
    environment: staging
    # Lambda変更があった場合のみ
    if: contains(github.event.head_commit.modified, 'lambda/')

    steps:
      - uses: actions/checkout@v4

      - name: AWS 認証 (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          # T2026-0502-SEC10-CODE-RETRY: OIDC 専用化 (AWS_ACCESS_KEY_ID 廃止)
          role-to-assume: ${{ secrets.AWS_ROLE_ARN_DEPLOY }}
          aws-region: ap-northeast-1

      - name: Fetcher Lambda → staging エイリアス
        run: |
          cd projects/P003-news-timeline/lambda/fetcher
          pip install feedparser boto3 --quiet -t .
          zip -qr function.zip .

          # 新バージョン発行
          aws lambda update-function-code \
            --function-name p003-fetcher \
            --zip-file fileb://function.zip \
            --region ap-northeast-1

          aws lambda wait function-updated \
            --function-name p003-fetcher \
            --region ap-northeast-1

          VERSION=$(aws lambda publish-version \
            --function-name p003-fetcher \
            --region ap-northeast-1 \
            --query 'Version' --output text)

          # staging エイリアスを新バージョンに向ける
          aws lambda create-alias \
            --function-name p003-fetcher \
            --name staging \
            --function-version $VERSION \
            --region ap-northeast-1 2>/dev/null || \
          aws lambda update-alias \
            --function-name p003-fetcher \
            --name staging \
            --function-version $VERSION \
            --region ap-northeast-1

          echo "✅ p003-fetcher:staging → v$VERSION"

  notify-staging:
    name: Slack通知
    runs-on: ubuntu-latest
    needs: [deploy-staging-frontend]
    if: always()
    steps:
      - name: 結果通知
        run: |
          STATUS="${{ needs.deploy-staging-frontend.result }}"
          EMOJI=$([ "$STATUS" = "success" ] && echo "✅" || echo "❌")
          MSG="$EMOJI ステージングデプロイ: $STATUS\nURL: http://p003-news-staging-946554699567.s3-website-ap-northeast-1.amazonaws.com\nコミット: ${{ github.sha }}"
          curl -s -X POST "${{ secrets.SLACK_WEBHOOK }}" \
            -H 'Content-type: application/json' \
            -d "{\"text\":\"$MSG\"}" || true
