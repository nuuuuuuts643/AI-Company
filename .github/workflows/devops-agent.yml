name: DevOps Agent (開発監視AI)

on:
  workflow_run:
    workflows:
      - "P003 デプロイ（Lambda + フロントエンド）"
      - "AI Developer Agent（自動実装）"
    types: [completed]
  schedule:
    - cron: "0 22 * * *"  # 安全網: 1日1回 JST 07:00
  workflow_dispatch:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  monitor:
    name: Run DevOps Monitor
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run devops_agent.py
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python scripts/devops_agent.py
