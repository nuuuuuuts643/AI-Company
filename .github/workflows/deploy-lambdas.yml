name: Lambda デプロイ（全関数）

on:
  push:
    branches:
      - main
    paths:
      - "projects/P003-news-timeline/lambda/**"

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: AWS認証情報を設定
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-northeast-1

      - name: Python セットアップ
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      # ----------------------------------------------------------------
      # fetcher Lambda（外部ライブラリ: feedparser, requests が必要）
      # ----------------------------------------------------------------
      - name: fetcher Lambda をデプロイ
        id: deploy_fetcher
        run: |
          cd projects/P003-news-timeline/lambda/fetcher
          pip install feedparser requests -t . -q
          zip -qr function.zip .
          aws lambda update-function-code \
            --function-name p003-fetcher \
            --zip-file fileb://function.zip \
            --region ap-northeast-1
          aws lambda wait function-updated \
            --function-name p003-fetcher \
            --region ap-northeast-1
          echo "[OK] fetcher デプロイ完了"

      # ----------------------------------------------------------------
      # processor Lambda（外部ライブラリ不要・boto3はLambdaランタイム内蔵）
      # ----------------------------------------------------------------
      - name: processor Lambda をデプロイ
        id: deploy_processor
        run: |
          cd projects/P003-news-timeline/lambda/processor
          zip -q function.zip handler.py
          aws lambda update-function-code \
            --function-name p003-processor \
            --zip-file fileb://function.zip \
            --region ap-northeast-1
          aws lambda wait function-updated \
            --function-name p003-processor \
            --region ap-northeast-1
          echo "[OK] processor デプロイ完了"

      # ----------------------------------------------------------------
      # comments Lambda
      # ----------------------------------------------------------------
      - name: comments Lambda をデプロイ
        id: deploy_comments
        run: |
          cd projects/P003-news-timeline/lambda/comments
          zip -q function.zip handler.py
          aws lambda update-function-code \
            --function-name p003-comments \
            --zip-file fileb://function.zip \
            --region ap-northeast-1
          aws lambda wait function-updated \
            --function-name p003-comments \
            --region ap-northeast-1
          echo "[OK] comments デプロイ完了"

      # ----------------------------------------------------------------
      # Slack 通知（成功）
      # ----------------------------------------------------------------
      - name: Slack通知（成功）
        if: success()
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          COMMIT_MSG=$(git log -1 --pretty=format:"%s")
          COMMIT_SHA=$(git log -1 --pretty=format:"%h")
          python3 -c "
          import urllib.request, json, os
          webhook = os.environ['SLACK_WEBHOOK_URL']
          text = 'Lambda デプロイ成功\nコミット: ${COMMIT_SHA} - ${COMMIT_MSG}\nデプロイ済み: fetcher / processor / comments\nリージョン: ap-northeast-1'
          data = json.dumps({'text': text}).encode('utf-8')
          req = urllib.request.Request(webhook, data=data, headers={'Content-Type': 'application/json'})
          urllib.request.urlopen(req)
          "

      # ----------------------------------------------------------------
      # Slack 通知（失敗）
      # ----------------------------------------------------------------
      - name: Slack通知（失敗）
        if: failure()
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          COMMIT_MSG=$(git log -1 --pretty=format:"%s")
          COMMIT_SHA=$(git log -1 --pretty=format:"%h")
          python3 -c "
          import urllib.request, json, os
          webhook = os.environ['SLACK_WEBHOOK_URL']
          text = 'Lambda デプロイ失敗\nコミット: ${COMMIT_SHA} - ${COMMIT_MSG}\nhttps://github.com/\${{ github.repository }}/actions'
          data = json.dumps({'text': text}).encode('utf-8')
          req = urllib.request.Request(webhook, data=data, headers={'Content-Type': 'application/json'})
          urllib.request.urlopen(req)
          "
