name: Lambda デプロイ（全関数）

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "projects/P003-news-timeline/lambda/**"

concurrency:
  group: deploy-p003-lambda
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: AWS認証情報を設定
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-northeast-1

      - name: Python セットアップ
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      # ----------------------------------------------------------------
      # fetcher Lambda（外部ライブラリ不要・stdlib + boto3のみ使用）
      # ----------------------------------------------------------------
      - name: fetcher Lambda をデプロイ
        id: deploy_fetcher
        run: |
          cd projects/P003-news-timeline/lambda/fetcher
          zip -q function.zip *.py
          aws lambda update-function-code \
            --function-name p003-fetcher \
            --zip-file fileb://function.zip \
            --region ap-northeast-1
          aws lambda wait function-updated \
            --function-name p003-fetcher \
            --region ap-northeast-1
          echo "[OK] fetcher デプロイ完了"

      # ----------------------------------------------------------------
      # processor Lambda（Pillow + NotoSansJP フォント同梱でOGP画像生成対応）
      # ----------------------------------------------------------------
      - name: processor Lambda をデプロイ
        id: deploy_processor
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          cd projects/P003-news-timeline/lambda/processor
          # Pillow をLambdaランタイム(Amazon Linux 2023 x86_64 / Python3.12)向けにインストール
          pip install Pillow==10.4.0 \
            --platform manylinux2014_x86_64 \
            --target . \
            --python-version 3.12 \
            --only-binary=:all: \
            -q
          # NotoSansJP フォントをダウンロード（OGP画像の日本語テキスト描画用）
          curl -sL "https://github.com/google/fonts/raw/main/ofl/notosansjp/static/NotoSansJP-Regular.ttf" \
            -o NotoSansJP-Regular.ttf \
            || echo "Warning: Font download failed, OGP will use fallback rendering"
          zip -qr function.zip . --exclude "*.pyc" --exclude "__pycache__/*"
          aws lambda update-function-code \
            --function-name p003-processor \
            --zip-file fileb://function.zip \
            --region ap-northeast-1
          aws lambda wait function-updated \
            --function-name p003-processor \
            --region ap-northeast-1
          # ANTHROPIC_API_KEYをLambda環境変数に設定（deploy毎に確実に反映）
          aws lambda update-function-configuration \
            --function-name p003-processor \
            --environment "Variables={TABLE_NAME=p003-topics,S3_BUCKET=p003-news-946554699567,REGION=ap-northeast-1,SITE_URL=https://flotopic.com,ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}}" \
            --region ap-northeast-1 > /dev/null
          aws lambda wait function-updated --function-name p003-processor --region ap-northeast-1
          echo "[OK] processor デプロイ完了（ANTHROPIC_API_KEY設定済み）"

      # ----------------------------------------------------------------
      # comments Lambda
      # ----------------------------------------------------------------
      - name: comments Lambda をデプロイ
        id: deploy_comments
        run: |
          cd projects/P003-news-timeline/lambda/comments
          zip -q function.zip handler.py
          aws lambda update-function-code \
            --function-name p003-comments \
            --zip-file fileb://function.zip \
            --region ap-northeast-1
          aws lambda wait function-updated \
            --function-name p003-comments \
            --region ap-northeast-1
          echo "[OK] comments デプロイ完了"

      # ----------------------------------------------------------------
      # analytics Lambda
      # ----------------------------------------------------------------
      - name: analytics Lambda をデプロイ
        id: deploy_analytics
        run: |
          cd projects/P003-news-timeline/lambda/analytics
          zip -q function.zip handler.py
          aws lambda update-function-code \
            --function-name flotopic-analytics \
            --zip-file fileb://function.zip \
            --region ap-northeast-1
          aws lambda wait function-updated \
            --function-name flotopic-analytics \
            --region ap-northeast-1
          echo "[OK] analytics デプロイ完了"

      # ----------------------------------------------------------------
      # auth Lambda
      # ----------------------------------------------------------------
      - name: auth Lambda をデプロイ
        id: deploy_auth
        run: |
          cd projects/P003-news-timeline/lambda/auth
          zip -q function.zip handler.py
          aws lambda update-function-code \
            --function-name flotopic-auth \
            --zip-file fileb://function.zip \
            --region ap-northeast-1
          aws lambda wait function-updated \
            --function-name flotopic-auth \
            --region ap-northeast-1
          echo "[OK] auth デプロイ完了"

      # ----------------------------------------------------------------
      # favorites Lambda
      # ----------------------------------------------------------------
      - name: favorites Lambda をデプロイ
        id: deploy_favorites
        run: |
          cd projects/P003-news-timeline/lambda/favorites
          zip -q function.zip handler.py
          aws lambda update-function-code \
            --function-name flotopic-favorites \
            --zip-file fileb://function.zip \
            --region ap-northeast-1
          aws lambda wait function-updated \
            --function-name flotopic-favorites \
            --region ap-northeast-1
          echo "[OK] favorites デプロイ完了"

      # ----------------------------------------------------------------
      # lifecycle Lambda
      # ----------------------------------------------------------------
      - name: lifecycle Lambda をデプロイ
        id: deploy_lifecycle
        run: |
          cd projects/P003-news-timeline/lambda/lifecycle
          zip -q function.zip handler.py
          aws lambda update-function-code \
            --function-name flotopic-lifecycle \
            --zip-file fileb://function.zip \
            --region ap-northeast-1
          aws lambda wait function-updated \
            --function-name flotopic-lifecycle \
            --region ap-northeast-1
          echo "[OK] lifecycle デプロイ完了"

      # ----------------------------------------------------------------
      # cf-analytics Lambda
      # ----------------------------------------------------------------
      - name: cf-analytics Lambda をデプロイ
        id: deploy_cf_analytics
        run: |
          cd projects/P003-news-timeline/lambda/cf-analytics
          zip -q function.zip handler.py
          aws lambda update-function-code \
            --function-name flotopic-cf-analytics \
            --zip-file fileb://function.zip \
            --region ap-northeast-1
          aws lambda wait function-updated \
            --function-name flotopic-cf-analytics \
            --region ap-northeast-1
          echo "[OK] cf-analytics デプロイ完了"

      # ----------------------------------------------------------------
      # api Lambda
      # ----------------------------------------------------------------
      - name: api Lambda をデプロイ
        id: deploy_api
        run: |
          cd projects/P003-news-timeline/lambda/api
          zip -q function.zip handler.py
          aws lambda update-function-code \
            --function-name p003-api \
            --zip-file fileb://function.zip \
            --region ap-northeast-1
          aws lambda wait function-updated \
            --function-name p003-api \
            --region ap-northeast-1
          echo "[OK] api デプロイ完了"

      # ----------------------------------------------------------------
      # contact Lambda
      # ----------------------------------------------------------------
      - name: contact Lambda をデプロイ
        id: deploy_contact
        run: |
          cd projects/P003-news-timeline/lambda/contact
          zip -q function.zip handler.py
          aws lambda update-function-code \
            --function-name p003-contact \
            --zip-file fileb://function.zip \
            --region ap-northeast-1
          aws lambda wait function-updated \
            --function-name p003-contact \
            --region ap-northeast-1
          echo "[OK] contact デプロイ完了"

      # Slack通知は slack-notify.yml が push 時に一元管理するため不要

  # =====================================================================
  # post-deploy-verify: デプロイ後の効果計測 (T2026-0428-Z / 仕組みベース)
  # 目的: 「修正→push→数日後にナオヤが気付く」ループを潰す。
  #       デプロイ完了後に topics.json を取得し、AI 充填率と鮮度を即時検証する。
  #       閾値割れは GitHub Actions UI で赤ジョブとして残るので外部観測になる。
  # 注: deploy 直後は既存 topics.json を見ることになる。次回 processor 起動後の
  #     最新値検証は別系統 freshness-check.yml (毎時) が担う。
  # =====================================================================
  post-deploy-verify:
    name: post-deploy-verify (AI 充填率 + 鮮度)
    needs: [deploy]
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: AI 充填率 + 鮮度を計測
        shell: bash
        run: |
          set -e
          echo "::group::topics.json 取得 + 計測"
          curl -fsS --max-time 30 https://flotopic.com/api/topics.json -o /tmp/topics.json
          python3 - <<'PY'
          import json, sys, datetime as dt
          d = json.load(open('/tmp/topics.json'))
          topics = d.get('topics', d) if isinstance(d, dict) else d
          total = len(topics)
          ai_gen = sum(1 for t in topics if t.get('aiGenerated'))
          has_kp = sum(1 for t in topics if t.get('keyPoint') or t.get('keyPoints'))
          has_per = sum(1 for t in topics if t.get('perspectives'))
          kp_rate = has_kp/total*100 if total else 0
          per_rate = has_per/total*100 if total else 0
          # 鮮度
          ua = d.get('updatedAt') if isinstance(d, dict) else None
          age_min = -1
          if ua:
              try:
                  t = dt.datetime.fromisoformat(str(ua).replace('Z','+00:00'))
                  age_min = int((dt.datetime.now(dt.timezone.utc) - t).total_seconds()/60)
              except Exception as e:
                  print(f'updatedAt parse failed: {ua} ({e})')
          # サマリ出力
          summary = f"""### post-deploy-verify 結果
          - Total topics: {total}
          - aiGenerated: {ai_gen}
          - keyPoint 充填率: {kp_rate:.1f}% ({has_kp}/{total}) [閾値 60%]
          - perspectives 充填率: {per_rate:.1f}% ({has_per}/{total}) [閾値 60%]
          - updatedAt 経過: {age_min} 分 [閾値 90 分]
          """
          import os
          gha_summary = os.environ.get('GITHUB_STEP_SUMMARY')
          if gha_summary:
              with open(gha_summary, 'a') as f:
                  f.write(summary)
          print(summary)
          # 閾値判定 — 60% 未満は warning + 非ゼロ exit で job を赤くする
          # (user spec 通り: 「修正→push→数日後ナオヤ気付く」を物理ゲートで止める)
          failed = False
          if kp_rate < 60:
              print(f'::warning::keyPoint 充填率 {kp_rate:.1f}% < 60% 閾値')
              failed = True
          if per_rate < 60:
              print(f'::warning::perspectives 充填率 {per_rate:.1f}% < 60% 閾値')
              failed = True
          if age_min > 90 and age_min >= 0:
              print(f'::warning::topics.json 鮮度 {age_min}分 > 90分閾値')
              failed = True
          if failed:
              sys.exit(1)
          PY
          echo "::endgroup::"
