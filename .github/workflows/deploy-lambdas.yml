name: Lambda デプロイ（全関数）

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "projects/P003-news-timeline/lambda/**"
      - "scripts/bluesky_agent.py"
      - "scripts/_governance_check.py"
  # T2026-0502-PATH-FILTER-AUDIT: auto-merge (github-actions[bot]) が push すると
  # GitHub ループ防止仕様で push event が発火しない。pull_request closed を使うことで
  # auto-merge 経由のマージでも確実にデプロイをトリガーする。
  pull_request:
    types: [closed]
    branches:
      - main
    paths:
      - "projects/P003-news-timeline/lambda/**"
      - "scripts/bluesky_agent.py"
      - "scripts/_governance_check.py"

concurrency:
  group: deploy-p003-lambda
  cancel-in-progress: false

jobs:
  deploy:
    # pull_request closed は merge されなかった場合も発火するので明示的に除外
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event_name == 'push' ||
      (github.event_name == 'pull_request' && github.event.pull_request.merged == true)
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: AWS認証情報を設定
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-northeast-1

      - name: Python セットアップ
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      # ----------------------------------------------------------------
      # fetcher Lambda（外部ライブラリ不要・stdlib + boto3のみ使用）
      # ----------------------------------------------------------------
      - name: fetcher Lambda をデプロイ
        id: deploy_fetcher
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          cd projects/P003-news-timeline/lambda/fetcher
          zip -q function.zip *.py
          aws lambda update-function-code \
            --function-name p003-fetcher \
            --zip-file fileb://function.zip \
            --region ap-northeast-1
          aws lambda wait function-updated \
            --function-name p003-fetcher \
            --region ap-northeast-1
          # T2026-0501-H: borderline トピックマージ判定 (Haiku) 用に ANTHROPIC_API_KEY を追加。
          # 既存の env (SLACK_WEBHOOK 等) を保持するため、現在値を取得して ANTHROPIC_API_KEY のみ追記する。
          EXISTING_ENV=$(aws lambda get-function-configuration \
            --function-name p003-fetcher --region ap-northeast-1 \
            --query 'Environment.Variables' --output json)
          # AWS CLI の --environment Variables 引数は key=value をカンマ区切りで取る形式
          # T2026-0502-Q fix: cd 後に相対パス scripts/... を呼ぶと runner にファイルが無く
          # [Errno 2] No such file or directory で必ず失敗していた構造バグを恒久対処。
          # repo root 直下を絶対パスで参照する。GITHUB_WORKSPACE は GHA が必ず設定する。
          MERGED_ENV=$(EXISTING_ENV="$EXISTING_ENV" python3 "$GITHUB_WORKSPACE/scripts/ci_lambda_merge_env.py")
          aws lambda update-function-configuration \
            --function-name p003-fetcher \
            --environment "Variables={${MERGED_ENV}}" \
            --region ap-northeast-1 > /dev/null
          aws lambda wait function-updated --function-name p003-fetcher --region ap-northeast-1
          echo "[OK] fetcher デプロイ完了（ANTHROPIC_API_KEY設定済み・既存env保持）"

      # ----------------------------------------------------------------
      # processor Lambda（Pillow + NotoSansJP フォント同梱でOGP画像生成対応）
      # ----------------------------------------------------------------
      - name: processor Lambda をデプロイ
        id: deploy_processor
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          cd projects/P003-news-timeline/lambda/processor
          # Pillow をLambdaランタイム(Amazon Linux 2023 x86_64 / Python3.12)向けにインストール
          pip install Pillow==10.4.0 \
            --platform manylinux2014_x86_64 \
            --target . \
            --python-version 3.12 \
            --only-binary=:all: \
            -q
          # NotoSansJP フォントをダウンロード（OGP画像の日本語テキスト描画用）
          curl -sL "https://github.com/google/fonts/raw/main/ofl/notosansjp/static/NotoSansJP-Regular.ttf" \
            -o NotoSansJP-Regular.ttf \
            || echo "Warning: Font download failed, OGP will use fallback rendering"
          zip -qr function.zip . --exclude "*.pyc" --exclude "__pycache__/*"
          aws lambda update-function-code \
            --function-name p003-processor \
            --zip-file fileb://function.zip \
            --region ap-northeast-1
          aws lambda wait function-updated \
            --function-name p003-processor \
            --region ap-northeast-1
          # ANTHROPIC_API_KEYをLambda環境変数に設定（deploy毎に確実に反映）
          aws lambda update-function-configuration \
            --function-name p003-processor \
            --environment "Variables={TABLE_NAME=p003-topics,S3_BUCKET=p003-news-946554699567,REGION=ap-northeast-1,SITE_URL=https://flotopic.com,ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}}" \
            --region ap-northeast-1 > /dev/null
          aws lambda wait function-updated --function-name p003-processor --region ap-northeast-1
          echo "[OK] processor デプロイ完了（ANTHROPIC_API_KEY設定済み）"

      # ----------------------------------------------------------------
      # comments Lambda
      # ----------------------------------------------------------------
      - name: comments Lambda をデプロイ
        id: deploy_comments
        run: |
          cd projects/P003-news-timeline/lambda/comments
          zip -q function.zip handler.py
          aws lambda update-function-code \
            --function-name p003-comments \
            --zip-file fileb://function.zip \
            --region ap-northeast-1
          aws lambda wait function-updated \
            --function-name p003-comments \
            --region ap-northeast-1
          echo "[OK] comments デプロイ完了"

      # ----------------------------------------------------------------
      # analytics Lambda
      # ----------------------------------------------------------------
      - name: analytics Lambda をデプロイ
        id: deploy_analytics
        run: |
          cd projects/P003-news-timeline/lambda/analytics
          zip -q function.zip handler.py
          aws lambda update-function-code \
            --function-name flotopic-analytics \
            --zip-file fileb://function.zip \
            --region ap-northeast-1
          aws lambda wait function-updated \
            --function-name flotopic-analytics \
            --region ap-northeast-1
          echo "[OK] analytics デプロイ完了"

      # ----------------------------------------------------------------
      # auth Lambda
      # ----------------------------------------------------------------
      - name: auth Lambda をデプロイ
        id: deploy_auth
        run: |
          cd projects/P003-news-timeline/lambda/auth
          zip -q function.zip handler.py
          aws lambda update-function-code \
            --function-name flotopic-auth \
            --zip-file fileb://function.zip \
            --region ap-northeast-1
          aws lambda wait function-updated \
            --function-name flotopic-auth \
            --region ap-northeast-1
          echo "[OK] auth デプロイ完了"

      # ----------------------------------------------------------------
      # favorites Lambda
      # ----------------------------------------------------------------
      - name: favorites Lambda をデプロイ
        id: deploy_favorites
        run: |
          cd projects/P003-news-timeline/lambda/favorites
          zip -q function.zip handler.py
          aws lambda update-function-code \
            --function-name flotopic-favorites \
            --zip-file fileb://function.zip \
            --region ap-northeast-1
          aws lambda wait function-updated \
            --function-name flotopic-favorites \
            --region ap-northeast-1
          echo "[OK] favorites デプロイ完了"

      # ----------------------------------------------------------------
      # lifecycle Lambda
      # ----------------------------------------------------------------
      - name: lifecycle Lambda をデプロイ
        id: deploy_lifecycle
        run: |
          cd projects/P003-news-timeline/lambda/lifecycle
          zip -q function.zip handler.py
          aws lambda update-function-code \
            --function-name flotopic-lifecycle \
            --zip-file fileb://function.zip \
            --region ap-northeast-1
          aws lambda wait function-updated \
            --function-name flotopic-lifecycle \
            --region ap-northeast-1
          echo "[OK] lifecycle デプロイ完了"

      # ----------------------------------------------------------------
      # cf-analytics Lambda
      # ----------------------------------------------------------------
      - name: cf-analytics Lambda をデプロイ
        id: deploy_cf_analytics
        run: |
          cd projects/P003-news-timeline/lambda/cf-analytics
          zip -q function.zip handler.py
          aws lambda update-function-code \
            --function-name flotopic-cf-analytics \
            --zip-file fileb://function.zip \
            --region ap-northeast-1
          aws lambda wait function-updated \
            --function-name flotopic-cf-analytics \
            --region ap-northeast-1
          echo "[OK] cf-analytics デプロイ完了"

      # ----------------------------------------------------------------
      # api Lambda
      # ----------------------------------------------------------------
      - name: api Lambda をデプロイ
        id: deploy_api
        run: |
          cd projects/P003-news-timeline/lambda/api
          zip -q function.zip handler.py
          aws lambda update-function-code \
            --function-name p003-api \
            --zip-file fileb://function.zip \
            --region ap-northeast-1
          aws lambda wait function-updated \
            --function-name p003-api \
            --region ap-northeast-1
          echo "[OK] api デプロイ完了"

      # ----------------------------------------------------------------
      # contact Lambda
      # ----------------------------------------------------------------
      - name: contact Lambda をデプロイ
        id: deploy_contact
        run: |
          cd projects/P003-news-timeline/lambda/contact
          zip -q function.zip handler.py
          aws lambda update-function-code \
            --function-name p003-contact \
            --zip-file fileb://function.zip \
            --region ap-northeast-1
          aws lambda wait function-updated \
            --function-name p003-contact \
            --region ap-northeast-1
          echo "[OK] contact デプロイ完了"

      # ----------------------------------------------------------------
      # bluesky Lambda (T2026-0428-AV)
      # GH Actions cron 無料枠の発火不安定問題を根本解決するため、
      # scripts/bluesky_agent.py のロジックを Lambda 化して
      # EventBridge から rate(30 minutes) で直接 invoke する。
      # ハンドラ本体は handler.py、ロジックは scripts/bluesky_agent.py を
      # ビルド時にコピーして同梱（CLI とのコード分岐を作らない）。
      # ----------------------------------------------------------------
      - name: bluesky Lambda をデプロイ
        id: deploy_bluesky
        env:
          BLUESKY_HANDLE:        ${{ secrets.BLUESKY_HANDLE }}
          BLUESKY_APP_PASSWORD:  ${{ secrets.BLUESKY_APP_PASSWORD }}
          SLACK_WEBHOOK:         ${{ secrets.SLACK_WEBHOOK }}
        run: |
          set -e
          BLUE_DIR=projects/P003-news-timeline/lambda/bluesky
          # CLI と同じロジックを Lambda にも入れる（DRY: scripts/ が source of truth）
          cp scripts/bluesky_agent.py "$BLUE_DIR/bluesky_agent.py"
          cp scripts/_governance_check.py "$BLUE_DIR/_governance_check.py"
          cd "$BLUE_DIR"
          # atproto を Lambda ランタイム (Amazon Linux 2023 / Python 3.12) 向けに同梱
          # boto3 は Lambda ランタイム標準なので入れない
          pip install atproto \
            --platform manylinux2014_x86_64 \
            --target . \
            --python-version 3.12 \
            --only-binary=:all: \
            -q
          zip -qr function.zip . --exclude "*.pyc" --exclude "__pycache__/*" --exclude "function.zip"
          # 関数が無ければ作成、あれば更新
          if ! aws lambda get-function --function-name flotopic-bluesky --region ap-northeast-1 >/dev/null 2>&1; then
            ROLE_ARN=$(aws iam get-role --role-name p003-lambda-role --query 'Role.Arn' --output text)
            aws lambda create-function \
              --function-name flotopic-bluesky \
              --runtime python3.12 \
              --role "$ROLE_ARN" \
              --handler handler.lambda_handler \
              --zip-file fileb://function.zip \
              --timeout 120 --memory-size 256 \
              --region ap-northeast-1 > /dev/null
            # 新規作成は Pending 状態で返るので Active になるのを待つ
            aws lambda wait function-active \
              --function-name flotopic-bluesky \
              --region ap-northeast-1
            echo "[OK] flotopic-bluesky 新規作成"
          else
            aws lambda update-function-code \
              --function-name flotopic-bluesky \
              --zip-file fileb://function.zip \
              --region ap-northeast-1 > /dev/null
            aws lambda wait function-updated \
              --function-name flotopic-bluesky \
              --region ap-northeast-1
            echo "[OK] flotopic-bluesky コード更新"
          fi
          # 環境変数を毎デプロイで反映（Secrets ローテに追従）
          aws lambda update-function-configuration \
            --function-name flotopic-bluesky \
            --timeout 120 --memory-size 256 \
            --environment "Variables={BLUESKY_HANDLE=${BLUESKY_HANDLE},BLUESKY_APP_PASSWORD=${BLUESKY_APP_PASSWORD},SLACK_WEBHOOK=${SLACK_WEBHOOK},S3_BUCKET=p003-news-946554699567,SITE_URL=https://flotopic.com}" \
            --region ap-northeast-1 > /dev/null
          aws lambda wait function-updated --function-name flotopic-bluesky --region ap-northeast-1
          echo "[OK] flotopic-bluesky 環境変数更新"

      # ----------------------------------------------------------------
      # T193: 朝の定期投稿 (morning) 用 EventBridge cron 登録
      # 目的: 「毎日来る理由」— JST 08:00 に必ず Bluesky で動きトピックを 1 件投稿。
      # 既存 rate(30 minutes) ルール (任意のトピックを 2.5h cooldown で投稿) とは独立。
      # 新ルール flotopic-bluesky-morning は cron(0 23 * * ? *) (UTC 23:00 = JST 08:00)。
      # 既存 Lambda flotopic-bluesky を再利用し、Input='{"mode":"morning"}' で起動する。
      # 冪等: put-rule / put-targets / add-permission をすべて存在チェック付きで実行。
      # ----------------------------------------------------------------
      - name: bluesky-morning EventBridge cron 登録 (T193)
        run: |
          set -e
          RULE_NAME=flotopic-bluesky-morning
          REGION=ap-northeast-1
          LAMBDA_NAME=flotopic-bluesky
          LAMBDA_ARN=$(aws lambda get-function --function-name "$LAMBDA_NAME" --region "$REGION" --query 'Configuration.FunctionArn' --output text)
          echo "Lambda ARN: $LAMBDA_ARN"

          # 1) ルール作成 or 更新 (UTC 23:00 = JST 08:00)
          aws events put-rule \
            --name "$RULE_NAME" \
            --schedule-expression "cron(0 23 * * ? *)" \
            --state ENABLED \
            --description "T193 morning bluesky post — JST 08:00 daily" \
            --region "$REGION" > /dev/null
          echo "[OK] EventBridge ルール $RULE_NAME (cron 0 23 * * ? *)"

          # 2) Lambda 側の invoke 許可 (既にあれば ResourceConflictException を黙殺)
          STATEMENT_ID="${RULE_NAME}-invoke"
          if ! aws lambda get-policy --function-name "$LAMBDA_NAME" --region "$REGION" 2>/dev/null | grep -q "$STATEMENT_ID"; then
            RULE_ARN=$(aws events describe-rule --name "$RULE_NAME" --region "$REGION" --query 'Arn' --output text)
            aws lambda add-permission \
              --function-name "$LAMBDA_NAME" \
              --statement-id "$STATEMENT_ID" \
              --action lambda:InvokeFunction \
              --principal events.amazonaws.com \
              --source-arn "$RULE_ARN" \
              --region "$REGION" > /dev/null
            echo "[OK] Lambda permission $STATEMENT_ID 付与"
          else
            echo "[SKIP] Lambda permission $STATEMENT_ID 既存"
          fi

          # 3) ターゲット登録 (Input='{"mode":"morning"}')
          # AWS CLI shorthand 構文は Input 値の JSON 内コンマで parse error を起こすため、
          # --targets には JSON ファイル (file://) を渡す。
          TARGETS_JSON=$(mktemp --suffix=.json)
          cat > "$TARGETS_JSON" <<EOF
          [
            {
              "Id": "1",
              "Arn": "$LAMBDA_ARN",
              "Input": "{\"mode\":\"morning\"}"
            }
          ]
          EOF
          aws events put-targets \
            --rule "$RULE_NAME" \
            --targets "file://$TARGETS_JSON" \
            --region "$REGION" > /dev/null
          rm -f "$TARGETS_JSON"
          echo "[OK] EventBridge ターゲット (morning mode → $LAMBDA_NAME) 登録"

      # Slack通知は slack-notify.yml が push 時に一元管理するため不要

  # =====================================================================
  # post-deploy-verify: 独立ワークフローに移行 (T2026-0502-POST-DEPLOY-VERIFY-FIX)
  # 理由: deploy job の成功と workflow 全体の結論を分離する
  #       → post-deploy-verify.yml が workflow_run で自動起動
  #       → 失敗しても deploy workflow conclusion に影響なし
  # 注: deploy 直後の topics.json を検証する同じロジック継続
  #     deploy 直後は既存 topics.json を見ることになる。次回 processor 起動後の
  #     最新値検証は別系統 freshness-check.yml (毎時) が担う。