name: CI（構文チェック・品質確認）

on:
  pull_request:
    branches: [main]
  push:
    branches: [main, staging]
    paths:
      - 'projects/**'
      - 'scripts/**'
      - '.github/workflows/**'

jobs:
  lint-frontend:
    name: フロントエンド構文チェック
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Node.js セットアップ
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: JS 構文チェック（node --check）
        run: |
          echo "=== フロントエンド JS 構文チェック ==="
          ERRORS=0
          for f in projects/P003-news-timeline/frontend/*.js; do
            node --check "$f" 2>&1 && echo "  ✅ $f" || { echo "  ❌ $f"; ERRORS=$((ERRORS+1)); }
          done
          if [ $ERRORS -gt 0 ]; then
            echo "::error::JS構文エラーが $ERRORS 件あります"
            exit 1
          fi
          echo "✅ 全JSファイル 構文OK"

      - name: ユニットテスト（node:test）
        run: |
          echo "=== P003 ユニットテスト ==="
          cd projects/P003-news-timeline && npm run test:unit
          echo "✅ ユニットテスト全件パス"

      - name: HTML 基本チェック（必須要素の確認）
        run: |
          echo "=== HTML 基本チェック ==="
          for f in projects/P003-news-timeline/frontend/*.html; do
            if ! grep -q 'charset="UTF-8"' "$f"; then
              echo "::warning::$f に charset=UTF-8 がありません"
            fi
            if ! grep -q 'viewport' "$f"; then
              echo "::warning::$f に viewport meta がありません"
            fi
            echo "  ✅ $f"
          done

  e2e-frontend:
    name: フロントエンド E2E スモーク（puppeteer）
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Node.js セットアップ
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: projects/P003-news-timeline/package-lock.json

      - name: puppeteer 依存インストール
        working-directory: projects/P003-news-timeline
        run: |
          if [ -f package-lock.json ]; then npm ci; else npm install; fi

      - name: E2E スモーク (index.html / about.html)
        working-directory: projects/P003-news-timeline
        run: |
          npm run test:e2e
          echo "✅ E2E スモーク完了"

  lint-lambda:
    name: Lambda 構文チェック
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Python セットアップ
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Python 構文チェック（py_compile）
        run: |
          echo "=== Lambda Python 構文チェック ==="
          ERRORS=0
          while IFS= read -r f; do
            python3 -m py_compile "$f" && echo "  OK: $f" || { echo "  NG: $f"; ERRORS=$((ERRORS+1)); }
          done < <(find projects/P003-news-timeline/lambda -name "*.py")
          while IFS= read -r f; do
            python3 -m py_compile "$f" && echo "  OK: $f" || true
          done < <(find scripts -name "*.py" 2>/dev/null)
          [ $ERRORS -eq 0 ] || exit 1
          echo "✅ Lambda 構文チェック完了"

      - name: AI フィールドカタログと proc_ai schema 突合 (T2026-0428-T)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          # proc_ai.py の _build_story_schema(mode='full') と
          # docs/ai-fields-catalog.md 先頭フィールド表に乖離がないか物理ガード。
          # 新フィールド追加時の「実装したがカタログ更新を忘れた」を CI で検知する。
          echo "=== AI フィールドカタログ vs schema 突合 ==="
          python3 scripts/check_ai_fields_catalog.py

      - name: DDB-bound dict の Decimal ラップ漏れ検出 (T2026-0430-D)
        run: |
          # 2026-04-27 commit 59eaf649 で fetcher/handler.py:584 の
          # 'diversityScore': _div_mult が Decimal 未ラップで本番に landing し
          # "Float types are not supported" で chunk 3/4 失敗 → 新規記事 159件保存失敗 →
          # topics 88% 72h+ 停滞 という事故 (PR #46) の物理再発防止。
          # AST で Dict literal を歩き、value のいずれかが Decimal(...) で wrap されている
          # dict を「DDB 行き」と判定し、他 value に bare float / 未ラップ float-func 呼び出し /
          # constant float / Div BinOp が混在していないか検査する。
          echo "=== Decimal ラップ漏れ物理ガード ==="
          python3 scripts/check_decimal_wrap.py
          python3 -m unittest scripts.test_decimal_wrap -v

      - name: 危険パターン検出
        run: |
          echo "=== 危険パターン検出 ==="
          # ハードコードされたシークレットチェック
          # 除外:
          #   - re.compile/search/match() のパターン定義行
          #   - # コメント行
          #   - シークレット検出スクリプト自身（security_audit.sh / security-audit ファイル名）
          #     これらは「sk-ant-* を grep するための定義」が中身に必要なので構造的に誤検知する
          if grep -rn "sk-ant-\|AKIA[A-Z0-9]" \
               projects/P003-news-timeline/lambda/ scripts/ 2>/dev/null \
             | grep -v "re\.compile\|re\.search\|re\.match\|#.*sk-ant\|#.*AKIA" \
             | grep -v "scripts/security_audit\.sh\|scripts/security-audit"; then
            echo "::error::APIキーがコードにハードコードされています"
            exit 1
          fi
          # デバッグ用 print 過剰チェック（警告のみ）
          COUNT=$(grep -rn "^print(" projects/P003-news-timeline/lambda/ 2>/dev/null | wc -l)
          if [ "$COUNT" -gt 20 ]; then
            echo "::warning::Lambdaにprint文が多いです（$COUNT 件）。本番ログが汚れます"
          fi
          echo "✅ 危険パターンなし"

      - name: よくあるバグパターン検出
        run: |
          echo "=== よくあるバグパターン検出 ==="
          ERRORS=0

          # sw.js に手動バージョン番号が残っていないか（flotopic-vNN は禁止）
          if grep -rn "CACHE_NAME = 'flotopic-v[0-9]" \
               projects/P003-news-timeline/frontend/sw.js 2>/dev/null; then
            echo "::error::sw.js に手動バージョン番号があります（flotopic-vNN）。'flotopic-dev' のままにしてください。デプロイ時に自動でgit SHAに置換されます。"
            ERRORS=$((ERRORS+1))
          fi

          # API URL の二重パスバグ検出（API_BASE + 'api/' は二重になる）
          if grep -rn "API_BASE.*+.*['\"]api/" \
               projects/P003-news-timeline/frontend/*.js \
               projects/P003-news-timeline/frontend/*.html \
               projects/P003-news-timeline/frontend/js/*.js 2>/dev/null; then
            echo "::error::API URLに二重パスの可能性があります（API_BASE + 'api/...' → /api/api/...）。topics.json等は API_BASE + 'topics.json' が正しい形式。"
            ERRORS=$((ERRORS+1))
          fi

          # frontend/js/ 配下のJSも構文チェック
          for f in projects/P003-news-timeline/frontend/js/*.js; do
            [ -f "$f" ] || continue
            node --check "$f" 2>&1 && echo "  ✅ $f" || { echo "  ❌ $f"; ERRORS=$((ERRORS+1)); }
          done

          if [ $ERRORS -gt 0 ]; then
            echo "::error::バグパターンが $ERRORS 件検出されました"
            exit 1
          fi
          echo "✅ よくあるバグパターンなし"

  mobile-layout-check:
    name: モバイルレイアウト基本チェック (375px 横スクロール検知)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Node.js セットアップ
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: projects/P003-news-timeline/package-lock.json

      - name: jq セットアップ (verify_effect.sh で使用)
        run: |
          if ! command -v jq >/dev/null 2>&1; then
            sudo apt-get update -qq && sudo apt-get install -y -qq jq
          fi

      - name: puppeteer 依存インストール
        working-directory: projects/P003-news-timeline
        run: |
          # package-lock があればそれを尊重、無ければ install
          if [ -f package-lock.json ]; then npm ci; else npm install; fi

      - name: 375px 幅で横スクロール検知 (verify_effect.sh mobile_layout)
        run: |
          # check_mobile_layout.js が projects/P003-news-timeline/node_modules を自動探索する
          bash scripts/verify_effect.sh mobile_layout
          echo "✅ モバイルレイアウト OK (375px で横スクロール無し)"

  lint-scripts:
    name: エージェントスクリプト チェック
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: scripts/ Python 構文チェック
        run: |
          ERRORS=0
          for f in scripts/*.py; do
            python3 -m py_compile "$f" 2>&1 && echo "  ✅ $f" || { echo "  ❌ $f"; ERRORS=$((ERRORS+1)); }
          done
          [ $ERRORS -eq 0 ] || exit 1

  conflict-markers:
    name: コンフリクトマーカー残存チェック
    runs-on: ubuntu-latest
    # 用途: マージ解消し忘れた `<<<<<<<` `=======` `>>>>>>>` が main に landing するのを物理ブロック。
    # 過去事例 (2026-04-29 commit 47dd451): app.js / style.css のマージコンフリクトが
    # 解消未完了のまま push され、CI が同じ箇所で繰り返し失敗していた (T2026-0429-D 起票理由)。
    steps:
      - uses: actions/checkout@v4
      - name: コンフリクトマーカー grep
        run: |
          # `<<<<<<<` と `>>>>>>>` は通常コードに 7 連続出現しないため、行頭一致で検出すれば偽陽性ゼロ。
          # `=======` は Markdown の h1 underline と衝突するため、`<<<<<<<`/`>>>>>>>` とのペアで判定する。
          # 検査対象は projects/ 配下の .js / .css / .py / .md (T2026-0429-D 仕様)。
          set +e
          MATCHES=$(grep -rEn "^(<<<<<<<|>>>>>>>) " \
            --include="*.js" --include="*.css" --include="*.py" --include="*.md" \
            projects/ 2>/dev/null)
          if [ -n "$MATCHES" ]; then
            echo "::error::コンフリクトマーカーが残存しています:"
            echo "$MATCHES" | sed 's/^/  /'
            echo ""
            echo "対応: 当該ファイルでコンフリクト解消を完了させてから commit してください。"
            exit 1
          fi
          echo "✅ コンフリクトマーカー残存なし"

  content-drift-guard:
    name: 思想・表記ドリフト検出（守らないと進めない仕組み）
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: AI セクション/フェーズ表記の同期検査
        run: |
          # 旧4セクション・旧フェーズ表記が残ったまま main に landing するのを物理的に止める。
          # ルールは最終手段。落ちる仕組みでブロックする。
          bash scripts/check_section_sync.sh

      - name: PII 検査（個人情報のコード直書き禁止）
        run: |
          # 公開リポジトリに owner の username/email が残らないよう物理ガード。
          # 検出パターン (character class escape — filter-repo safe):
          #   m[u]rakaminaoya / mr[k]m\.naoya / n[a]oya643
          # 除外（パターンを意図的に保持するファイル）:
          #   - scripts/security_audit.sh — A1 監査の grep パターン
          #   - done.sh — security 系タスクの PII grep
          #   - .github/workflows/ci.yml — このチェック自体
          HITS=$(git ls-files \
            | xargs grep -lE "m[u]rakaminaoya|mr[k]m\\.naoya|n[a]oya643" 2>/dev/null \
            | grep -v "^scripts/security_audit\.sh$" \
            | grep -v "^done\.sh$" \
            | grep -v "^\.github/workflows/ci\.yml$" \
            || true)
          if [ -n "$HITS" ]; then
            echo "::error::PII (owner username/email) detected in tracked files:"
            echo "$HITS" | sed 's/^/   /'
            echo "::error::Use \$HOME / git rev-parse --show-toplevel / placeholder instead."
            exit 1
          fi
          echo "✅ PII 検査 OK"

      - name: 設計指針キーワードの一貫性検査
        run: |
          # 2026-04-28 更新: 旧「AI 7セクション分析」「始まり→広まってる→…」は廃止。
          # AI 構造は 4 軸（状況解説 / 各メディアの見解 / これからの注目ポイント / AI予想）に再編済み
          # （T2026-0428-E + about.html 25ba39f / lessons-learned「2026-04-28 AI構造 7→4軸」）。
          # ドキュメント (about.html) に新 4 軸が残っていることを物理ガード。
          REQUIRED=(
            "状況解説"
            "各メディアの見解"
            "これからの注目ポイント"
          )
          MISSING=0
          for kw in "${REQUIRED[@]}"; do
            if ! grep -rq "$kw" projects/P003-news-timeline/frontend 2>/dev/null; then
              echo "::error::必須キーワードが消えています: $kw"
              MISSING=$((MISSING+1))
            else
              echo "  ✅ found: $kw"
            fi
          done
          if [ $MISSING -gt 0 ]; then
            echo "::error::AI 4 軸キーワードが $MISSING 件消失。about.html / style.css を確認してください"
            exit 1
          fi
          echo "✅ AI 4 軸キーワード OK"

      - name: scriptタグ defer/async 禁止リスト検査
        run: |
          # CLAUDE.md「scriptタグdefer/async禁止リスト」の物理強制。
          # chart.js / config.js / app.js / detail.js は実行順序依存があるため defer/async 禁止。
          ERRORS=0
          for f in projects/P003-news-timeline/frontend/*.html; do
            HITS=$(grep -nE 'src="(chart\.js|config\.js|app\.js|detail\.js)"[^>]*\b(defer|async)\b' "$f" 2>/dev/null || true)
            if [ -n "$HITS" ]; then
              echo "::error file=$f::script defer/async 禁止違反"
              echo "$HITS" | sed 's/^/   /'
              ERRORS=$((ERRORS+1))
            fi
          done
          if [ $ERRORS -gt 0 ]; then
            echo "::error::禁止リストの script に defer/async が付与されています ($ERRORS 件)"
            exit 1
          fi
          echo "✅ defer/async 禁止リスト OK"

      - name: 意味色ハードコード禁止検査 (#ef4444 / #f43f5e)
        run: |
          # CLAUDE.md「CSS意味色のハードコード禁止」の物理強制。
          # 認められる場所:
          #   - style.css の :root / [data-theme="dark"] の var 定義行
          #   - PHASE_BADGE_COLOR / valid_phases などフェーズ→色のデータマップ (意図的)
          # それ以外は var(--color-danger) / var(--color-heart) を使う。
          HITS=$(grep -rEn '#ef4444|#f43f5e' \
                projects/P003-news-timeline/frontend/ \
                --include='*.html' --include='*.js' \
              | grep -v 'style.css' \
              | grep -vE 'PHASE_BADGE_COLOR|valid_phases' \
              || true)
          if [ -n "$HITS" ]; then
            echo "::error::意味色 (#ef4444/#f43f5e) のハードコードが見つかりました。var(--color-danger)/var(--color-heart) を使ってください"
            echo "$HITS" | sed 's/^/   /'
            exit 1
          fi
          echo "✅ 意味色ハードコードなし"

      - name: tokushoho.html 不在＆内部リンク復活禁止検査 (T225)
        run: |
          # CLAUDE.md「tokushoho.html 廃止済み・復活禁止」の物理強制。
          # T225 (2026-04-29): スタブファイル自体も削除。今後は frontend に存在してはならない。
          if [ -f "projects/P003-news-timeline/frontend/tokushoho.html" ]; then
            echo "::error::projects/P003-news-timeline/frontend/tokushoho.html が復活しています (T225 で削除済)"
            exit 1
          fi
          # 内部参照 (footer/sitemap/sw.js/他HTML) も復活禁止
          REFS=$(grep -rln 'tokushoho' projects/P003-news-timeline/frontend/ 2>/dev/null || true)
          if [ -n "$REFS" ]; then
            echo "::error::tokushoho 内部参照が復活しています:"
            echo "$REFS" | sed 's/^/   /'
            exit 1
          fi
          echo "✅ tokushoho.html 不在 / 内部参照なし"

      - name: ads.txt と index.html pub-id 整合性検査 (T239)
        run: |
          # T239 / lessons-learned「ads.txt AdSense 行欠落 (2026-04-27)」の再発防止。
          # ads.txt は Google が独立にクロールする別ファイル。pub-ID が一致しないと AdSense 審査落ち。
          # 物理ガード: index.html の `data-ad-client=ca-pub-XXX` を抽出 → ads.txt に対応行があるか grep。
          ADS_TXT="projects/P003-news-timeline/frontend/ads.txt"
          INDEX_HTML="projects/P003-news-timeline/frontend/index.html"
          if [ ! -f "$ADS_TXT" ]; then
            echo "::error::$ADS_TXT が存在しません"
            exit 1
          fi
          if [ ! -f "$INDEX_HTML" ]; then
            echo "::warning::$INDEX_HTML が見つかりません。ads.txt 整合検査をスキップ"
            exit 0
          fi
          # AdSense pub-ID (ca-pub-NNN) を index.html から抽出。重複排除。
          PUB_IDS=$(grep -oE 'ca-pub-[0-9]+' "$INDEX_HTML" | sort -u | sed 's/^ca-//')
          MISSING=0
          if [ -z "$PUB_IDS" ]; then
            echo "  (index.html に AdSense pub-id 無し。ads.txt 検査スキップ)"
          else
            for pub in $PUB_IDS; do
              if grep -qE "google\.com,[[:space:]]*${pub}," "$ADS_TXT"; then
                echo "  ✅ ads.txt に $pub (google.com) 行あり"
              else
                echo "::error file=$ADS_TXT::index.html の $pub が ads.txt の google.com 行に存在しません"
                MISSING=$((MISSING+1))
              fi
            done
          fi
          # 忍者AdMax (data-shinobi-id) 整合 — index.html / *.html いずれかに使われていれば ads.txt に shinobi 行が必須
          SHINOBI_IDS=$(grep -hoE 'data-shinobi-id="[0-9]+"' projects/P003-news-timeline/frontend/*.html 2>/dev/null \
                       | sed -E 's/.*"([0-9]+)".*/\1/' | sort -u)
          if [ -n "$SHINOBI_IDS" ]; then
            for sid in $SHINOBI_IDS; do
              if grep -qE "shinobi\.jp,${sid}," "$ADS_TXT"; then
                echo "  ✅ ads.txt に $sid (shinobi) 行あり"
              else
                echo "::error file=$ADS_TXT::frontend に shinobi-id $sid があるが ads.txt に対応行なし"
                MISSING=$((MISSING+1))
              fi
            done
          fi
          if [ $MISSING -gt 0 ]; then
            echo "::error::ads.txt と frontend pub-id の不整合 $MISSING 件。ads.txt に該当行を追記してください"
            exit 1
          fi
          echo "✅ ads.txt と pub-id 整合"

      - name: ロールバック runbook 整備 (T2026-0428-BA)
        run: |
          # runbook が空でないこと + git revert または aws lambda update-function-code が含まれていることを物理検査
          RUNBOOK="docs/runbooks/rollback.md"
          if [ ! -f "$RUNBOOK" ]; then
            echo "::error::$RUNBOOK が見つかりません"
            exit 1
          fi
          FILE_SIZE=$(stat -f%z "$RUNBOOK" 2>/dev/null || stat -c%s "$RUNBOOK" 2>/dev/null || echo 0)
          if [ "$FILE_SIZE" -lt 100 ]; then
            echo "::error::$RUNBOOK が空またはほぼ空です（サイズ: $FILE_SIZE bytes）"
            exit 1
          fi
          if ! grep -q 'git revert\|aws lambda update-function-code' "$RUNBOOK"; then
            echo "::error::$RUNBOOK に 'git revert' または 'aws lambda update-function-code' が含まれていません"
            exit 1
          fi
          echo "✅ ロールバック runbook 整備 OK (ファイル存在・内容妥当)"

      - name: 横展開チェックリスト landing 検証 (T2026-0428-BC)
        run: |
          # lessons-learned.md の「横展開チェックリスト」で追跡中の全対策について、
          # 実装ファイルが repo に実在するかを物理検査。
          # ✅/⚠ 状態の対策は landing していなければ CI ブロック。
          bash scripts/check_lessons_landings.sh

      - name: 形骸化検出 grep (T2026-0428-BD)
        run: |
          # CLAUDE.md / global-baseline.md / lessons-learned.md の
          # 「仕組み的対策」セクションに「気を付ける/注意する/意識する/確認する」
          # が混入していないかを物理検査。
          # 引用 (「気を付ける」禁止 等) と否定文は除外。
          # 仕組み的対策はテキストルールでなく CI / hook / metric / SLI / scripts で物理化する。
          bash scripts/check_soft_language.sh

      - name: SLI フィールド ↔ 実装スキーマ 乖離検出 (T2026-0429-M)
        run: |
          # freshness-check.yml の t.get('FOO') と proc_ai.py / handler.py の生成フィールド名を
          # 突合し、SLI が常に 0% を測ってしまう「situation 0% 問題」型の事故を物理ガード。
          bash scripts/check_sli_field_coverage.sh

      - name: 係数・パラメータ根拠 確認 (T2026-0429-N, WARNING のみ)
        if: github.event_name == 'pull_request'
        env:
          # NOTE: env 経由で渡すこと。${{ ... }} を `run:` に直接埋めると PR本文内の
          # バッククォート/$()/" で command injection される (T2026-0429-N 初版で発生)。
          PR_BODY_TEXT: ${{ github.event.pull_request.body }}
          BASE_REF: ${{ github.base_ref }}
        run: |
          # PR本文 / 直近 commit に「このPRで答えられる問い」/「# measured:」/「# theoretical:」
          # のいずれかが含まれているかを確認。WARNING のみ・強制ブロックなし。
          # 将来「これは正しかったか」を判断するため、係数導入時の根拠を残す習慣を促す目的。
          PR_BODY_FILE="$(mktemp)"
          printf '%s' "$PR_BODY_TEXT" > "$PR_BODY_FILE"
          PR_BODY_FILE="$PR_BODY_FILE" COMMIT_RANGE="origin/$BASE_REF..HEAD" \
            bash scripts/check_param_basis.sh
          rm -f "$PR_BODY_FILE"
