name: Lambda タイムアウト修正

on:
  workflow_dispatch:

jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - name: AWS認証情報を設定
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-northeast-1

      - name: タイムアウトを300秒に延長
        run: |
          aws lambda update-function-configuration \
            --function-name p003-fetcher \
            --timeout 300 \
            --memory-size 512 \
            --region ap-northeast-1
          echo "✅ タイムアウト300秒・メモリ512MBに更新完了"

      - name: Lambda を非同期でテスト実行
        run: |
          aws lambda invoke \
            --function-name p003-fetcher \
            --invocation-type Event \
            --region ap-northeast-1 \
            /tmp/r.json
          echo "✅ 実行開始（非同期なので即返ります）"
          echo "5分後にサイトを確認してください"
          echo "http://p003-news-946554699567.s3-website-ap-northeast-1.amazonaws.com"
