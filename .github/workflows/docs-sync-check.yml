name: Docs Sync Check

on:
  pull_request:
    paths:
      - 'projects/P003-news-timeline/**'
      - 'docs/system-status.md'
      - 'CLAUDE.md'

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check system-status.md is not stale
        run: |
          if [ ! -f docs/system-status.md ]; then
            echo "::warning::docs/system-status.md が存在しません"
            exit 0
          fi
          LAST_MODIFIED=$(git log -1 --format="%ct" -- docs/system-status.md)
          if [ -z "$LAST_MODIFIED" ]; then
            echo "::warning::docs/system-status.md の git log が取れませんでした"
            exit 0
          fi
          NOW=$(date +%s)
          AGE_DAYS=$(( (NOW - LAST_MODIFIED) / 86400 ))
          echo "system-status.md last updated: ${AGE_DAYS} days ago"
          if [ "$AGE_DAYS" -gt 30 ]; then
            echo "::warning::system-status.md が${AGE_DAYS}日間更新されていません。最新状態に更新してください。"
          fi

      - name: Check schedule consistency (deploy.sh ↔ detail.js ↔ handler.py)
        run: |
          DEPLOY_SH="projects/P003-news-timeline/deploy.sh"
          DETAIL_JS="projects/P003-news-timeline/frontend/detail.js"
          HANDLER_PY="projects/P003-news-timeline/lambda/processor/handler.py"

          # processor の cron を deploy.sh から抽出
          DEPLOY_CRON=$(grep -A1 'p003-processor-schedule' "$DEPLOY_SH" 2>/dev/null \
            | grep -oE 'cron\([^)]*\)' | head -1 || echo "")
          # detail.js の hours 配列
          DETAIL_HOURS=$(grep -E 'const\s+hours\s*=' "$DETAIL_JS" 2>/dev/null | head -1 || echo "")
          # handler.py 先頭コメントの cron
          HANDLER_CRON=$(grep -oE 'cron\([^)]*\)' "$HANDLER_PY" 2>/dev/null | head -1 || echo "")

          echo "deploy.sh   processor cron: $DEPLOY_CRON"
          echo "handler.py  cron comment:   $HANDLER_CRON"
          echo "detail.js   hours array:    $DETAIL_HOURS"

          # deploy.sh と handler.py 先頭コメントの cron 文字列が一致するか
          # (handler.py コメントは deploy.sh の cron と完全一致するべき)
          if [ -n "$DEPLOY_CRON" ] && [ -n "$HANDLER_CRON" ]; then
            if [ "$DEPLOY_CRON" != "$HANDLER_CRON" ]; then
              echo "::error::deploy.sh と handler.py 先頭コメントの cron が不一致"
              echo "  deploy.sh:  $DEPLOY_CRON"
              echo "  handler.py: $HANDLER_CRON"
              echo "どちらかを更新して揃えてください。"
              exit 1
            fi
          fi

          # 05:30/17:30 JST (UTC 20:30/08:30) パターンの整合チェック
          if echo "$DEPLOY_CRON" | grep -qE '20,8|30 20'; then
            if ! echo "$DETAIL_HOURS" | grep -qE '5.*30|17.*30'; then
              echo "::error::detail.js の hours 定義が deploy.sh の cron (05:30/17:30) と不一致"
              echo "  deploy.sh: $DEPLOY_CRON"
              echo "  detail.js: $DETAIL_HOURS"
              exit 1
            fi
          fi
          echo "OK: スケジュール整合確認"

      - name: Hint when schedule files changed without docs/system-status.md
        run: |
          BASE_SHA="${{ github.event.pull_request.base.sha }}"
          HEAD_SHA="${{ github.event.pull_request.head.sha }}"
          CHANGED=$(git diff --name-only "$BASE_SHA" "$HEAD_SHA" 2>/dev/null || echo "")
          SCHED_TOUCHED=0
          for f in projects/P003-news-timeline/deploy.sh \
                   projects/P003-news-timeline/frontend/detail.js \
                   projects/P003-news-timeline/lambda/processor/handler.py; do
            if echo "$CHANGED" | grep -qx "$f"; then
              SCHED_TOUCHED=1
            fi
          done
          if [ "$SCHED_TOUCHED" -eq 1 ]; then
            if ! echo "$CHANGED" | grep -qx "docs/system-status.md"; then
              echo "::warning::スケジュール関連ファイルを変更しましたが docs/system-status.md が未更新です。スケジュール変更を伴う場合は同時に更新してください。"
            fi
          fi
