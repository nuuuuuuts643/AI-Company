<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1006" width="1920" height="1006">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="50%" style="stop-color:#1e1b4b"/>
      <stop offset="100%" style="stop-color:#0f172a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#818cf8"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softglow">
      <feGaussianBlur stdDeviation="20" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- 背景 -->
  <rect width="1920" height="1006" fill="url(#bg)"/>

  <!-- 背景の光点 -->
  <circle cx="300" cy="200" r="180" fill="#6366f1" opacity="0.06"/>
  <circle cx="1600" cy="800" r="220" fill="#818cf8" opacity="0.05"/>
  <circle cx="960" cy="503" r="400" fill="#312e81" opacity="0.12"/>

  <!-- タイムライン風の横線（流れのメタファー） -->
  <g opacity="0.15" stroke="#818cf8" stroke-width="1">
    <line x1="0" y1="320" x2="1920" y2="320"/>
    <line x1="0" y1="503" x2="1920" y2="503"/>
    <line x1="0" y1="686" x2="1920" y2="686"/>
  </g>

  <!-- ニュースの流れを表すドット列 -->
  <g fill="#6366f1" opacity="0.4">
    <circle cx="160" cy="320" r="5"/>
    <circle cx="340" cy="320" r="5"/>
    <circle cx="580" cy="320" r="8"/>
    <circle cx="860" cy="320" r="5"/>
    <circle cx="1100" cy="320" r="5"/>
    <circle cx="1380" cy="320" r="6"/>
    <circle cx="1640" cy="320" r="5"/>
    <circle cx="1820" cy="320" r="4"/>
  </g>
  <g fill="#818cf8" opacity="0.35">
    <circle cx="220" cy="686" r="4"/>
    <circle cx="500" cy="686" r="6"/>
    <circle cx="740" cy="686" r="5"/>
    <circle cx="960" cy="686" r="8"/>
    <circle cx="1240" cy="686" r="5"/>
    <circle cx="1520" cy="686" r="5"/>
    <circle cx="1760" cy="686" r="4"/>
  </g>

  <!-- ピーク（急上昇）を表すスパイク -->
  <g stroke="#a5b4fc" stroke-width="2" fill="none" opacity="0.3">
    <polyline points="580,320 580,200 860,320"/>
    <polyline points="960,686 960,540 1240,686"/>
  </g>
  <circle cx="580" cy="200" r="6" fill="#a5b4fc" opacity="0.5" filter="url(#glow)"/>
  <circle cx="960" cy="540" r="6" fill="#a5b4fc" opacity="0.5" filter="url(#glow)"/>

  <!-- メインロゴ -->
  <text x="960" y="460"
    font-family="'Helvetica Neue', Arial, sans-serif"
    font-size="110"
    font-weight="800"
    letter-spacing="-2"
    text-anchor="middle"
    fill="url(#accent)"
    filter="url(#softglow)">Flotopic</text>

  <!-- キャッチコピー -->
  <text x="960" y="560"
    font-family="'Helvetica Neue', Arial, sans-serif"
    font-size="28"
    font-weight="400"
    letter-spacing="6"
    text-anchor="middle"
    fill="#94a3b8">ニュースの「流れ」を、AIで。</text>

  <!-- URL -->
  <text x="960" y="640"
    font-family="'Helvetica Neue', Arial, sans-serif"
    font-size="20"
    font-weight="300"
    letter-spacing="3"
    text-anchor="middle"
    fill="#475569">flotopic.com</text>

  <!-- アクセントライン -->
  <rect x="760" y="590" width="400" height="1.5" fill="url(#accent)" opacity="0.6"/>
</svg>
