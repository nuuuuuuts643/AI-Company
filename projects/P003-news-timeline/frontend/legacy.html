<script>
// ===== アーカイブページ固有のロジック =====
(function () {
  'use strict';

  const GENRES_ALL = ['すべて', '総合', '政治', 'ビジネス', '株・金融', 'テクノロジー', 'スポーツ', 'エンタメ', '科学', '健康', '国際', 'くらし', '社会', 'グルメ', 'ファッション'];
  const GENRE_EMOJI_MAP = {
    '政治': '🏛️', 'ビジネス': '💼', '株・金融': '📈', 'テクノロジー': '💻',
    'スポーツ': '⚽', 'エンタメ': '🎬', '科学': '🔬', '健康': '💊', '国際': '🌏', '総合': '📰',
    'くらし': '🏡', '社会': '🗞️', 'グルメ': '🍽️', 'ファッション': '👗'
  };

  let archiveTopics = [];
  let archiveGenre = 'すべて';

  function daysAgo(dateStr) {
    if (!dateStr) return '不明';
    try {
      const diff = Date.now() - new Date(dateStr).getTime();
      const days = Math.floor(diff / (1000 * 60 * 60 * 24));
      if (days === 0) return '今日';
      if (days === 1) return '1日前';
      return days + '日前';
    } catch (e) { return '不明'; }
  }

  function safeEsc(s) {
    return typeof esc === 'function' ? esc(s) : String(s || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
  }

  function renderArchive(topics) {
    const grid = document.getElementById('archive-grid');
    if (!grid) return;

    let filtered = topics.slice();
    if (archiveGenre !== 'すべて') {
      filtered = filtered.filter(t => (t.genres || [t.genre || '']).includes(archiveGenre));
    }

    if (!filtered.length) {
      grid.innerHTML = [
        '<div class="archive-empty">',
        '  <span class="archive-empty-icon">📦</span>',
        '  まだアーカイブされたトピックはありません。<br>',
        '  活動が落ち着いたトピックが自動的にここに移動します。',
        '</div>'
      ].join('');
      return;
    }

    grid.innerHTML = filtered.map(function (t) {
      const primaryGenre = (t.genres || [t.genre || '総合'])[0];
      const emoji = GENRE_EMOJI_MAP[primaryGenre] || '📰';
      const lastDate = t.lastArticleAt || t.lastUpdated;
      const title = t.generatedTitle || t.title || '(タイトルなし)';
      const tid = t.topicId || '';
      const genreBadges = (t.genres || [t.genre || '総合']).map(function (g) {
        return '<span class="genre-tag">' + safeEsc(g) + '</span>';
      }).join('');
      const thumbHtml = t.imageUrl
        ? '<div class="card-thumb"><img class="card-thumb-img" src="' + safeEsc(t.imageUrl) + '" alt="" loading="lazy" onerror="this.parentNode.innerHTML=\'<div class=\\\'card-thumb-placeholder archived\\\'>' + emoji + '</div>\'"></div>'
        : '<div class="card-thumb"><div class="card-thumb-placeholder archived">' + emoji + '</div></div>';
      return [
        '<a class="topic-card archive-card" href="topic.html?id=' + safeEsc(tid) + '">',
        '  ' + thumbHtml,
        '  <div class="card-body">',
        '    <div class="topic-status archived">📦 アーカイブ</div>',
        '    <h3>' + safeEsc(title) + '</h3>',
        '    <div class="topic-meta">',
        '      ' + genreBadges,
        '      <span>📅 最終更新: ' + daysAgo(lastDate) + '</span>',
        '    </div>',
        '  </div>',
        '</a>'
      ].join('\n');
    }).join('\n');
  }

  function buildArchiveGenreFilter(topics) {
    const gbar = document.getElementById('archive-genre-filter');
    if (!gbar) return;

    // Collect genres that actually appear in archive topics
    const available = new Set(['すべて']);
    topics.forEach(function (t) {
      (t.genres || [t.genre || '総合']).forEach(function (g) { available.add(g); });
    });
    const genreList = GENRES_ALL.filter(function (g) { return available.has(g); });

    gbar.innerHTML = genreList.map(function (g) {
      return '<button class="filter-btn genre-btn' + (archiveGenre === g ? ' active' : '') + '" data-genre="' + safeEsc(g) + '">' + safeEsc(g) + '</button>';
    }).join('');

    gbar.querySelectorAll('.genre-btn').forEach(function (btn) {
      btn.addEventListener('click', function () {
        gbar.querySelectorAll('.genre-btn').forEach(function (b) { b.classList.remove('active'); });
        btn.classList.add('active');
        archiveGenre = btn.dataset.genre;
        renderArchive(archiveTopics);
      });
    });
  }

  async function loadArchive() {
    const grid = document.getElementById('archive-grid');
    try {
      const apiBase = (typeof API_BASE !== 'undefined') ? API_BASE : '';
      const r = await fetch(apiBase + 'topics.json');
      if (!r.ok) throw new Error(`HTTP ${r.status}`);
      const data = await r.json();
      const all = data.topics || [];

      // Filter to only legacy/archived topics
      archiveTopics = all.filter(function (t) {
        return t.lifecycleStatus === 'legacy' || t.lifecycleStatus === 'archived';
      });

      buildArchiveGenreFilter(archiveTopics);
      renderArchive(archiveTopics);
    } catch (e) {
      if (grid) {
        grid.innerHTML = '<div class="archive-empty"><span class="archive-empty-icon">⚠️</span>データの読み込みに失敗しました。</div>';
      }
    }
  }

  document.addEventListener('DOMContentLoaded', function () {
    loadArchive();
  });

})();
</script>
