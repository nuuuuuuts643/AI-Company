<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>トピック詳細 | ニュースタイムライン</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>
</head>
<body>
<header>
  <div class="inner">
    <a href="index.html" class="back-link">← 一覧に戻る</a>
    <h1 id="topic-title" style="font-size:1.1rem;font-weight:700;">読み込み中...</h1>
    <div style="margin-top:6px;">
      <span id="status-badge" class="status-badge" style="display:none;"></span>
      <span id="genre-badge"></span>
    </div>
  </div>
</header>
<main class="container">

  <div class="ad-slot">広告枠</div>

  <div class="card">
    <h2>バズスコア推移</h2>
    <canvas id="score-chart"></canvas>
    <p id="no-data" style="color:#9ca3af;font-size:.85rem;display:none;margin-top:8px;">
      まだデータが蓄積されていません（30分ごとに自動更新）
    </p>
    <p class="score-note">スコア ＝ 報道メディア数×10 ＋ はてなブックマーク数</p>
  </div>

  <div class="card" id="hatena-card" style="display:none;">
    <h2>🔖 はてブ 30分ごとの増加数</h2>
    <canvas id="hatena-chart"></canvas>
    <p class="score-note">日本語記事のみ。増加が大きいほど「今まさにバズっている」サイン。</p>
  </div>

  <div class="card">
    <h2>📖 ストーリーの経緯</h2>
    <p class="story-note">各時点でどのような見出しが報じられたか</p>
    <div id="story-timeline"></div>
  </div>

</main>
<script src="config.js"></script>
<script src="app.js"></script>
</body>
</html>
