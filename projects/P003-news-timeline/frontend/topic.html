<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>トピック詳細 | ニュースタイムライン</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/hammerjs@2.0.8/hammer.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-zoom@2.0.1/dist/chartjs-plugin-zoom.min.js"></script>
</head>
<body>
<header>
  <div class="inner">
    <a href="index.html" class="back-link">← 一覧に戻る</a>
    <h1 id="topic-title" style="font-size:1.1rem;font-weight:700;">読み込み中...</h1>
    <div style="margin-top:6px;">
      <span id="status-badge" class="status-badge" style="display:none;"></span>
      <span id="genre-badge"></span>
    </div>
  </div>
</header>
<main class="container">

  <div class="ad-slot">広告枠</div>

  <div class="card summary-card">
    <h2>🤖 AI要約</h2>
    <p class="summary-placeholder">このトピックのAI要約は準備中です。</p>
  </div>

  <div class="card">
    <h2>📖 ストーリーの経緯</h2>
    <div id="story-timeline"></div>
  </div>

  <div class="card">
    <div class="chart-header">
      <h2>推移グラフ</h2>
      <div class="timerange-btns">
        <button class="tr-btn active" data-range="1d">24h</button>
        <button class="tr-btn" data-range="3d">3日</button>
        <button class="tr-btn" data-range="7d">7日</button>
        <button class="tr-btn" data-range="all">全期間</button>
      </div>
    </div>
    <p id="no-data" style="color:#9ca3af;font-size:.85rem;display:none;margin-top:8px;">データ蓄積中（30分ごとに更新）</p>
    <div class="charts-row">
      <div class="chart-col">
        <div class="chart-col-title">閲覧数増減（昨日比）</div>
        <canvas id="score-chart"></canvas>
      </div>
      <div class="chart-col">
        <div class="chart-col-title">閲覧数累計</div>
        <canvas id="views-chart"></canvas>
      </div>
    </div>
  </div>

</main>
<script src="config.js"></script>
<script src="app.js"></script>
</body>
</html>
