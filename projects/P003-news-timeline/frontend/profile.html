<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self' https: 'unsafe-inline' 'unsafe-eval'">
  <meta http-equiv="X-Content-Type-Options" content="nosniff">
  <meta name="referrer" content="strict-origin-when-cross-origin">
  <meta name="robots" content="noindex">
  <title>プロフィール | Flotopic</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .profile-hero {
      background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
      color: #fff; padding: 32px 20px 24px; text-align: center;
    }
    .profile-avatar {
      width: 72px; height: 72px; border-radius: 50%;
      display: inline-flex; align-items: center; justify-content: center;
      font-size: 2rem; font-weight: 700; background: #3b82f6;
      color: #fff; margin-bottom: 12px; overflow: hidden;
    }
    .profile-avatar img { width: 100%; height: 100%; object-fit: cover; }
    .profile-handle { font-size: 1rem; color: #94a3b8; margin-top: 4px; }
    .profile-stats { display: flex; justify-content: center; gap: 32px; margin-top: 16px; }
    .profile-stat { text-align: center; }
    .profile-stat-num { font-size: 1.4rem; font-weight: 700; }
    .profile-stat-label { font-size: .75rem; color: #94a3b8; }
    .comment-history { max-width: 640px; margin: 24px auto; padding: 0 16px; }
    .hist-card {
      background: var(--card-bg, #fff); border: 1px solid var(--border, #e2e8f0);
      border-radius: 12px; padding: 14px 16px; margin-bottom: 12px;
    }
    .hist-topic {
      font-size: .78rem; color: var(--primary, #3b82f6); margin-bottom: 6px;
      text-decoration: none; display: block; font-weight: 600;
    }
    .hist-topic:hover { text-decoration: underline; }
    .hist-body { font-size: .92rem; color: var(--text-primary, #1a1a1a); margin-bottom: 8px; }
    .hist-meta { font-size: .75rem; color: var(--text-muted, #64748b); display: flex; gap: 12px; }
    .hist-quoted {
      background: var(--bg-secondary, #f8fafc);
      border-left: 3px solid var(--border, #cbd5e1);
      padding: 8px 10px; border-radius: 4px; margin-bottom: 8px;
      font-size: .82rem; color: var(--text-muted, #64748b);
    }
    .hist-quoted-handle { font-weight: 700; color: var(--primary, #3b82f6); }
    .loading-msg { text-align: center; padding: 40px; color: var(--text-muted, #64748b); }
    .back-btn {
      display: inline-flex; align-items: center; gap: 6px;
      color: var(--text-muted, #64748b); text-decoration: none;
      font-size: .85rem; padding: 8px 0;
    }
    .back-btn:hover { color: var(--text-primary, #1a1a1a); }
  </style>
</head>
<body>
<header>
  <div class="inner header-inner">
    <div>
      <h1><a href="index.html" style="color:inherit;text-decoration:none;">Flotopic</a></h1>
      <p>話題の流れをAIで追う</p>
    </div>
    <button id="theme-toggle-btn" class="theme-toggle-btn" title="テーマ切替" aria-label="テーマ切替">🌙</button>
  </div>
</header>

<div class="profile-hero">
  <div id="profile-avatar" class="profile-avatar">?</div>
  <div id="profile-name" style="font-size:1.1rem;font-weight:700;">読み込み中...</div>
  <div id="profile-handle-el" class="profile-handle"></div>
  <div class="profile-stats">
    <div class="profile-stat">
      <div id="profile-count" class="profile-stat-num">—</div>
      <div class="profile-stat-label">コメント</div>
    </div>
    <div class="profile-stat">
      <div id="profile-likes" class="profile-stat-num">—</div>
      <div class="profile-stat-label">獲得いいね</div>
    </div>
  </div>
</div>

<div class="comment-history">
  <a href="javascript:history.back()" class="back-btn">← 戻る</a>
  <div id="history-list">
    <div class="loading-msg"><div class="spinner"></div><br>読み込み中...</div>
  </div>
</div>

<footer class="site-footer">
  <div class="site-footer-links">
    <a href="terms.html">利用規約</a>
    <a href="privacy.html">プライバシーポリシー</a>
  </div>
  <div class="site-footer-copy">© 2024-2026 Flotopic</div>
</footer>

<script src="config.js"></script>
<script src="js/theme.js"></script>
<script>
const esc = s => String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');

function fmtDate(iso) {
  if (!iso) return '';
  try {
    const d = new Date(iso);
    return d.toLocaleString('ja-JP',{month:'numeric',day:'numeric',hour:'2-digit',minute:'2-digit'});
  } catch { return ''; }
}

function initials(name) {
  return (name || '?').charAt(0).toUpperCase();
}

async function loadProfile() {
  const params = new URLSearchParams(location.search);
  const handle = params.get('handle') || '';
  if (!handle || !/^[A-Za-z0-9_]{1,20}$/.test(handle)) {
    document.getElementById('history-list').innerHTML = '<div class="loading-msg">handleが指定されていません</div>';
    return;
  }

  document.title = `@${handle} | Flotopic`;
  document.getElementById('profile-handle-el').textContent = '@' + handle;
  document.getElementById('profile-avatar').textContent = initials(handle);

  if (typeof _APIGW === 'undefined') return;
  try {
    const r = await fetch(`${_APIGW}/user/${encodeURIComponent(handle)}/comments`);
    if (!r.ok) throw new Error('fetch failed');
    const data = await r.json();
    const comments = data.comments || [];

    document.getElementById('profile-name').textContent = handle;
    document.getElementById('profile-count').textContent = data.count ?? comments.length;
    const totalLikes = comments.reduce((s, c) => s + (Number(c.likeCount) || 0), 0);
    document.getElementById('profile-likes').textContent = totalLikes;

    const listEl = document.getElementById('history-list');
    if (!comments.length) {
      listEl.innerHTML = '<div class="loading-msg">まだコメントはありません</div>';
      return;
    }

    listEl.innerHTML = comments.map(c => {
      const topicUrl = `topic.html?id=${esc(c.topicId)}`;
      const quoted = c.quotedHandle ? `
        <div class="hist-quoted">
          <span class="hist-quoted-handle">@${esc(c.quotedHandle)}</span>
          ${esc(c.quotedText || '')}
        </div>` : '';
      const likes = Number(c.likeCount) || 0;
      const dislikes = Number(c.dislikeCount) || 0;
      return `
        <div class="hist-card">
          <a class="hist-topic" href="${topicUrl}">📰 トピックを見る →</a>
          ${quoted}
          <div class="hist-body">${esc(c.body)}</div>
          <div class="hist-meta">
            <span>${fmtDate(c.createdAt)}</span>
            ${likes ? `<span>♡ ${likes}</span>` : ''}
            ${dislikes ? `<span>👎 ${dislikes}</span>` : ''}
          </div>
        </div>`;
    }).join('');
  } catch {
    document.getElementById('history-list').innerHTML =
      '<div class="loading-msg">読み込みに失敗しました</div>';
  }
}

document.addEventListener('DOMContentLoaded', loadProfile);
</script>
</body>
</html>
