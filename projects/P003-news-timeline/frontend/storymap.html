  <style>
    /* ===== Auth ===== */
    .auth-area { display:flex; align-items:center; gap:8px; }
    .auth-user-avatar { width:28px; height:28px; border-radius:50%; object-fit:cover; display:none; }
    .auth-user-name { font-size:.8rem; color:#e2e8f0; max-width:80px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
    .auth-btn { display:inline-flex; align-items:center; gap:6px; padding:5px 12px; border-radius:20px; border:none; cursor:pointer; font-size:.78rem; font-weight:600; transition:opacity .2s; }
    .auth-btn:hover { opacity:.85; }
    #auth-signin-btn { background:#fff; color:#374151; }
    #auth-signout-btn { display:none; background:rgba(255,255,255,.15); color:#fff; }

    /* ===== Breadcrumb ===== */
    .sm-breadcrumb {
      display: flex; align-items: center; gap: 6px;
      font-size: .75rem; color: #94a3b8;
      margin-bottom: 14px; flex-wrap: wrap;
    }
    .sm-breadcrumb a { color: #64748b; text-decoration: none; }
    .sm-breadcrumb a:hover { color: #2563eb; text-decoration: underline; }
    .sm-breadcrumb .sep { color: #cbd5e1; }
    .sm-breadcrumb .current { color: var(--text-primary); font-weight: 600; }

    /* ===== Hero card ===== */
    .sm-hero {
      background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
      border-radius: 14px;
      padding: 20px 22px;
      margin-bottom: 18px;
      color: #fff;
      position: relative;
      overflow: hidden;
    }
    .sm-hero::before {
      content: '🗺';
      position: absolute; right: 18px; top: 14px;
      font-size: 2.8rem; opacity: .08;
    }
    .sm-hero-genre {
      display: inline-block; font-size: .68rem; font-weight: 700;
      background: rgba(255,255,255,.15); color: #cbd5e1;
      border-radius: 999px; padding: 2px 9px; margin-bottom: 8px;
    }
    .sm-hero-title {
      font-size: 1.25rem; font-weight: 800;
      line-height: 1.45; margin-bottom: 8px; color: #fff;
    }
    .sm-hero-summary {
      font-size: .83rem; line-height: 1.65; color: #94a3b8;
      display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
      overflow: hidden; margin-bottom: 12px;
    }
    .sm-hero-meta {
      display: flex; gap: 14px; flex-wrap: wrap;
      font-size: .75rem; color: #64748b;
    }
    .sm-hero-meta span { display: flex; align-items: center; gap: 3px; }
    .sm-status-badge {
      display: inline-block; font-size: .65rem; font-weight: 700;
      border-radius: 999px; padding: 2px 8px;
    }
    .sm-status-badge.active { background: #dcfce7; color: #16a34a; }
    .sm-status-badge.cooling { background: #fef3c7; color: #92400e; }
    .sm-status-badge.archived { background: var(--bg-page); color: #64748b; }

    /* ===== Branches section ===== */
    .sm-section {
      background: var(--bg-card); border-radius: 14px;
      padding: 18px 20px; margin-bottom: 14px;
      box-shadow: 0 1px 4px rgba(0,0,0,.06);
    }
    .sm-section-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 14px;
    }
    .sm-section-title {
      font-size: .9rem; font-weight: 700; color: var(--text-primary);
    }
    .sm-section-count {
      font-size: .75rem; color: #94a3b8;
    }

    /* Branch card grid */
    .sm-branch-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 10px;
    }
    .sm-branch-card {
      background: var(--bg-page); border: 1px solid var(--border);
      border-radius: 10px; padding: 12px 14px;
      text-decoration: none; color: inherit;
      display: block;
      transition: border-color .15s, background .15s, transform .12s;
      position: relative;
    }
    .sm-branch-card:hover {
      border-color: #93c5fd;
      background: #eff6ff;
      transform: translateY(-2px);
    }
    [data-theme="dark"] .sm-branch-card:hover { background: #1e2540; }
    .sm-branch-card-title {
      font-size: .83rem; font-weight: 600;
      color: var(--text-primary); line-height: 1.45;
      display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
      overflow: hidden; margin-bottom: 8px;
    }
    .sm-branch-card-foot {
      display: flex; align-items: center; justify-content: space-between;
      flex-wrap: wrap; gap: 4px;
    }
    .sm-branch-card-count { font-size: .7rem; color: #94a3b8; }
    .sm-branch-card-date  { font-size: .7rem; color: #94a3b8; }

    /* Active line accent */
    .sm-branch-card.is-active { border-left: 3px solid #22c55e; }
    .sm-branch-card.is-cooling { border-left: 3px solid #f59e0b; }
    .sm-branch-card.is-archived { border-left: 3px solid #cbd5e1; }

    /* Show-more button */
    .sm-show-more {
      width: 100%; margin-top: 10px;
      background: var(--bg-page); border: 1px solid var(--border);
      border-radius: 8px; padding: 9px;
      font-size: .8rem; color: var(--text-secondary); font-weight: 600;
      cursor: pointer; transition: background .15s;
      text-align: center;
    }
    .sm-show-more:hover { background: var(--border); }

    /* ===== Tree connector (decorative) ===== */
    .sm-tree-connector {
      display: flex; align-items: center; gap: 8px;
      margin-bottom: 8px;
    }
    .sm-tree-line {
      width: 24px; height: 2px; background: var(--border); flex-shrink: 0;
    }
    .sm-tree-dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: #f43f5e; flex-shrink: 0;
    }
    .sm-tree-label {
      font-size: .72rem; color: #94a3b8;
    }

    /* ===== Related topics strip ===== */
    .sm-related-strip {
      display: flex; align-items: center; gap: 8px;
      overflow-x: auto; padding-bottom: 4px;
      scrollbar-width: none;
    }
    .sm-related-strip::-webkit-scrollbar { display: none; }
    .sm-related-pill {
      display: inline-flex; align-items: center; gap: 5px;
      padding: 5px 12px;
      background: var(--bg-page); border: 1px solid var(--border);
      border-radius: 999px; text-decoration: none;
      color: var(--text-secondary); font-size: .77rem; white-space: nowrap;
      transition: background .15s;
      flex-shrink: 0;
    }
    .sm-related-pill:hover { background: var(--border); }
    .sm-related-pill-count { color: #94a3b8; font-size: .68rem; }

    /* ===== Loading / error ===== */
    .sm-loading { text-align:center; padding:80px 0; color:#9ca3af; }
    .sm-error { text-align:center; padding:60px 0; color:#6b7280; }
    .sm-error h3 { font-size:1.05rem; margin-bottom:8px; }

    /* ===== Back link ===== */
    .sm-back {
      display: inline-flex; align-items: center; gap: 5px;
      font-size: .78rem; color: #94a3b8;
      text-decoration: none; margin-bottom: 10px;
      padding: 5px 10px; border-radius: 8px;
      background: rgba(255,255,255,.08);
      transition: background .15s;
    }
    .sm-back:hover { background: rgba(255,255,255,.16); color: #e2e8f0; }

    /* ===== Entity tag ===== */
    .sm-entity-tag {
      font-size: .62rem; padding: 1px 6px; border-radius: 999px; font-weight: 600;
      background: #eff6ff; color: #2563eb;
    }
    [data-theme="dark"] .sm-entity-tag { background: rgba(37,99,235,.18); color: #93c5fd; }
    [data-theme="dark"] .sm-status-badge.active  { background: rgba(34,197,94,.15);  color: #4ade80; }
    [data-theme="dark"] .sm-status-badge.cooling { background: rgba(245,158,11,.15); color: #fbbf24; }

    /* ===== Responsive ===== */
    @media (max-width: 520px) {
      .sm-branch-grid { grid-template-columns: 1fr 1fr; }
      .sm-hero-title { font-size: 1.08rem; }
    }
    @media (max-width: 360px) {
      .sm-branch-grid { grid-template-columns: 1fr; }
    }
  </style>

<body>
<header>
  <div class="inner" style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;">
    <div style="flex:1;min-width:0;">
      <a href="index.html" class="back-link">← 一覧に戻る</a>
      <h1 style="font-size:1.05rem;font-weight:700;margin-top:3px;">🗺 ストーリーマップ</h1>
    </div>
    <div style="display:flex;align-items:center;gap:8px;">
      <button id="theme-toggle-btn" class="theme-toggle-btn" title="テーマ切替" aria-label="テーマ切替">🌙</button>
      <div class="auth-area">
      <img id="auth-user-avatar" class="auth-user-avatar" src="" alt="">
      <span id="auth-user-name" class="auth-user-name"></span>
      <button id="auth-signin-btn" class="auth-btn">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none">
          <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
          <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
          <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
          <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>

<main class="container">

    <div class="sm-loading">
      <div class="spinner"></div>
      読み込み中...
    </div>
  </div>
</main>

<script src="config.js"></script>
<script>
// ===== Helpers =====
function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function fmtAgo(isoOrTs) {
  try {
    const d = typeof isoOrTs === 'number' ? new Date(isoOrTs*1000) : new Date(isoOrTs);
    if (isNaN(d)) return '';
    const diff = (Date.now() - d.getTime()) / 1000;
    if (diff < 3600)   return `${Math.floor(diff/60)}分前`;
    if (diff < 86400)  return `${Math.floor(diff/3600)}時間前`;
    if (diff < 604800) return `${Math.floor(diff/86400)}日前`;
    const m = d.getMonth()+1, day = d.getDate();
    return `${m}/${day}`;
  } catch { return ''; }
}
function apiUrl(path) {
  return (typeof API_BASE !== 'undefined' ? API_BASE : '') + path + '.json';
}
function cleanSummary(s) {
  if (!s) return '';
  return s.replace(/^#{1,3}\s+.+?\n+/gm,'').replace(/^[-*]\s+/gm,'').replace(/^\d+\.\s+/gm,'').replace(/\n{2,}/g,' ').replace(/\n/g,' ').trim();
}

// ===== Entity detection (mirrors Lambda) =====
const ENTITY_PATTERNS = [
  { re: /アメリカ|米国/, label: 'アメリカ' },
  { re: /中国|中華人民共和国/, label: '中国' },
  { re: /ロシア|ロシア連邦/, label: 'ロシア' },
  { re: /イラン/, label: 'イラン' },
  { re: /イスラエル/, label: 'イスラエル' },
  { re: /ガザ|パレスチナ/, label: 'ガザ' },
  { re: /韓国|大韓民国/, label: '韓国' },
  { re: /北朝鮮|朝鮮民主主義/, label: '北朝鮮' },
  { re: /ウクライナ/, label: 'ウクライナ' },
  { re: /台湾/, label: '台湾' },
  { re: /インド/, label: 'インド' },
  { re: /欧州|EU|ヨーロッパ/, label: 'EU' },
  { re: /G7|G20|国連|UN/, label: '国際機関' },
  { re: /AI|人工知能/, label: 'AI' },
  { re: /半導体/, label: '半導体' },
  { re: /トランプ/, label: 'トランプ' },
  { re: /プーチン/, label: 'プーチン' },
  { re: /習近平/, label: '習近平' },
  { re: /岸田|石破|総理|首相/, label: '日本政府' },
  { re: /選挙|大統領|首脳会談/, label: '政治' },
  { re: /株価|日経|TOPIX/, label: '株価' },
  { re: /円安|円高|為替|ドル/, label: '為替' },
  { re: /石油|原油|エネルギー/, label: 'エネルギー' },
  { re: /大谷|翔平/, label: '大谷翔平' },
  { re: /OpenAI|ChatGPT/, label: 'OpenAI' },
  { re: /Google|Gemini/, label: 'Google' },
  { re: /Anthropic|Claude/, label: 'Anthropic' },
  { re: /Apple|iPhone/, label: 'Apple' },
  { re: /Meta|Facebook|Instagram/, label: 'Meta' },
  { re: /Microsoft|Copilot/, label: 'Microsoft' },
  { re: /Amazon|AWS/, label: 'Amazon' },
  { re: /Nvidia|エヌビディア/, label: 'Nvidia' },
  { re: /Tesla|テスラ|イーロン|マスク/, label: 'Tesla' },
  { re: /関税|貿易|輸出|輸入/, label: '貿易' },
  { re: /経済制裁|制裁/, label: '制裁' },
  { re: /軍事|ミサイル|核/, label: '軍事' },
];

function extractEntities(text) {
  if (!text) return [];
  const found = [];
  for (const { re, label } of ENTITY_PATTERNS) {
    if (re.test(text) && !found.includes(label)) found.push(label);
  }
  return found;
}

// ===== Auth =====
let currentUser = null;
function loadUser() { try { return JSON.parse(localStorage.getItem('flotopic_user')||'null'); } catch { return null; } }
function updateAuthUI() {
  const signInBtn  = document.getElementById('auth-signin-btn');
  const signOutBtn = document.getElementById('auth-signout-btn');
  const userAvatar = document.getElementById('auth-user-avatar');
  const userName   = document.getElementById('auth-user-name');
  if (currentUser) {
    if (signInBtn)  signInBtn.style.display  = 'none';
    if (signOutBtn) signOutBtn.style.display = 'inline-flex';
    if (userAvatar) { userAvatar.src = currentUser.picture||''; userAvatar.style.display = currentUser.picture?'inline-block':'none'; }
    if (userName)   userName.textContent = '';
  } else {
    if (signInBtn)  signInBtn.style.display  = 'inline-flex';
    if (signOutBtn) signOutBtn.style.display = 'none';
    if (userAvatar) userAvatar.style.display = 'none';
    if (userName)   userName.textContent = '';
  }
}
function initAuth() {
  currentUser = loadUser(); updateAuthUI();
  const cid = (typeof GOOGLE_CLIENT_ID !== 'undefined') ? GOOGLE_CLIENT_ID : '';
  if (!cid || !window.google) return;
  google.accounts.id.initialize({ client_id: cid, callback: r => {
    try {
      const p = JSON.parse(atob(r.credential.split('.')[1]));
      currentUser = { userId: p.sub, name: p.name||'', picture: p.picture||'', token: r.credential };
      try { localStorage.setItem('flotopic_user', JSON.stringify(currentUser)); } catch {}
      updateAuthUI();
    } catch {}
  }, auto_select: false });
  const sib = document.getElementById('auth-signin-btn');
  if (sib) sib.addEventListener('click', () => google.accounts.id.prompt());
  const sob = document.getElementById('auth-signout-btn');
  if (sob) sob.addEventListener('click', () => {
    currentUser = null;
    try { localStorage.removeItem('flotopic_user'); } catch {}
    updateAuthUI();
  });
}

// ===== Render =====
const SHOW_INITIAL = 6; // how many branches visible before "もっと見る"

function statusClass(status) {
  if (status === 'active')   return 'is-active';
  if (status === 'cooling')  return 'is-cooling';
  if (status === 'archived') return 'is-archived';
  return '';
}
function statusLabel(status) {
  if (status === 'active')   return '<span class="sm-status-badge active">🟢 更新中</span>';
  if (status === 'cooling')  return '<span class="sm-status-badge cooling">🟡 落ち着き気味</span>';
  if (status === 'archived') return '<span class="sm-status-badge archived">⚪ アーカイブ</span>';
  return '';
}

function renderBranchCard(t, showStatus, idx) {
  const title = t.generatedTitle || t.title || '';
  const count = t.articleCount || 0;
  const ago   = fmtAgo(t.lastArticleAt || t.lastUpdated || 0);
  const startedAt = t.firstArticleAt || t.lastUpdated || 0;
  const startAgo = startedAt ? fmtAgo(startedAt) : '';
  const status = t.lifecycleStatus || '';
  const entities = extractEntities(title).slice(0,2);
  const entityHtml = entities.map(e => `<span class="sm-entity-tag">${esc(e)}</span>`).join(' ');
  const stepLabel = idx === 0 ? '発端' : (status === 'active' ? '継続中' : status === 'cooling' ? '収束' : '');
  const stepHtml = stepLabel ? `<span style="font-size:.6rem;font-weight:700;color:#6366f1;background:rgba(99,102,241,.1);padding:1px 6px;border-radius:999px;margin-right:4px;">${stepLabel}</span>` : '';

  return `
    <a href="topic.html?id=${esc(t.topicId)}" class="sm-branch-card ${statusClass(status)}">
      <div class="sm-branch-card-title">${stepHtml}${esc(title)}</div>
      ${entityHtml ? `<div style="display:flex;gap:4px;flex-wrap:wrap;margin-bottom:6px;">${entityHtml}</div>` : ''}
      <div class="sm-branch-card-foot">
        <span class="sm-branch-card-count">📄 ${count}件</span>
        ${startAgo ? `<span class="sm-branch-card-date">開始 ${esc(startAgo)}</span>` : ''}
        ${ago && ago !== startAgo ? `<span class="sm-branch-card-date">最新 ${esc(ago)}</span>` : ''}
      </div>
      ${showStatus && status ? `<div style="margin-top:6px;">${statusLabel(status)}</div>` : ''}
    </a>`;
}

function renderStorymap(parent, allTopics) {
  const root = document.getElementById('sm-root');
  if (!root) return;

  const allMap = {};
  for (const t of allTopics) allMap[t.topicId] = t;

  // Resolve children — 時系列順（古い→新しい）で話の流れを分かりやすく
  const childRefs = parent.childTopics || [];
  const children  = childRefs
    .map(ref => allMap[ref.topicId] || ref)
    .filter(Boolean)
    .sort((a, b) => {
      const ta = a.firstArticleAt || a.lastUpdated || 0;
      const tb = b.firstArticleAt || b.lastUpdated || 0;
      return (new Date(ta).getTime() || 0) - (new Date(tb).getTime() || 0);
    });

  const parentTitle = parent.generatedTitle || parent.title || '';
  document.title = `${parentTitle} | ストーリーマップ`;

  // ---- Breadcrumb ----
  // Walk up 1 level if there's a grandparent
  let breadcrumbHtml = '';
  if (parent.parentTopicId) {
    const grandParent = allMap[parent.parentTopicId];
    if (grandParent) {
      const gpTitle = grandParent.generatedTitle || grandParent.title || '';
      breadcrumbHtml = `
        <div class="sm-breadcrumb">
          <a href="index.html">🏠 トップ</a>
          <span class="sep">›</span>
          <a href="storymap.html?id=${esc(grandParent.topicId)}">${esc(gpTitle.length > 22 ? gpTitle.slice(0,22)+'…' : gpTitle)}</a>
          <span class="sep">›</span>
          <span class="current">${esc(parentTitle.length > 22 ? parentTitle.slice(0,22)+'…' : parentTitle)}</span>
        </div>`;
    }
  } else {
    breadcrumbHtml = `
      <div class="sm-breadcrumb">
        <a href="index.html">🏠 トップ</a>
        <span class="sep">›</span>
        <span class="current">${esc(parentTitle.length > 28 ? parentTitle.slice(0,28)+'…' : parentTitle)}</span>
      </div>`;
  }

  // ---- Genre badge ----
  const genres = parent.genres || (parent.genre ? [parent.genre] : []);
  const genreBadge = genres.length > 0
    ? `<span class="sm-hero-genre">${esc(genres[0])}</span>`
    : '';

  // ---- Status ----
  const heroStatus = statusLabel(parent.lifecycleStatus || '');

  // ---- Summary (2-line clamp) ----
  const summaryHtml = parent.generatedSummary
    ? `<p class="sm-hero-summary">${esc(cleanSummary(parent.generatedSummary))}</p>`
    : '';

  // ---- Branch cards ----
  let branchHtml = '';
  if (children.length === 0) {
    branchHtml = `<p style="color:#94a3b8;font-size:.85rem;text-align:center;padding:20px 0;">分岐トピックがまだありません。ストーリーが展開されるとここに表示されます。</p>`;
  } else {
    const visible   = children.slice(0, SHOW_INITIAL);
    const hidden    = children.slice(SHOW_INITIAL);
    const cardsHtml = visible.map((t, i) => renderBranchCard(t, true, i)).join('');
    const hiddenHtml = hidden.length > 0
      ? `<div id="sm-hidden-branches" style="display:none;">
           <div class="sm-branch-grid">${hidden.map(t => renderBranchCard(t, true)).join('')}</div>
         </div>
         <button class="sm-show-more" onclick="document.getElementById('sm-hidden-branches').style.display='block';this.style.display='none';">
           ▼ さらに ${hidden.length}件の分岐を見る
         </button>`
      : '';
    branchHtml = `<div class="sm-branch-grid">${cardsHtml}</div>${hiddenHtml}`;
  }

  // ---- Related topics strip ----
  const related = parent.relatedTopics || [];
  let relatedHtml = '';
  if (related.length > 0) {
    const pills = related.map(r => {
      const rt = allMap[r.topicId] || r;
      const rtTitle = rt.generatedTitle || rt.title || '';
      const rtCount = rt.articleCount || 0;
      return `<a href="topic.html?id=${esc(rt.topicId)}" class="sm-related-pill">
        ${esc(rtTitle.length > 18 ? rtTitle.slice(0,18)+'…' : rtTitle)}
        <span class="sm-related-pill-count">${rtCount}件</span>
      </a>`;
    }).join('');
    relatedHtml = `
      <div class="sm-section">
        <div class="sm-section-header">
          <span class="sm-section-title">🌿 関連するトピック</span>
        </div>
        <div class="sm-related-strip">${pills}</div>
      </div>`;
  }

  // ---- Active child count ----
  const activeCount  = children.filter(c => c.lifecycleStatus === 'active').length;
  const totalArticles = children.reduce((s, c) => s + (c.articleCount || 0), 0);

  // ---- Connector decoration ----
  const connectorHtml = children.length > 0 ? `
    <div class="sm-tree-connector">
      <div class="sm-tree-dot"></div>
      <div class="sm-tree-line" style="flex:1;"></div>
      <span class="sm-tree-label">${children.length}本の分岐 · 合計${totalArticles}件の記事</span>
    </div>` : '';

  root.innerHTML = `
    ${breadcrumbHtml}

    <div class="sm-hero">
      <a href="topic.html?id=${esc(parent.topicId)}" class="sm-back">← トピック詳細</a>
      ${genreBadge}
      <h2 class="sm-hero-title">${esc(parentTitle)}</h2>
      ${summaryHtml}
      <div class="sm-hero-meta">
        <span>📰 ${parent.articleCount||0}件の記事</span>
        ${activeCount > 0 ? `<span>🔴 ${activeCount}件 更新中</span>` : ''}
        ${heroStatus}
      </div>
    </div>

    ${connectorHtml}

    <div class="sm-section">
      <div class="sm-section-header">
        <span class="sm-section-title">🌿 ストーリーの分岐</span>
        <span class="sm-section-count">${children.length}件</span>
      </div>
      ${branchHtml}
    </div>

    ${relatedHtml}
  `;
}

function renderError(msg) {
  const root = document.getElementById('sm-root');
  if (!root) return;
  root.innerHTML = `
    <div class="sm-error">
      <h3>⚠️ ${esc(msg)}</h3>
      <p><a href="index.html" style="color:#2563eb;">← トップに戻る</a></p>
    </div>`;
}

// ===== Main =====
document.addEventListener('DOMContentLoaded', async () => {
  if ('serviceWorker' in navigator) navigator.serviceWorker.register('/sw.js').catch(()=>{});
  initAuth();

  const params  = new URLSearchParams(location.search);
  const topicId = params.get('id');
  if (!topicId) { renderError('トピックIDが指定されていません'); return; }

  try {
    const r    = await fetch(apiUrl('topics'));
    if (!r.ok) throw new Error(`HTTP ${r.status}`);
    const data = await r.json();
    const topics = data.topics || [];

    const parent = topics.find(t => t.topicId === topicId);
    if (!parent) { renderError('トピックが見つかりませんでした'); return; }

    // Try enriching from per-topic endpoint
    if (!parent.childTopics || parent.childTopics.length === 0) {
      try {
        const r2 = await fetch(apiUrl(`topic/${topicId}`));
        if (!r2.ok) throw new Error(`HTTP ${r2.status}`);
        const d2 = await r2.json();
        if (d2.meta && d2.meta.childTopics && d2.meta.childTopics.length > 0) {
          parent.childTopics = d2.meta.childTopics;
        }
        if (d2.meta && d2.meta.relatedTopics) parent.relatedTopics = d2.meta.relatedTopics;
      } catch {}
    }

    renderStorymap(parent, topics);
  } catch (e) {
    console.error(e);
    renderError('データの読み込みに失敗しました');
  }
});
</script>
