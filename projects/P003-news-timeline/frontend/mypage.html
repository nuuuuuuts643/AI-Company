<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>マイページ | Flotopic</title>
  <meta name="description" content="お気に入りトピックや閲覧履歴を確認できるマイページです。">
  <link rel="stylesheet" href="style.css">
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <style>
    /* ===== 認証UI (index.htmlと同じ) ===== */
    .auth-area { display: flex; align-items: center; gap: 8px; }
    .auth-user-avatar { width: 32px; height: 32px; border-radius: 50%; object-fit: cover; display: none; vertical-align: middle; }
    .auth-user-name { font-size: .85rem; color: #e2e8f0; max-width: 100px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .auth-btn { display: inline-flex; align-items: center; gap: 6px; padding: 6px 14px; border-radius: 20px; border: none; cursor: pointer; font-size: .82rem; font-weight: 600; transition: opacity .2s; }
    .auth-btn:hover { opacity: .85; }
    #auth-signin-btn { background: #fff; color: #374151; }
    #auth-signout-btn { display: none; background: rgba(255,255,255,.15); color: #fff; }

    /* ===== マイページ固有 ===== */
    .back-link-light {
      color: #64748b;
      text-decoration: none;
      font-size: .85rem;
      display: inline-flex;
      align-items: center;
      gap: 4px;
      margin-bottom: 24px;
      transition: color .15s;
    }
    .back-link-light:hover { color: #0f172a; }

    .mypage-login-prompt {
      text-align: center;
      padding: 80px 20px;
    }
    .mypage-login-icon {
      font-size: 4rem;
      display: block;
      margin-bottom: 20px;
    }
    .mypage-login-title {
      font-size: 1.3rem;
      font-weight: 700;
      color: #0f172a;
      margin-bottom: 10px;
    }
    .mypage-login-desc {
      color: #64748b;
      font-size: .95rem;
      margin-bottom: 28px;
      line-height: 1.6;
    }
    .google-signin-btn {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 12px 28px;
      background: #fff;
      color: #374151;
      border: 1.5px solid #d1d5db;
      border-radius: 8px;
      font-size: .95rem;
      font-weight: 600;
      cursor: pointer;
      box-shadow: 0 1px 4px rgba(0,0,0,.08);
      transition: box-shadow .2s, border-color .2s;
    }
    .google-signin-btn:hover {
      box-shadow: 0 3px 10px rgba(0,0,0,.14);
      border-color: #9ca3af;
    }

    .mypage-profile-card {
      display: flex;
      align-items: center;
      gap: 20px;
      margin-bottom: 24px;
      padding: 24px;
      background: #fff;
      border-radius: 14px;
      box-shadow: 0 1px 6px rgba(0,0,0,.07);
    }
    .mypage-avatar {
      width: 64px;
      height: 64px;
      border-radius: 50%;
      object-fit: cover;
      border: 3px solid #e5e7eb;
      flex-shrink: 0;
    }
    .mypage-avatar-placeholder {
      width: 64px;
      height: 64px;
      border-radius: 50%;
      background: #e5e7eb;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2rem;
      flex-shrink: 0;
    }
    .mypage-display-name {
      font-size: 1.25rem;
      font-weight: 700;
      color: #0f172a;
    }
    .mypage-member-label {
      font-size: .82rem;
      color: #64748b;
      margin-top: 4px;
    }

    .mypage-section {
      background: #fff;
      border-radius: 14px;
      padding: 20px 24px;
      box-shadow: 0 1px 6px rgba(0,0,0,.07);
      margin-bottom: 20px;
    }
    .mypage-section-title {
      font-size: 1rem;
      font-weight: 700;
      color: #374151;
      margin-bottom: 16px;
      padding-bottom: 12px;
      border-bottom: 1px solid #f3f4f6;
    }

    .mypage-topic-row {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 11px 0;
      border-bottom: 1px solid #f3f4f6;
      text-decoration: none;
      color: inherit;
      transition: background .1s;
    }
    .mypage-topic-row:last-child { border-bottom: none; }
    .mypage-topic-row:hover .mypage-topic-title { color: #2563eb; text-decoration: underline; }

    .mypage-topic-icon {
      flex: 0 0 40px;
      height: 40px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.1rem;
    }
    .mypage-topic-icon.fav   { background: linear-gradient(135deg, #fef9c3, #fde68a); }
    .mypage-topic-icon.hist  { background: linear-gradient(135deg, #f0fdf4, #bbf7d0); }

    .mypage-topic-info { flex: 1; min-width: 0; }
    .mypage-topic-title {
      font-size: .9rem;
      font-weight: 600;
      color: #0f172a;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      transition: color .15s;
    }
    .mypage-topic-sub {
      font-size: .75rem;
      color: #9ca3af;
      margin-top: 2px;
    }

    .mypage-empty {
      color: #9ca3af;
      text-align: center;
      padding: 28px 0;
      font-size: .9rem;
    }

    .mypage-danger-section {
      border-left: 3px solid #fca5a5;
    }
    .mypage-danger-text {
      color: #64748b;
      font-size: .88rem;
      line-height: 1.6;
    }
    .mypage-danger-text a {
      color: #2563eb;
      font-weight: 600;
    }
    .mypage-danger-text a:hover { text-decoration: underline; }

    .mypage-placeholder-text {
      color: #9ca3af;
      font-size: .88rem;
      padding: 16px 0;
      font-style: italic;
    }
  </style>
</head>
<body>

<header>
  <div class="inner header-inner">
    <div>
      <a href="index.html" style="text-decoration:none;color:inherit;">
        <h1>📰 Flotopic</h1>
        <p>話題の盛り上がりをAIで追う</p>
      </a>
    </div>
    <div style="display:flex;align-items:center;gap:16px;">
      <div id="weather-widget" class="weather-widget"></div>
      <div class="auth-area">
        <a id="mypage-link" href="mypage.html" style="display:none;color:#e2e8f0;font-size:.85rem;text-decoration:none;white-space:nowrap;">👤 マイページ</a>
        <img id="auth-user-avatar" class="auth-user-avatar" src="" alt="アバター">
        <span id="auth-user-name" class="auth-user-name"></span>
        <button id="auth-signin-btn" class="auth-btn">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
            <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
            <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
            <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
          </svg>
          Googleでログイン
        </button>
        <button id="auth-signout-btn" class="auth-btn">ログアウト</button>
      </div>
    </div>
  </div>
</header>

<main class="container" style="padding-top:24px;padding-bottom:48px;">

  <a href="index.html" class="back-link-light">← トップに戻る</a>

  <div id="mypage-content">
    <div class="loading"><div class="spinner"></div>読み込み中...</div>
  </div>

</main>

<footer style="text-align:center;padding:20px;color:#94a3b8;font-size:.8rem;margin-top:40px;">
  <a href="index.html" style="color:#94a3b8;text-decoration:underline;">トップ</a>
  &nbsp;·&nbsp;
  <a href="legacy.html" style="color:#94a3b8;text-decoration:underline;">アーカイブ</a>
  &nbsp;·&nbsp;
  <a href="privacy.html" style="color:#94a3b8;text-decoration:underline;">プライバシーポリシー</a>
</footer>

<script src="config.js"></script>
<script src="app.js"></script>
<script>
// ===== マイページ固有のロジック =====
(function () {
  'use strict';

  const HISTORY_KEY = 'flotopic_history';
  const FAV_LS_KEY  = 'flotopic_favs';

  function safeEsc(s) {
    return typeof esc === 'function' ? esc(s) : String(s || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
  }

  function fmtViewedAt(ts) {
    if (!ts) return '';
    try {
      const diff = Date.now() - ts;
      const mins = Math.floor(diff / 60000);
      if (mins < 1)  return 'たった今';
      if (mins < 60) return mins + '分前';
      const hours = Math.floor(mins / 60);
      if (hours < 24) return hours + '時間前';
      const days = Math.floor(hours / 24);
      return days + '日前';
    } catch (e) { return ''; }
  }

  function readLocalFavIds() {
    try { return JSON.parse(localStorage.getItem(FAV_LS_KEY) || '[]'); } catch (e) { return []; }
  }

  function readHistory() {
    try { return JSON.parse(localStorage.getItem(HISTORY_KEY) || '[]'); } catch (e) { return []; }
  }

  function renderLoginPrompt() {
    const container = document.getElementById('mypage-content');
    if (!container) return;
    container.innerHTML = [
      '<div class="mypage-login-prompt">',
      '  <span class="mypage-login-icon">👤</span>',
      '  <div class="mypage-login-title">マイページ</div>',
      '  <div class="mypage-login-desc">Googleアカウントでログインすると、<br>お気に入りや閲覧履歴を確認できます。</div>',
      '  <button class="google-signin-btn" id="mypage-signin-btn">',
      '    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">',
      '      <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>',
      '      <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>',
      '      <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>',
      '      <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>',
      '    </svg>',
      '    Googleでログイン',
      '  </button>',
      '</div>'
    ].join('\n');

    const btn = document.getElementById('mypage-signin-btn');
    if (btn) {
      btn.addEventListener('click', function () {
        if (window.google && google.accounts && google.accounts.id) {
          google.accounts.id.prompt();
        }
      });
    }
  }

  async function renderUserContent() {
    const container = document.getElementById('mypage-content');
    if (!container) return;

    // Show loading state
    container.innerHTML = '<div class="loading"><div class="spinner"></div>読み込み中...</div>';

    const favIds  = readLocalFavIds();
    const history = readHistory().slice(0, 10);

    // Fetch topics to resolve favorite titles
    let favTopics = [];
    try {
      const apiBase = (typeof API_BASE !== 'undefined') ? API_BASE : '';
      const r = await fetch(apiBase + 'topics.json');
      const data = await r.json();
      const all = data.topics || [];
      favTopics = all.filter(function (t) { return favIds.includes(t.topicId); });
    } catch (e) {
      // favTopics stays empty; we'll show IDs as fallback
    }

    // Build avatar HTML
    const user = typeof currentUser !== 'undefined' ? currentUser : null;
    const avatarHtml = (user && user.picture)
      ? '<img class="mypage-avatar" src="' + safeEsc(user.picture) + '" alt="アバター">'
      : '<div class="mypage-avatar-placeholder">👤</div>';
    const displayName = user ? safeEsc(user.name || 'ユーザー') : 'ユーザー';

    // Build favorites section
    const favsHtml = favTopics.length
      ? favTopics.map(function (t) {
          const primaryGenre = (t.genres || [t.genre || '総合'])[0];
          return [
            '<a class="mypage-topic-row" href="topic.html?id=' + safeEsc(t.topicId) + '">',
            '  <div class="mypage-topic-icon fav">⭐</div>',
            '  <div class="mypage-topic-info">',
            '    <div class="mypage-topic-title">' + safeEsc(t.generatedTitle || t.title) + '</div>',
            '    <div class="mypage-topic-sub">' + safeEsc(primaryGenre) + '</div>',
            '  </div>',
            '</a>'
          ].join('\n');
        }).join('\n')
      : '<div class="mypage-empty">お気に入りのトピックはまだありません<br><a href="index.html" style="color:#2563eb;font-size:.85rem;">トピック一覧へ →</a></div>';

    // Build history section
    const historyHtml = history.length
      ? history.map(function (h) {
          return [
            '<a class="mypage-topic-row" href="topic.html?id=' + safeEsc(h.topicId) + '">',
            '  <div class="mypage-topic-icon hist">📖</div>',
            '  <div class="mypage-topic-info">',
            '    <div class="mypage-topic-title">' + safeEsc(h.title || h.topicId) + '</div>',
            '    <div class="mypage-topic-sub">' + fmtViewedAt(h.viewedAt) + '</div>',
            '  </div>',
            '</a>'
          ].join('\n');
        }).join('\n')
      : '<div class="mypage-empty">まだ閲覧履歴がありません<br><a href="index.html" style="color:#2563eb;font-size:.85rem;">トピックを見てみる →</a></div>';

    container.innerHTML = [
      // Profile card
      '<div class="mypage-profile-card">',
      '  ' + avatarHtml,
      '  <div>',
      '    <div class="mypage-display-name">' + displayName + '</div>',
      '    <div class="mypage-member-label">Flotopicメンバー</div>',
      '  </div>',
      '</div>',

      // Favorites section
      '<div class="mypage-section">',
      '  <div class="mypage-section-title">⭐ お気に入りトピック</div>',
      '  ' + favsHtml,
      '</div>',

      // History section
      '<div class="mypage-section">',
      '  <div class="mypage-section-title">📖 最近見たトピック</div>',
      '  ' + historyHtml,
      '</div>',

      // Comment history (placeholder)
      '<div class="mypage-section">',
      '  <div class="mypage-section-title">💬 コメント履歴</div>',
      '  <div class="mypage-placeholder-text">準備中</div>',
      '</div>',

      // Account deletion
      '<div class="mypage-section mypage-danger-section">',
      '  <div class="mypage-section-title">🗑️ アカウント削除</div>',
      '  <p class="mypage-danger-text">データ削除は <a href="mailto:mrkm.naoya643@gmail.com">mrkm.naoya643@gmail.com</a> までご連絡ください。</p>',
      '</div>'
    ].join('\n');
  }

  async function renderMyPage() {
    const user = (typeof currentUser !== 'undefined') ? currentUser : null;
    if (!user) {
      renderLoginPrompt();
    } else {
      await renderUserContent();
    }
  }

  document.addEventListener('DOMContentLoaded', function () {
    // Hook into updateAuthUI so mypage re-renders after sign-in/sign-out
    if (typeof updateAuthUI === 'function') {
      var _orig = updateAuthUI;
      updateAuthUI = function () {
        _orig();
        renderMyPage();
      };
    }
    renderMyPage();
  });

})();
</script>

</body>
</html>
