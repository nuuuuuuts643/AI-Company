<script>
// ── 状態管理 ─────────────────────────────────────────────────────────────────
let allTopics     = [];        // APIから取得した全トピック
let selectedDays  = 3;         // 選択中の期間（日数）
let activeLCSet   = new Set(['active', 'cooling']); // 有効なlifecycleStatus
let displayedCount = 0;
const PAGE_SIZE    = 15;

// ── 日付ユーティリティ ────────────────────────────────────────────────────────
function relativeTime(isoStr) {
  if (!isoStr) return '';
  const diff = Date.now() - new Date(isoStr).getTime();
  const m = Math.floor(diff / 60000);
  if (m < 60)  return `${m}分前`;
  const h = Math.floor(m / 60);
  if (h < 24)  return `${h}時間前`;
  return `${Math.floor(h / 24)}日前`;
}

function formatDate(isoStr) {
  if (!isoStr) return '';
  const d = new Date(isoStr);
  return `${d.getFullYear()}年${d.getMonth()+1}月${d.getDate()}日`;
}

function isWithinDays(isoStr, days) {
  if (!isoStr) return false;
  const cutoff = Date.now() - days * 24 * 60 * 60 * 1000;
  return new Date(isoStr).getTime() >= cutoff;
}

// ── トピックデータ取得 ────────────────────────────────────────────────────────
async function fetchTopics() {
  try {
    const url = (typeof API_BASE !== 'undefined' ? API_BASE : 'https://flotopic.com/api/') + 'topics.json';
    const resp = await fetch(url, { cache: 'no-store' });
    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
    const data = await resp.json();
    allTopics = Array.isArray(data) ? data : (data.topics || []);
  } catch (e) {
    console.error('トピック取得エラー:', e);
    allTopics = [];
  }
}

// ── フィルタリング & ソート ───────────────────────────────────────────────────
function getFilteredTopics() {
  const now     = Date.now();
  const cutoff  = now - selectedDays * 24 * 60 * 60 * 1000;

  return allTopics
    .filter(t => {
      // 1件以下 or AI判定で内容が乖離しているトピックは非表示
      if (parseInt(t.articleCount || 0) < 2) return false;
      if (t.topicCoherent === false) return false;
      // lifecycleStatusフィルタ
      const lc = t.lifecycleStatus || 'active';
      if (!activeLCSet.has(lc)) return false;
      // 期間フィルタ: トピック誕生日(firstArticleAt)が選択期間内のものだけ表示
      const born = t.firstArticleAt ? t.firstArticleAt * 1000 : 0;
      return born >= cutoff;
    })
    .sort((a, b) => {
      // velocity降順、同率ならトピック誕生日が新しい順
      const vDiff = parseInt(b.velocityScore || 0) - parseInt(a.velocityScore || 0);
      if (vDiff !== 0) return vDiff;
      const aBorn = a.firstArticleAt || 0;
      const bBorn = b.firstArticleAt || 0;
      return bBorn - aBorn;
    });
}

// ── カード生成 ────────────────────────────────────────────────────────────────
function buildTimelineText(topic) {
  const createdAt = topic.firstArticleAt ? new Date(topic.firstArticleAt * 1000).toISOString() : null;
  const created  = createdAt ? formatDate(createdAt) : null;
  const updated  = topic.lastUpdated ? formatDate(topic.lastUpdated) : null;
  const cnt      = parseInt(topic.articleCount || 0);
  const velocity = parseInt(topic.velocityScore || 0);

  let text = '';
  if (created && created !== updated) {
    text += `${created}〜${updated || '現在'} `;
  } else if (updated) {
    text += `${updated} `;
  }
  if (velocity > 30) text += '🔥 急上昇中 ';
  else if (velocity > 10) text += '📈 注目上昇中 ';
  text += `${cnt}件の記事が集まっています`;
  return text;
}

function buildVelocityBar(velocityScore) {
  const v = Math.min(parseInt(velocityScore || 0), 100);
  if (v > 30) return '<span class="velocity-label hot">🔥 急上昇</span>';
  if (v > 10) return '<span class="velocity-label rising">📈 上昇中</span>';
  return '';
}

function buildCard(topic) {
  const lc      = topic.lifecycleStatus || 'active';
  const title   = topic.generatedTitle || topic.title || '（タイトルなし）';
  const summary = cleanSummary(topic.generatedSummary || topic.extractiveSummary || '');
  const cnt     = parseInt(topic.articleCount || 0);
  const genre   = (topic.genres && topic.genres[0]) || topic.genre || '総合';
  const tid     = topic.topicId || '';
  const updated = topic.lastUpdated || '';
  const created = topic.firstArticleAt ? new Date(topic.firstArticleAt * 1000).toISOString() : '';
  const url     = tid ? `topic.html?id=${tid}` : 'topic.html';
  const velocity = parseInt(topic.velocityScore || 0);

  // バッジ
  const isNew    = isWithinDays(created, 1);
  const isHot    = velocity > 30;
  const lcLabels = { active: 'active', cooling: 'cooling', archived: 'archived' };
  const lcTexts  = { active: '進行中', cooling: '沈静化中', archived: '終息' };

  const PHASE_BADGE = { '発端':'🌱 始まり', '拡散':'📡 広まってる', 'ピーク':'🔥 急上昇', '現在地':'📍 進行中', '収束':'✅ ひと段落' };
  const PHASE_BADGE_COLOR = { '発端':'#f59e0b','拡散':'#3b82f6','ピーク':'#ef4444','現在地':'#4EC9C0','収束':'#64748b' };
  const phaseColor = PHASE_BADGE_COLOR[topic.storyPhase] || '#4EC9C0';
  const phaseBadge = topic.storyPhase && PHASE_BADGE[topic.storyPhase]
    ? `<span class="badge-phase" style="background:${phaseColor};color:#fff">${PHASE_BADGE[topic.storyPhase]}</span>` : '';

  const badges = `
    <div class="badge-row">
      ${isNew ? '<span class="badge-new">NEW</span>' : ''}
      ${isHot && !isNew ? '<span class="badge-hot">🔥 急上昇</span>' : ''}
      <span class="badge-lc ${lcLabels[lc] || 'active'}">${lcTexts[lc] || '進行中'}</span>
      ${phaseBadge}
    </div>`;

  const timelineText = buildTimelineText(topic);

  const imgUrl = (topic.imageUrl || '').replace(/^http:\/\//i, 'https://');
  const thumbHtml = imgUrl
    ? `<div class="catchup-thumb"><img src="${escapeHtml(imgUrl)}" alt="" loading="lazy" onerror="this.parentNode.remove()"></div>`
    : '';
  const cardBody = `
    <div class="${imgUrl ? 'catchup-card-body' : ''}">
      ${badges}
      <h2>${escapeHtml(title)}</h2>
      <div class="catchup-timeline">${escapeHtml(timelineText)}</div>
      <div class="catchup-meta">
        <span class="genre-tag">${escapeHtml(genre)}</span>
        <span>📄 ${cnt}件</span>
        <span>🕐 ${relativeTime(updated)}</span>
        ${buildVelocityBar(velocity)}
      </div>
    </div>`;
  return `
    <a href="${url}" class="catchup-card${imgUrl ? ' has-thumb' : ''}" data-lc="${lc}">
      ${thumbHtml}${cardBody}
    </a>`;
}

function escapeHtml(str) {
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

function cleanSummary(s) {
  if (!s) return '';
  return s.replace(/^#{1,3}\s+.+?\n+/gm,'').replace(/^[-*]\s+/gm,'').replace(/^\d+\.\s+/gm,'').replace(/\n{2,}/g,' ').replace(/\n/g,' ').trim();
}

// ── レンダリング ──────────────────────────────────────────────────────────────
function render(append = false) {
  const filtered = getFilteredTopics();
  const list     = document.getElementById('catchupList');
  const wrap     = document.getElementById('loadMoreWrap');
  const count    = document.getElementById('resultCount');

  count.textContent = `${filtered.length}件のトピック`;

  if (filtered.length === 0) {
    list.innerHTML = `
      <div class="empty-state">
        <div class="icon">🌅</div>
        <p>この期間に注目されたトピックはありません。<br>期間を広げてみてください。</p>
      </div>`;
    wrap.style.display = 'none';
    return;
  }

  if (!append) {
    displayedCount = 0;
    list.innerHTML = '';
  }

  const slice = filtered.slice(displayedCount, displayedCount + PAGE_SIZE);
  slice.forEach(t => {
    list.insertAdjacentHTML('beforeend', buildCard(t));
  });
  displayedCount += slice.length;

  wrap.style.display = displayedCount < filtered.length ? 'block' : 'none';
}

// ── イベント: 期間ボタン ──────────────────────────────────────────────────────
document.getElementById('periodSelector').addEventListener('click', e => {
  const btn = e.target.closest('.period-btn');
  if (!btn) return;
  document.querySelectorAll('.period-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  selectedDays = parseInt(btn.dataset.days);
  render();
});

// ── イベント: lifecycleフィルター ────────────────────────────────────────────
document.querySelectorAll('.lifecycle-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    const lc = btn.dataset.lc;
    if (activeLCSet.has(lc)) {
      activeLCSet.delete(lc);
      btn.classList.remove('active');
    } else {
      activeLCSet.add(lc);
      btn.classList.add('active');
    }
    render();
  });
});

// ── イベント: もっと読み込む ──────────────────────────────────────────────────
document.getElementById('loadMoreBtn').addEventListener('click', () => {
  render(true);
});

// ── 初期化 ───────────────────────────────────────────────────────────────────
(async () => {
  // URLパラメータで期間を初期設定できる: catchup.html?days=7
  const params = new URLSearchParams(location.search);
  if (params.has('days')) {
    const d = parseInt(params.get('days'));
    if ([1,3,7,14,30].includes(d)) {
      selectedDays = d;
      document.querySelectorAll('.period-btn').forEach(b => {
        b.classList.toggle('active', parseInt(b.dataset.days) === d);
      });
    }
  }

  await fetchTopics();
  render();
})();

// 3秒後に広告が読み込まれていなければad-slotを非表示
setTimeout(() => {
  document.querySelectorAll('.ad-slot').forEach(slot => {
    const hasAd = Array.from(slot.querySelectorAll('.admax-ads')).some(el => el.childElementCount > 0);
    if (!hasAd) slot.style.display = 'none';
  });
}, 3000);
