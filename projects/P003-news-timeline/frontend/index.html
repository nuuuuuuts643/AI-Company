  <style>
    /* ===== 認証UI ===== */
    .auth-area {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .auth-user-avatar {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      object-fit: cover;
      display: none;
      vertical-align: middle;
      border: 2px solid rgba(0,0,0,0.08);
    }
    .auth-user-name {
      font-size: .82rem;
      color: #737373;
      max-width: 100px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .auth-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 7px 14px;
      border-radius: 999px;
      border: 1.5px solid rgba(0,0,0,0.09);
      cursor: pointer;
      font-size: .8rem;
      font-weight: 600;
      font-family: inherit;
      transition: all .15s;
    }
    .auth-btn:hover { border-color: #a8a8a8; background: #f5f5f5; }
    #auth-signin-btn {
      background: #fff;
      color: #1a1a1a;
    }
    #auth-signout-btn {
      display: none;
      background: rgba(0,0,0,0.05);
      color: #737373;
      border-color: transparent;
    }
    /* ===== お気に入りボタン ===== */
    .topic-card-wrapper {
      position: relative;
    }
    .fav-btn {
      position: absolute;
      top: 8px;
      right: 8px;
      background: rgba(255,255,255,.85);
      border: none;
      border-radius: 50%;
      width: 32px;
      height: 32px;
      font-size: 16px;
      cursor: pointer;
      color: #cbd5e1;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: color .2s, background .2s;
      z-index: 2;
      line-height: 1;
    }
    .fav-btn:hover { color: #f43f5e; background: #fff; }
    .fav-btn.fav-active { color: #f43f5e; }
    /* ===== お気に入りフィルタートグル ===== */
    .fav-toggle-btn {
      padding: 8px 16px;
      border-radius: 20px;
      border: 1px solid #cbd5e1;
      background: #fff;
      color: #475569;
      cursor: pointer;
      font-size: .85rem;
      font-weight: 600;
      transition: background .2s, color .2s, border-color .2s;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .fav-toggle-btn.active {
      background: #3b82f6;
      color: #fff;
      border-color: #3b82f6;
    }
    .fav-toggle-btn:hover:not(.active) {
      background: #f8fafc;
    }
    /* ===== もっと見るボタン ===== */
    .load-more-container {
      text-align: center;
      margin: 24px 0 8px;
    }
    .load-more-btn {
      padding: 12px 36px;
      border-radius: 24px;
      border: 1px solid #cbd5e1;
      background: #fff;
      color: #475569;
      cursor: pointer;
      font-size: .9rem;
      font-weight: 600;
      transition: background .2s, box-shadow .2s;
    }
    .load-more-btn:hover {
      background: #f8fafc;
      box-shadow: 0 2px 8px rgba(0,0,0,.12);
    }
    /* ===== コメントログインプロンプト ===== */
    .comment-login-prompt {
      display: none;
      padding: 20px;
      text-align: center;
      color: #64748b;
      border: 1px dashed #cbd5e1;
      border-radius: 8px;
      margin-bottom: 16px;
    }
    .comment-login-prompt p { margin: 0 0 12px; }
    .comment-login-google-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 10px 20px;
      background: #fff;
      border: 1px solid #d1d5db;
      border-radius: 4px;
      cursor: pointer;
      font-size: .9rem;
      font-weight: 600;
      color: #374151;
      transition: box-shadow .2s;
    }
    .comment-login-google-btn:hover { box-shadow: 0 2px 8px rgba(0,0,0,.15); }
    /* ===== PWAインストールバナー ===== */
    #pwa-install-banner {
      display: none;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      background: #1e293b;
      color: #fff;
      padding: 10px 16px;
      font-size: .88rem;
      flex-wrap: wrap;
    }
    #pwa-install-banner .pwa-banner-text {
      flex: 1;
      min-width: 0;
    }
    #pwa-install-banner .pwa-banner-actions {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-shrink: 0;
    }
    #pwa-install-btn {
      background: #3b82f6;
      color: #fff;
      border: none;
      border-radius: 16px;
      padding: 6px 16px;
      font-size: .85rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity .2s;
    }
    #pwa-install-btn:hover { opacity: .85; }
    #pwa-dismiss-btn {
      background: transparent;
      color: #94a3b8;
      border: none;
      font-size: 1.1rem;
      cursor: pointer;
      line-height: 1;
      padding: 2px 6px;
      border-radius: 4px;
      transition: color .2s;
    }
    #pwa-dismiss-btn:hover { color: #fff; }
  </style>
</head>
