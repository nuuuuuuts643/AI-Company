<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Flotopic 管理ダッシュボード</title>
<meta name="robots" content="noindex,nofollow">
<!-- Google Identity Services -->
<script src="https://accounts.google.com/gsi/client" async defer></script>
<style>
/* ─── RESET ─────────────────────────────────────────────────────────── */
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0d1117;color:#e6edf3;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;min-height:100vh}

/* ─── AUTH ──────────────────────────────────────────────────────────── */
#auth-screen{position:fixed;inset:0;background:#0d1117;display:flex;align-items:center;justify-content:center;z-index:999}
.auth-box{background:#161b22;border:1px solid #30363d;border-radius:12px;padding:40px;width:340px;text-align:center}
.auth-box h2{margin-bottom:8px;font-size:1.2rem}
.auth-sub{font-size:.8rem;color:#8b949e;margin-bottom:28px}
.auth-error{color:#f85149;font-size:.85rem;margin-top:12px;min-height:20px}
#gsi-button-wrap{display:flex;justify-content:center}

/* ─── LAYOUT ────────────────────────────────────────────────────────── */
header{background:#161b22;border-bottom:1px solid #30363d;padding:14px 24px;display:flex;align-items:center;justify-content:space-between}
header h1{font-size:1.1rem;font-weight:700}
header h1 span{color:#58a6ff}
.header-right{display:flex;align-items:center;gap:12px}
#user-badge{font-size:.78rem;color:#8b949e;background:#21262d;padding:4px 10px;border-radius:12px}
#last-fetch{font-size:.78rem;color:#8b949e}
main{max-width:1300px;margin:0 auto;padding:24px 20px}

/* ─── SUMMARY CARDS ─────────────────────────────────────────────────── */
.cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:16px;margin-bottom:28px}
.card{background:#161b22;border:1px solid #30363d;border-radius:10px;padding:20px;position:relative;overflow:hidden}
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px}
.card.blue::before{background:linear-gradient(90deg,#58a6ff,#1f6feb)}
.card.green::before{background:linear-gradient(90deg,#3fb950,#238636)}
.card.orange::before{background:linear-gradient(90deg,#f78166,#da3633)}
.card.purple::before{background:linear-gradient(90deg,#bc8cff,#8957e5)}
.card.yellow::before{background:linear-gradient(90deg,#e3b341,#9e6a03)}
.card.teal::before{background:linear-gradient(90deg,#39d3aa,#0d9488)}
.card.red::before{background:linear-gradient(90deg,#f85149,#b91c1c)}
.card-label{font-size:.75rem;color:#8b949e;margin-bottom:8px;text-transform:uppercase;letter-spacing:.05em}
.card-value{font-size:2rem;font-weight:700;line-height:1}
.card-sub{font-size:.78rem;color:#8b949e;margin-top:6px}

/* ─── SECTIONS ──────────────────────────────────────────────────────── */
section{margin-bottom:28px}
section h2{font-size:.9rem;font-weight:600;color:#8b949e;text-transform:uppercase;letter-spacing:.08em;margin-bottom:14px;padding-bottom:8px;border-bottom:1px solid #30363d}
.panel{background:#161b22;border:1px solid #30363d;border-radius:10px;padding:20px}

/* ─── GRID ──────────────────────────────────────────────────────────── */
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:20px}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:20px}
@media(max-width:900px){.grid3{grid-template-columns:1fr 1fr}}
@media(max-width:600px){.grid2,.grid3{grid-template-columns:1fr}}

/* ─── BAR CHART ─────────────────────────────────────────────────────── */
.bar-list{display:flex;flex-direction:column;gap:10px}
.bar-row{display:flex;align-items:center;gap:10px}
.bar-label{width:100px;font-size:.82rem;flex-shrink:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.bar-track{flex:1;background:#21262d;border-radius:4px;height:18px;overflow:hidden}
.bar-fill{height:100%;border-radius:4px;transition:width .5s ease}
.bar-val{width:50px;text-align:right;font-size:.8rem;color:#8b949e;flex-shrink:0}

/* ─── PROGRESS ──────────────────────────────────────────────────────── */
.progress-header{display:flex;justify-content:space-between;font-size:.82rem;color:#8b949e;margin-bottom:6px}
.progress-track{background:#21262d;border-radius:8px;height:24px;overflow:hidden;margin-bottom:6px}
.progress-fill{height:100%;border-radius:8px;transition:width .5s ease;display:flex;align-items:center;justify-content:flex-end;padding-right:8px;font-size:.75rem;font-weight:700;color:#fff}
.progress-footer{display:flex;justify-content:space-between;font-size:.78rem;color:#8b949e}

/* ─── TABLE ─────────────────────────────────────────────────────────── */
.data-table{width:100%;border-collapse:collapse;font-size:.83rem}
.data-table th{text-align:left;padding:8px 10px;color:#8b949e;font-weight:500;border-bottom:1px solid #30363d;white-space:nowrap}
.data-table td{padding:8px 10px;border-bottom:1px solid #21262d;vertical-align:middle}
.data-table tr:hover td{background:#0d1117}
.td-link{color:#58a6ff;text-decoration:none;display:block;max-width:280px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.td-link:hover{text-decoration:underline}
.td-num{text-align:right}
.td-center{text-align:center}

/* ─── BADGES ────────────────────────────────────────────────────────── */
.badge{display:inline-block;padding:2px 7px;border-radius:10px;font-size:.72rem;font-weight:600}
.badge-active{background:#1a3626;color:#3fb950}
.badge-cooling{background:#2d2a1e;color:#e3b341}
.badge-archived{background:#21262d;color:#8b949e}
.badge-legacy{background:#1e1e2e;color:#bc8cff}
.tag{display:inline-block;padding:2px 6px;border-radius:6px;font-size:.7rem;background:#21262d;color:#8b949e}

/* ─── FILL COLORS ───────────────────────────────────────────────────── */
.fill-blue{background:linear-gradient(90deg,#58a6ff,#1f6feb)}
.fill-green{background:linear-gradient(90deg,#3fb950,#238636)}
.fill-orange{background:linear-gradient(90deg,#f78166,#da3633)}
.fill-purple{background:linear-gradient(90deg,#bc8cff,#8957e5)}
.fill-teal{background:linear-gradient(90deg,#39d3aa,#0d9488)}
.fill-yellow{background:linear-gradient(90deg,#e3b341,#9e6a03)}
.fill-gray{background:#30363d}

/* ─── MISC ──────────────────────────────────────────────────────────── */
.ok{color:#3fb950}.muted{color:#8b949e}
#loading{text-align:center;padding:60px;color:#8b949e}
#dashboard{display:none}
.btn{background:#21262d;border:1px solid #30363d;color:#e6edf3;padding:6px 14px;border-radius:6px;font-size:.8rem;cursor:pointer}
.btn:hover{background:#30363d}
.no-data{color:#8b949e;font-size:.85rem;text-align:center;padding:20px}
</style>
</head>
<body>

<!-- Google認証画面 -->
<div id="auth-screen">
  <div class="auth-box">
    <h2>🔐 Flotopic Admin</h2>
    <p class="auth-sub">管理者の Google アカウントでログインしてください</p>
    <div id="gsi-button-wrap"></div>
    <div class="auth-error" id="auth-error"></div>
  </div>
</div>

<!-- ヘッダー -->
<header>
  <h1><span>Flotopic</span> 管理ダッシュボード</h1>
  <div class="header-right">
    <span id="user-badge"></span>
    <span id="last-fetch"></span>
    <button class="btn" onclick="Dashboard.load()">↺ 更新</button>
    <button class="btn" onclick="Auth.logout()">ログアウト</button>
  </div>
</header>

<main>
  <div id="loading">データを読み込み中...</div>
  <div id="dashboard">

    <!-- サマリーカード（動的生成） -->
    <div class="cards" id="summary-cards"></div>

    <!-- アクセス数（analytics） -->
    <section>
      <h2>アクセス数 — 直近24時間</h2>
      <div class="grid2">
        <div class="panel">
          <div class="bar-list" id="chart-trending-topics">
            <div class="no-data" id="analytics-loading">アクセスデータ読み込み中...</div>
          </div>
        </div>
        <div class="panel">
          <div class="bar-list" id="chart-activity-24h">
            <div class="no-data">24h アクティビティ</div>
          </div>
        </div>
      </div>
    </section>

    <!-- チャート行 -->
    <div class="grid3" style="margin-bottom:28px">
      <section>
        <h2>ライフサイクル</h2>
        <div class="panel"><div class="bar-list" id="chart-lifecycle"></div></div>
      </section>
      <section>
        <h2>AI要約 進捗</h2>
        <div class="panel" id="chart-ai"></div>
      </section>
      <section>
        <h2>ジャンル別トピック数</h2>
        <div class="panel"><div class="bar-list" id="chart-genre"></div></div>
      </section>
    </div>

    <!-- 上位トピック -->
    <section>
      <h2>上位トピック — スコア順 TOP<span id="top-n"></span></h2>
      <div class="panel" style="overflow-x:auto">
        <table class="data-table">
          <thead><tr>
            <th>#</th><th>タイトル</th><th>ジャンル</th><th>状態</th>
            <th class="td-num">記事数</th><th class="td-num">スコア</th>
            <th class="td-num">Velocity</th><th class="td-center">AI</th>
            <th class="td-num">はてブ</th><th class="td-num">24h PV</th>
          </tr></thead>
          <tbody id="table-top-topics"></tbody>
        </table>
      </div>
    </section>

    <!-- 最近更新 -->
    <section>
      <h2>最近更新されたトピック TOP<span id="recent-n"></span></h2>
      <div class="panel" style="overflow-x:auto">
        <table class="data-table">
          <thead><tr>
            <th>#</th><th>タイトル</th><th>ジャンル</th><th>状態</th>
            <th class="td-num">記事数</th><th>最終更新</th><th>フェーズ</th>
          </tr></thead>
          <tbody id="table-recent-topics"></tbody>
        </table>
      </div>
    </section>

  </div><!-- /#dashboard -->
</main>

<script>
// ═══════════════════════════════════════════════════════════════════════
// CONFIG — ここだけ変更すれば設定完了
// ═══════════════════════════════════════════════════════════════════════
const CONFIG = {
  allowedEmail:  'owner643@gmail.com',   // 管理者 Google アカウント
  googleClientId:'632899056251-hmk2ap6tv98miqj8n96lig3vj7uoa057.apps.googleusercontent.com',
  apiBase:       'https://flotopic.com/api/',
  analyticsUrl:  'https://2svmxx7aou6w5ekdruw5maqnfu0aplju.lambda-url.ap-northeast-1.on.aws/',
  topTopicsN:    20,
  recentTopicsN: 10,
};

// ═══════════════════════════════════════════════════════════════════════
// UTILS
// ═══════════════════════════════════════════════════════════════════════
const U = {
  esc(s)  { return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); },
  setText(id, val) { const el = document.getElementById(id); if (el) el.textContent = val; },
  relTime(iso) {
    if (!iso) return '—';
    const s = (Date.now() - new Date(iso).getTime()) / 1000;
    if (s < 60)    return '今';
    if (s < 3600)  return `${Math.floor(s/60)}分前`;
    if (s < 86400) return `${Math.floor(s/3600)}時間前`;
    return `${Math.floor(s/86400)}日前`;
  },
  int(v)     { return parseInt(v) || 0; },
  pct(a, b)  { return b > 0 ? (a / b * 100).toFixed(1) : '0.0'; },
};

// ═══════════════════════════════════════════════════════════════════════
// UI — 再利用コンポーネント
// ═══════════════════════════════════════════════════════════════════════
const UI = {
  barRow(label, val, maxVal, fillClass, displayVal) {
    const w = maxVal > 0 ? U.pct(val, maxVal) : 0;
    return `<div class="bar-row">
      <div class="bar-label" title="${U.esc(label)}">${U.esc(label)}</div>
      <div class="bar-track"><div class="bar-fill ${fillClass}" style="width:${w}%"></div></div>
      <div class="bar-val">${displayVal ?? val.toLocaleString()}</div>
    </div>`;
  },
  progressBar(done, total, fillClass) {
    const p = U.pct(done, total);
    return `<div class="progress-header"><span>生成済み</span><span>${p}%</span></div>
      <div class="progress-track">
        <div class="progress-fill ${fillClass}" style="width:${p}%">${parseFloat(p)>8?p+'%':''}</div>
      </div>
      <div class="progress-footer"><span>済: ${done.toLocaleString()}件</span><span>未: ${(total-done).toLocaleString()}件</span></div>`;
  },
  lifecycle(s) {
    const m = { active:['badge-active','active'], cooling:['badge-cooling','cooling'],
                archived:['badge-archived','archived'], legacy:['badge-legacy','legacy'] };
    const [cls, lbl] = m[s] ?? ['badge-archived', s || '—'];
    return `<span class="badge ${cls}">${lbl}</span>`;
  },
  card(colorCls, label, value, sub='') {
    return `<div class="card ${colorCls}">
      <div class="card-label">${label}</div>
      <div class="card-value">${value}</div>
      ${sub ? `<div class="card-sub">${sub}</div>` : ''}
    </div>`;
  },
};

// ═══════════════════════════════════════════════════════════════════════
// METRICS — データ計算（描画から分離）
// ═══════════════════════════════════════════════════════════════════════
function computeMetrics(topics) {
  const total         = topics.length;
  const totalArticles = topics.reduce((s,t) => s + U.int(t.articleCount), 0);
  const aiDone        = topics.filter(t => t.generatedSummary || t.generatedTitle).length;
  const totalHatena   = topics.reduce((s,t) => s + U.int(t.hatenaCount), 0);
  const maxHatena     = Math.max(...topics.map(t => U.int(t.hatenaCount)), 0);

  // 更新頻度（今日・24時間以内）
  const now24h = Date.now() - 86400 * 1000;
  const updatedToday = topics.filter(t => t.lastUpdated && new Date(t.lastUpdated).getTime() > now24h).length;

  // ライフサイクル
  const lifecycle = {};
  topics.forEach(t => { const s = t.lifecycleStatus||'active'; lifecycle[s]=(lifecycle[s]||0)+1; });

  // ジャンル
  const genre = {};
  topics.forEach(t => { const g = t.genre||'総合'; genre[g]=(genre[g]||0)+1; });

  return { total, totalArticles, aiDone, totalHatena, maxHatena, updatedToday, lifecycle, genre,
           avgArticles: total > 0 ? (totalArticles/total).toFixed(1) : '0' };
}

// ═══════════════════════════════════════════════════════════════════════
// SECTIONS
// ═══════════════════════════════════════════════════════════════════════

function renderSummaryCards(m, analyticsData) {
  const pv24h  = analyticsData ? analyticsData.trending.reduce((s,t)=>s+(t.views||0),0) : null;
  const fav24h = analyticsData ? analyticsData.trending.reduce((s,t)=>s+(t.favorites||0),0) : null;
  const cards = [
    UI.card('blue',   '総トピック数',       m.total.toLocaleString(),
            `24h更新: ${m.updatedToday}`),
    UI.card('green',  '総記事数',           m.totalArticles.toLocaleString(),
            `平均 ${m.avgArticles}件/トピック`),
    UI.card('purple', 'AI要約済み',         m.aiDone.toLocaleString(),
            `${U.pct(m.aiDone, m.total)}% 完了`),
    UI.card('teal',   '24h PV',
            pv24h !== null ? pv24h.toLocaleString() : '—',
            pv24h !== null ? `お気に入り ${fav24h}件` : 'データ収集中...'),
    UI.card('yellow', 'はてブ総数',         m.totalHatena.toLocaleString(),
            `最高 ${m.maxHatena} ブクマ`),
    UI.card('orange', 'Active トピック',   (m.lifecycle.active||0).toLocaleString(),
            `cooling: ${m.lifecycle.cooling||0}`),
  ];
  document.getElementById('summary-cards').innerHTML = cards.join('');
}

function renderAnalytics(analyticsData, topics) {
  const topicMap = {};
  topics.forEach(t => { topicMap[t.topicId] = t; });

  if (!analyticsData || !analyticsData.trending?.length) {
    document.getElementById('chart-trending-topics').innerHTML =
      '<div class="no-data">まだアクセスデータがありません。<br>ユーザーがトピックを閲覧すると表示されます。</div>';
    document.getElementById('chart-activity-24h').innerHTML =
      '<div class="no-data">データ収集中...</div>';
    return;
  }

  // トップ10閲覧トピック
  const top10 = analyticsData.trending.slice(0, 10);
  const maxV  = Math.max(...top10.map(t => t.views||0), 1);
  document.getElementById('chart-trending-topics').innerHTML =
    top10.map(t => {
      const topic = topicMap[t.topicId];
      const label = topic ? (topic.generatedTitle || topic.title || t.topicId).slice(0, 22) : t.topicId.slice(0, 16);
      return UI.barRow(label, t.views||0, maxV, 'fill-blue', `${t.views||0} PV`);
    }).join('');

  // 新規 vs リピーター
  const totalViews   = analyticsData.trending.reduce((s,t)=>s+(t.views||0),0);
  const totalNew     = analyticsData.trending.reduce((s,t)=>s+(t.new_viewers||0),0);
  const totalReturn  = totalViews - totalNew;
  const totalFavs    = analyticsData.trending.reduce((s,t)=>s+(t.favorites||0),0);
  const maxAct       = Math.max(totalNew, totalReturn, totalFavs, 1);
  document.getElementById('chart-activity-24h').innerHTML = [
    UI.barRow('新規訪問',     totalNew,    maxAct, 'fill-green'),
    UI.barRow('リピーター',   totalReturn, maxAct, 'fill-blue'),
    UI.barRow('お気に入り',   totalFavs,   maxAct, 'fill-yellow'),
  ].join('');
}

function renderCharts(m) {
  // ライフサイクル
  const lOrder  = ['active','cooling','archived','legacy'];
  const lColors = ['fill-green','fill-teal','fill-gray','fill-purple'];
  const lMax    = Math.max(...Object.values(m.lifecycle), 1);
  document.getElementById('chart-lifecycle').innerHTML =
    lOrder.map((s,i) => UI.barRow(s, m.lifecycle[s]||0, lMax, lColors[i])).join('');

  // AI進捗
  document.getElementById('chart-ai').innerHTML =
    UI.progressBar(m.aiDone, m.total, 'fill-green');

  // ジャンル
  const gList = Object.entries(m.genre).sort((a,b)=>b[1]-a[1]);
  const gMax  = Math.max(...gList.map(g=>g[1]), 1);
  document.getElementById('chart-genre').innerHTML =
    gList.map(([n,c]) => UI.barRow(n, c, gMax, 'fill-purple')).join('');
}

function renderTopTopics(topics, analyticsMap) {
  U.setText('top-n', CONFIG.topTopicsN);
  const rows = [...topics]
    .sort((a,b) => U.int(b.score) - U.int(a.score))
    .slice(0, CONFIG.topTopicsN)
    .map((t, i) => {
      const pv = analyticsMap[t.topicId]?.views;
      return `<tr>
        <td class="muted">${i+1}</td>
        <td><a class="td-link" href="/topic.html?id=${U.esc(t.topicId)}" target="_blank">
          ${U.esc(t.generatedTitle||t.title||'—')}
        </a></td>
        <td><span class="tag">${U.esc(t.genre||'総合')}</span></td>
        <td>${UI.lifecycle(t.lifecycleStatus)}</td>
        <td class="td-num">${U.int(t.articleCount)}</td>
        <td class="td-num" style="font-weight:600;color:#e3b341">${U.int(t.score)}</td>
        <td class="td-num" style="color:#58a6ff">${U.int(t.velocityScore)}</td>
        <td class="td-center">${t.generatedSummary ? '<span class="ok">✓</span>' : '<span class="muted">·</span>'}</td>
        <td class="td-num muted">${U.int(t.hatenaCount)||'—'}</td>
        <td class="td-num" style="color:#39d3aa">${pv != null ? pv : '—'}</td>
      </tr>`;
    });
  document.getElementById('table-top-topics').innerHTML = rows.join('');
}

function renderRecentTopics(topics) {
  U.setText('recent-n', CONFIG.recentTopicsN);
  const rows = [...topics]
    .filter(t => t.lastUpdated)
    .sort((a,b) => new Date(b.lastUpdated) - new Date(a.lastUpdated))
    .slice(0, CONFIG.recentTopicsN)
    .map((t, i) => `<tr>
      <td class="muted">${i+1}</td>
      <td><a class="td-link" href="/topic.html?id=${U.esc(t.topicId)}" target="_blank">
        ${U.esc(t.generatedTitle||t.title||'—')}
      </a></td>
      <td><span class="tag">${U.esc(t.genre||'総合')}</span></td>
      <td>${UI.lifecycle(t.lifecycleStatus)}</td>
      <td class="td-num">${U.int(t.articleCount)}</td>
      <td class="muted" style="white-space:nowrap">${U.relTime(t.lastUpdated)}</td>
      <td class="muted">${U.esc(t.storyPhase||'—')}</td>
    </tr>`);
  document.getElementById('table-recent-topics').innerHTML = rows.join('');
}

// ─── セクション登録（新セクション追加はここに関数を追記） ─────────────────
const SECTIONS = [
  (m, t, am, ad) => renderSummaryCards(m, ad),
  (m, t, am, ad) => renderAnalytics(ad, t),
  (m)            => renderCharts(m),
  (m, t, am)     => renderTopTopics(t, am),
  (m, t)         => renderRecentTopics(t),
];

// ═══════════════════════════════════════════════════════════════════════
// DASHBOARD — データ取得 + 描画
// ═══════════════════════════════════════════════════════════════════════
const Dashboard = {
  async load() {
    document.getElementById('loading').style.display = 'block';
    document.getElementById('dashboard').style.display = 'none';
    try {
      const [topicsRes, analyticsRes] = await Promise.allSettled([
        fetch(CONFIG.apiBase + 'topics.json?_=' + Date.now()),
        fetch(CONFIG.analyticsUrl + 'analytics/trending'),
      ]);

      if (topicsRes.status === 'rejected') throw new Error('topics.json 取得失敗');
      const raw    = await topicsRes.value.json();
      const topics = Array.isArray(raw) ? raw : (raw.topics || []);

      let analyticsData = null;
      if (analyticsRes.status === 'fulfilled' && analyticsRes.value.ok) {
        try { analyticsData = await analyticsRes.value.json(); } catch(e) {}
      }

      const m          = computeMetrics(topics);
      const analyticsMap = {};
      if (analyticsData?.trending) {
        analyticsData.trending.forEach(t => { analyticsMap[t.topicId] = t; });
      }

      SECTIONS.forEach(fn => fn(m, topics, analyticsMap, analyticsData));
      U.setText('last-fetch', '更新: ' + new Date().toLocaleTimeString('ja-JP'));
      document.getElementById('loading').style.display = 'none';
      document.getElementById('dashboard').style.display = 'block';
    } catch(e) {
      document.getElementById('loading').textContent = 'データ取得失敗: ' + e.message;
    }
  },
};

// ═══════════════════════════════════════════════════════════════════════
// AUTH — Google Sign-In（許可メール: CONFIG.allowedEmail のみ）
// ═══════════════════════════════════════════════════════════════════════
const Auth = {
  /** Google ID トークンのペイロードを base64 デコード（検証なし・表示用のみ） */
  parseJwt(token) {
    try {
      const b64 = token.split('.')[1].replace(/-/g,'+').replace(/_/g,'/');
      return JSON.parse(atob(b64));
    } catch { return null; }
  },

  /** Google から credential が返ってきたときのコールバック */
  onCredential(response) {
    const payload = Auth.parseJwt(response.credential);
    if (!payload) {
      document.getElementById('auth-error').textContent = '認証データの解析に失敗しました';
      return;
    }
    if (payload.email !== CONFIG.allowedEmail) {
      document.getElementById('auth-error').textContent =
        `このアカウント (${payload.email}) はアクセスできません`;
      return;
    }
    // 認証成功
    sessionStorage.setItem('admin_token', response.credential);
    sessionStorage.setItem('admin_email', payload.email);
    document.getElementById('auth-screen').style.display = 'none';
    document.getElementById('user-badge').textContent = payload.email;
    Dashboard.load();
  },

  logout() {
    sessionStorage.removeItem('admin_token');
    sessionStorage.removeItem('admin_email');
    location.reload();
  },

  /** GSI ライブラリが読み込まれたら呼ぶ */
  initGSI() {
    if (!window.google?.accounts?.id) return;
    google.accounts.id.initialize({
      client_id: CONFIG.googleClientId,
      callback:  Auth.onCredential,
      auto_select: false,
    });
    google.accounts.id.renderButton(
      document.getElementById('gsi-button-wrap'),
      { theme: 'outline', size: 'large', locale: 'ja' }
    );
  },

  init() {
    // セッション継続確認（トークンの有効期限は1時間なので再ログインが必要になることがある）
    const savedEmail = sessionStorage.getItem('admin_email');
    if (savedEmail === CONFIG.allowedEmail) {
      document.getElementById('auth-screen').style.display = 'none';
      document.getElementById('user-badge').textContent = savedEmail;
      Dashboard.load();
      return;
    }
    // GSI ライブラリの読み込み完了を待つ
    if (window.google?.accounts?.id) {
      Auth.initGSI();
    } else {
      const script = document.querySelector('script[src*="accounts.google.com"]');
      if (script) {
        script.addEventListener('load', Auth.initGSI);
      } else {
        setTimeout(() => Auth.initGSI(), 2000);
      }
    }
  },
};

Auth.init();
</script>
