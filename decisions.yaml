# 確定済み決定ログ
# recheck_after_days: この日数を超えたらsession_bootstrap.shが警告を出す
# validator: CIで自動チェックするスクリプト（省略可）

decisions:
  - id: D001
    title: "引用は2文以内・出典明示・元サイト直リンク（著作権法32条）"
    decided_at: "2026-04-28"
    context: "flotopicは出版社に喧嘩を売らない。短い引用+出典+送客が基本スタンス"
    recheck_after_days: 90
    doc: "docs/rules/legal-policy.md"

  - id: D002
    title: "robots.txt遵守・User-Agent正直・RSS優先"
    decided_at: "2026-04-28"
    context: "クロールは正直に。Disallowページはスキップ"
    recheck_after_days: 180
    doc: "docs/rules/legal-policy.md"

  - id: D003
    title: "scriptタグ defer/async禁止（chart.js/config.js/app.js/detail.js）"
    decided_at: "2026-01-01"
    context: "初期化順序の問題でバグが発生したため物理ルール化"
    recheck_after_days: 365
    doc: "CLAUDE.md"

  - id: D004
    title: "Sonnetコスト上限: 5回/run、20回/day"
    decided_at: "2026-04-28"
    context: "コスト暴走防止。proc_cost_guard.pyで実装済み"
    recheck_after_days: 60
    doc: "projects/P003-news-timeline/lambda/processor/proc_cost_guard.py"

  - id: D005
    title: "完了=動作確認+効果検証済み。pushだけは未完了"
    decided_at: "2026-01-01"
    context: "実装した≠動いている。Verified行必須"
    recheck_after_days: 365
    doc: "CLAUDE.md"

  - id: D006
    title: "トピック詳細ページは注目度ゾーンとコンテンツゾーンを分離"
    decided_at: "2026-04-28"
    context: "注目度（グラフ）とコンテンツ（状況解説・見解・予想）を別ゾーンで表示。なぜ今かはAIではなくデータが示す。2026-04-28POとの設計議論で確定"
    recheck_after_days: 180
    doc: "docs/flotopic-vision-roadmap.md"

  - id: D007
    title: "ストーリー分岐はセマンティック関連性で判断"
    decided_at: "2026-04-28"
    context: "関連トピックの決定は注目度スコアではなくコンテンツのセマンティック関連性（エンティティ・因果・テーマ重複）で行う。注目度と内容は別軸"
    recheck_after_days: 180
    doc: "docs/flotopic-vision-roadmap.md"

  - id: D008
    title: "Bluesky投稿は注目度スコアで選定（重複防止4件）"
    decided_at: "2026-04-28"
    context: "velocityScoreの高いトピックを優先。直近4件重複スキップ。Google Trends不安定時はhybridスコア。記事数だけでは注目度を正確に測れない"
    recheck_after_days: 90
    doc: "docs/flotopic-vision-roadmap.md"
